  .card-hover:hover { transform: translateY(-2px); }

  /* Item row hover */
  .row-hover { transition: background 0.15s, transform 0.15s; }
  .row-hover:hover { background: rgba(255,255,255,0.065) !important; transform: translateX(2px); }

  /* Button hover effects */
  .btn-primary { transition: transform 0.15s, box-shadow 0.2s; }

function useInterval(fn, ms) {
  const cb = useRef(fn);
  useEffect(() => { cb.current = fn; }, [fn]);
  useEffect(() => { const t = setInterval(() => cb.current(), ms); return () => clearInterval(t); }, [ms]);
}

function useAnimCount(to) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let s; const run = ts => {
      if (!s) s = ts;
      const p = Math.min((ts - s) / 1500, 1);
      const e = 1 - (1-p)**3;
      setV(Math.round(e * to));
      if (p < 1) requestAnimationFrame(run);
    };
    requestAnimationFrame(run);
  }, [to]);
  return v;
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3600); return () => clearTimeout(t); }, []);
  return (
    <div className="toast" style={{
      position:'fixed', bottom:24, right:24, zIndex:200,
      display:'flex', alignItems:'center', gap:10,
      padding:'12px 18px', borderRadius:12,

    }}>
      <span style={{color:C.green}}>{Ico.check}</span> {msg}
    </div>
  );
}

// ─── MODAL WRAPPER ──────────────────────────────────────────────────────────
function Modal({ children, onClose }) {
  useEffect(() => {
    const esc = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-box" style={{ width:'100%', maxWidth:480, position:'relative', zIndex:1 }}>
        {children}
      </div>
    </div>
  );
}

  const [gLoading, setGLoading] = useState(false);
  const [error, setError]       = useState('');
  const [tIdx, setTIdx]         = useState(0);

  const c1 = useAnimCount(1247);
  const c2 = useAnimCount(98);
  const c3 = useAnimCount(4800);

  const testimonials = [
    { q:'Got my MacBook back in 3 hours. Completely unreal.',             name:'Chidi Amara',  role:'Computer Science '25' },
    { q:'Found my student ID the same day. WhatsApp link is genius.',     name:'Amaka Obi',    role:'Medicine '26' },
    { q:'Returned 4 items this semester. Karma system is addictive.',     name:'Tunde Bello',  role:'Engineering '25' },
  ];

  useInterval(() => setTIdx(i => (i+1) % testimonials.length), 4800);

  const upd = (k,v) => setForm(f => ({...f, [k]:v}));

  const handleGoogle = async () => {
    setGLoading(true); setError('');
    try { await auth.signInWithPopup(googleProvider); }
    catch(e) { const m = friendlyErr(e.code); if(m) setError(m); }
    setGLoading(false);
  };

  const handleSubmit = async () => {
    if (!form.email || !form.password) { setError('Please fill in all fields'); return; }
    if (mode === 'signup' && !form.name) { setError('Please enter your name'); return; }
    setLoading(true); setError('');
    try {
      if (mode === 'signup') {
        const r = await auth.createUserWithEmailAndPassword(form.email, form.password);
        await r.user.updateProfile({ displayName: form.name });
      } else {
        await auth.signInWithEmailAndPassword(form.email, form.password);
      }
    } catch(e) { setError(friendlyErr(e.code)); }
    setLoading(false);
  };

  const onKey = e => { if (e.key === 'Enter') handleSubmit(); };

  // Floating preview cards
  const previewCards = [
    { label:'🔴 Lost',  title:'MacBook Pro',  sub:'Library · 2h ago',  delay:'0s' },
    { label:'🟢 Found', title:'Student ID',   sub:'Science · 4h ago',  delay:'2s' },
    { label:'🔴 Lost',  title:'AirPods Pro',  sub:'Cafeteria · 1d ago', delay:'1.2s' },
  ];

  return (
    <div style={{ minHeight:'100vh', display:'flex', background:C.bg }}>

      {/* ── LEFT PANEL ── */}
      <div className="auth-left auth-grid" style={{
        width:'52%', minHeight:'100vh', position:'relative',
        display:'flex', flexDirection:'column', justifyContent:'space-between',
        padding:'48px 56px', borderRight:`1px solid ${C.border}`, overflow:'hidden',
      }}>
        {/* Radial glows */}
        <div style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
          <div style={{ position:'absolute', width:560, height:560, top:'5%', left:'35%', borderRadius:'50%', background:'radial-gradient(circle,rgba(37,99,235,0.1) 0%,transparent 65%)', filter:'blur(2px)', animation:'pulseGlow 10s ease-in-out infinite' }} />
          <div style={{ position:'absolute', width:380, height:380, bottom:'12%', left:'-5%', borderRadius:'50%', background:'radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 65%)', animation:'pulseGlow 13s ease-in-out infinite reverse' }} />
          <div style={{ position:'absolute', width:260, height:260, top:'45%', right:'5%', borderRadius:'50%', background:'radial-gradient(circle,rgba(16,185,129,0.06) 0%,transparent 60%)', animation:'pulseGlow 8s ease-in-out infinite' }} />
        </div>
        {/* Diagonal SVG line */}
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.07, pointerEvents:'none' }}>
          <defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3B82F6" stopOpacity="0"/><stop offset="50%" stopColor="#3B82F6" stopOpacity="1"/><stop offset="100%" stopColor="#3B82F6" stopOpacity="0"/></linearGradient></defs>
          <line x1="5%" y1="0" x2="50%" y2="100%" stroke="url(#dg)" strokeWidth="1" />
          <line x1="95%" y1="0" x2="50%" y2="100%" stroke="url(#dg)" strokeWidth="1" />
        </svg>

        {/* Floating preview cards */}
        {previewCards.map((card, i) => (
          <div key={i} style={{
            position:'absolute', left:'3%', top:`${18 + i*27}%`,
            background:'rgba(255,255,255,0.042)', border:`1px solid ${C.border}`,
            borderRadius:12, padding:'10px 14px', backdropFilter:'blur(12px)',
            minWidth:190, zIndex:2,
            animation:`floatCard ${6+i}s ease-in-out infinite`,
            animationDelay: card.delay,
          }}>
            <div style={{ fontSize:10, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>{card.label}</div>
            <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:2 }}>{card.title}</div>
            <div style={{ fontSize:11, color:C.textMuted }}>{card.sub}</div>
          </div>
        ))}

        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, position:'relative', zIndex:3 }}>
          <div style={{ width:34, height:34, borderRadius:9, background:'linear-gradient(135deg,#1D4ED8,#4338CA)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 0 20px rgba(59,130,246,0.32)', flexShrink:0 }}>
            <span style={{ color:'#fff' }}>{Ico.compass}</span>
          </div>
          <span style={{ fontSize:18, fontWeight:800, color:C.text, letterSpacing:'-0.045em' }}>UniFind</span>
        </div>

        {/* Hero */}
        <div style={{ position:'relative', zIndex:3 }}>
          {/* Badge */}
          <div style={{ display:'inline-flex', alignItems:'center', gap:7, background:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.22)', borderRadius:99, padding:'5px 13px', marginBottom:26 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:C.green, display:'block' }} />
            <span style={{ fontSize:12, color:'rgba(147,197,253,0.95)', fontWeight:500 }}>University of Port Harcourt</span>
          </div>

          <h1 style={{ fontSize:'clamp(2.2rem,3.5vw,3.8rem)', fontWeight:800, lineHeight:1.04, letterSpacing:'-0.045em', color:C.text, marginBottom:18 }}>
            Lost things{' '}
            <span style={{ fontFamily:"'Instrument Serif', Georgia, serif", fontStyle:'italic', background:'linear-gradient(90deg,#60A5FA 0%,#818CF8 55%,#34D399 100%)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>
              find their way
            </span>{' '}
            back.
          </h1>
          <p style={{ fontSize:15, color:C.textSub, lineHeight:1.7, maxWidth:400, fontWeight:400 }}>
            Real-time campus lost &amp; found. Report items, browse live map pins, and connect via WhatsApp — built for students.
          </p>

          {/* Stats */}
          <div style={{ display:'flex', gap:36, marginTop:38 }}>
            {[{n:c1,s:'+',l:'Items recovered'},{n:c2,s:'%',l:'Return rate'},{n:c3,s:'+',l:'Active students'}].map(s => (
              <div key={s.l}>
                <div style={{ fontSize:27, fontWeight:800, color:C.text, letterSpacing:'-0.04em', lineHeight:1 }}>{s.n.toLocaleString()}{s.s}</div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Testimonial */}
        <div style={{ position:'relative', zIndex:3 }}>
          {/* Ticker */}
          <div style={{ overflow:'hidden', marginBottom:18, paddingBottom:18, borderBottom:`1px solid ${C.border}`, maskImage:'linear-gradient(90deg,transparent,black 8%,black 92%,transparent)' }}>
            <div className="ticker-inner">
              {['1,200+ items recovered','98% return rate','4,800 students','Instant WhatsApp alerts','Live campus map','Karma rewards system',
                '1,200+ items recovered','98% return rate','4,800 students','Instant WhatsApp alerts','Live campus map','Karma rewards system'].map((item,i) => (
                <span key={i} style={{ display:'flex', alignItems:'center', gap:7, fontSize:12, color:C.textMuted, fontWeight:500, whiteSpace:'nowrap' }}>
                  <span style={{ width:5, height:5, borderRadius:'50%', background:C.blue, display:'inline-block', flexShrink:0 }} />
                  {item}
                </span>
              ))}
            </div>
          </div>

          <div style={{ background:'rgba(255,255,255,0.042)', border:`1px solid ${C.border}`, borderRadius:14, padding:'20px 22px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg,rgba(59,130,246,0.07),transparent 55%)', pointerEvents:'none' }} />
            <div style={{ position:'relative', zIndex:1 }}>
              {/* Swappable quote */}
              <p style={{ fontSize:14, fontStyle:'italic', fontFamily:"'Instrument Serif', serif", color:C.text, lineHeight:1.65, marginBottom:14 }}>
                "{testimonials[tIdx].q}"
              </p>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:28, height:28, borderRadius:'50%', background:'linear-gradient(135deg,#1D4ED8,#4338CA)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#fff', flexShrink:0 }}>
                  {testimonials[tIdx].name[0]}
                </div>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{testimonials[tIdx].name}</div>
                  <div style={{ fontSize:11, color:C.textMuted }}>{testimonials[tIdx].role}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:6, marginTop:12 }}>
                {testimonials.map((_,i) => (
                  <button key={i} onClick={() => setTIdx(i)} style={{ height:4, borderRadius:99, border:'none', background: i===tIdx ? C.blue : 'rgba(255,255,255,0.15)', width: i===tIdx ? 20 : 6, cursor:'pointer', transition:'all 0.25s' }} />
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── RIGHT PANEL — FORM ── */}
      <div className="auth-right" style={{
        flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:'60px 48px', position:'relative', minHeight:'100vh',
      }}>
        {/* Subtle glow behind form */}
        <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 60% 50% at 70% 50%,rgba(29,78,216,0.05),transparent)', pointerEvents:'none' }} />

        <div style={{ width:'100%', maxWidth:400, position:'relative', zIndex:1 }}>

          {/* Mobile logo */}
          <div style={{ display:'none' }} className="mobile-logo-show">
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:36 }}>
              <div style={{ width:30, height:30, borderRadius:8, background:'linear-gradient(135deg,#1D4ED8,#4338CA)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <span style={{ color:'#fff', fontSize:14 }}>{Ico.compass}</span>
              </div>
              <span style={{ fontSize:16, fontWeight:800, color:C.text, letterSpacing:'-0.04em' }}>UniFind</span>
            </div>
          </div>

          {/* Heading */}
          <div style={{ marginBottom:28 }}>
            <h2 style={{ fontSize:26, fontWeight:800, color:C.text, letterSpacing:'-0.04em', lineHeight:1.1, marginBottom:8 }}>
              {mode === 'signin' ? 'Welcome back' : 'Create account'}
            </h2>
            <p style={{ fontSize:14, color:C.textSub }}>
              {mode === 'signin' ? 'Sign in to continue to UniFind' : 'Join UniFind and help your campus community'}
            </p>
          </div>

          {/* Google */}
          <button className="btn-google" onClick={handleGoogle} disabled={loading || gLoading} style={{
            width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:10,
            padding:'11px 0', borderRadius:10, background:C.surface, border:`1px solid ${C.border}`,
            fontSize:14, fontWeight:500, color:C.textSub, marginBottom:20,
          }}>
            {gLoading
              ? <div className="spin" style={{ width:16, height:16, borderRadius:'50%', border:'2px solid rgba(255,255,255,0.2)', borderTopColor:'#fff' }} />
              : <GoogleSVG />
            }
            Continue with Google
          </button>

          {/* Divider */}
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <div style={{ flex:1, height:1, background:C.border }} />
            <span style={{ fontSize:12, color:C.textMuted }}>or</span>
            <div style={{ flex:1, height:1, background:C.border }} />
          </div>

          {/* Fields */}
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {mode === 'signup' && (
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6, letterSpacing:'0.04em' }}>Full Name</label>
                <div className="field-wrap" style={{ display:'flex', alignItems:'center', borderRadius:10, background:C.surface, boxShadow:`0 0 0 1px ${C.border}`, overflow:'hidden' }}>
                  <span style={{ paddingLeft:13, color:C.textMuted, display:'flex', flexShrink:0 }}>{Ico.user}</span>
                  <input value={form.name} onChange={e=>upd('name',e.target.value)} onKeyDown={onKey} placeholder="Your full name" autoComplete="name"
                    style={{ flex:1, padding:'11px 13px', fontSize:14, color:C.text, outline:'none', background:'transparent' }} />
                </div>
              </div>
            )}
            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6, letterSpacing:'0.04em' }}>Email address</label>
              <div className="field-wrap" style={{ display:'flex', alignItems:'center', borderRadius:10, background:C.surface, boxShadow:`0 0 0 1px ${C.border}`, overflow:'hidden' }}>
                <span style={{ paddingLeft:13, color:C.textMuted, display:'flex', flexShrink:0 }}>{Ico.mail}</span>
                <input value={form.email} onChange={e=>upd('email',e.target.value)} onKeyDown={onKey} type="email" placeholder="you@university.edu" autoComplete="email"
                  style={{ flex:1, padding:'11px 13px', fontSize:14, color:C.text, outline:'none', background:'transparent' }} />
              </div>
            </div>
            <div>
              <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6, letterSpacing:'0.04em' }}>Password</label>
              <div className="field-wrap" style={{ display:'flex', alignItems:'center', borderRadius:10, background:C.surface, boxShadow:`0 0 0 1px ${C.border}`, overflow:'hidden' }}>
                <span style={{ paddingLeft:13, color:C.textMuted, display:'flex', flexShrink:0 }}>{Ico.lock}</span>
                <input value={form.password} onChange={e=>upd('password',e.target.value)} onKeyDown={onKey} type={showPass?'text':'password'} placeholder="Your password" autoComplete={mode==='signup'?'new-password':'current-password'}
                  style={{ flex:1, padding:'11px 13px', fontSize:14, color:C.text, outline:'none', background:'transparent' }} />
                <button onClick={()=>setShowPass(s=>!s)} style={{ paddingRight:12, background:'none', border:'none', color:C.textMuted, display:'flex' }}>{Ico.eye}</button>
              </div>
            </div>
          </div>

          {/* Error */}
          {error && (
            <div style={{ marginTop:12, padding:'10px 14px', borderRadius:9, background:'rgba(239,68,68,0.09)', border:'1px solid rgba(239,68,68,0.22)', display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ color:C.red, flexShrink:0 }}>{Ico.alert}</span>
              <span style={{ fontSize:13, color:'#FCA5A5' }}>{error}</span>
            </div>
          )}

          {/* Submit */}
          <button className="btn-primary shimmer" onClick={handleSubmit} disabled={loading || gLoading} style={{
            width:'100%', marginTop:16, padding:'12px 0',
            borderRadius:10, background:'linear-gradient(135deg,#1D4ED8 0%,#4338CA 100%)',
            border:'none', fontSize:14, fontWeight:600, color:'#fff',
            position:'relative', overflow:'hidden',
            boxShadow:'0 0 0 1px rgba(59,130,246,0.25), 0 4px 24px rgba(29,78,216,0.28)',
          }}>
            {loading
              ? <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                  <div className="spin" style={{ width:14, height:14, borderRadius:'50%', border:'2px solid rgba(255,255,255,0.2)', borderTopColor:'#fff' }} />
                  <span style={{ color:'rgba(255,255,255,0.7)' }}>{mode==='signin'?'Signing in…':'Creating account…'}</span>
                </div>
              : <span style={{ position:'relative', zIndex:1 }}>{mode==='signin'?'Sign in':'Create account'}</span>
            }
          </button>

          {/* Toggle */}
          <p style={{ textAlign:'center', marginTop:20, fontSize:13, color:C.textMuted }}>
            {mode==='signin'?'No account yet? ':'Already have one? '}
            <button onClick={()=>{setMode(m=>m==='signin'?'signup':'signin');setError('');}} style={{ background:'none', border:'none', color:'#60A5FA', fontWeight:600, fontSize:13 }}>
              {mode==='signin'?'Sign up free':'Sign in'}
            </button>
          </p>

          <p style={{ textAlign:'center', marginTop:22, fontSize:11, color:'rgba(255,255,255,0.11)', lineHeight:1.6 }}>
            By continuing you agree to UniFind's Terms of Service and Privacy Policy.
          </p>
        </div>
      </div>
    </div>
  );
}

//  DASHBOARD

function Dashboard({ user, items, setSection, setSelectedItem, setShowReport, sq }) {
  const lost  = items.filter(i => i.status==='lost').length;
  const found = items.filter(i => i.status==='found').length;
  const h = new Date().getHours();
  const greeting = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';

  const stats = [
    { label:'Lost Items',     val:lost,   icon:Ico.alert, color:C.red,   bg:'rgba(239,68,68,0.07)',   bd:'rgba(239,68,68,0.16)' },
    { label:'Found Items',    val:found,  icon:Ico.check, color:C.green, bg:'rgba(16,185,129,0.07)',  bd:'rgba(16,185,129,0.16)' },
    { label:'Total Recovered',val:47,     icon:Ico.award, color:C.blue,  bg:'rgba(59,130,246,0.07)',  bd:'rgba(59,130,246,0.16)' },
    { label:'Your Karma',     val:user.karma, icon:Ico.zap, color:C.amber, bg:'rgba(245,158,11,0.07)', bd:'rgba(245,158,11,0.16)' },
  ];

  const filtered = items.filter(i => !sq || i.title.toLowerCase().includes(sq.toLowerCase()) || i.loc.toLowerCase().includes(sq.toLowerCase()));

  return (
    <div className="scroll-y" style={{ height:'100%', padding:'28px 28px 48px' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:26, flexWrap:'wrap', gap:12 }}>
        <div>
          <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:4 }}>Dashboard</div>
          <h1 style={{ fontSize:22, fontWeight:800, color:C.text, letterSpacing:'-0.04em' }}>Good {greeting}, {user.name.split(' ')[0]}</h1>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          {[{label:'Report Lost',type:'lost',color:C.red},{label:'Report Found',type:'found',color:C.green}].map(a => (
            <button key={a.type} onClick={()=>setShowReport({type:a.type})} style={{
              display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:8,
              background: a.color+'14', border:`1px solid ${a.color}28`,
              fontSize:13, fontWeight:500, color:C.textSub, transition:'all 0.15s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.background=a.color+'22';e.currentTarget.style.borderColor=a.color+'55';}}
              onMouseLeave={e=>{e.currentTarget.style.background=a.color+'14';e.currentTarget.style.borderColor=a.color+'28';}}>
              <span style={{color:a.color}}>{Ico.plus}</span> {a.label}
            </button>
          ))}
        </div>
      </div>

      {/* Stats */}
      <div className="stat-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:26 }}>
        {stats.map(s => (
          <div key={s.label} className="card-hover" style={{ borderRadius:12, padding:'18px', background:s.bg, border:`1px solid ${s.bd}` }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
              <div style={{ width:30, height:30, borderRadius:8, background:s.color+'1a', display:'flex', alignItems:'center', justifyContent:'center', color:s.color }}>{s.icon}</div>
              <span style={{ color:s.color+'80' }}>{Ico.trend}</span>
            </div>
            <div style={{ fontSize:26, fontWeight:800, color:C.text, letterSpacing:'-0.04em', lineHeight:1 }}>{s.val}</div>
            <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Main grid */}
      <div className="dash-grid" style={{ display:'grid', gridTemplateColumns:'1fr 296px', gap:20 }}>

        {/* Recent activity */}
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <span style={{ fontSize:14, fontWeight:600, color:C.text }}>Recent Activity</span>
            <button onClick={()=>setSection('items')} style={{ display:'flex', alignItems:'center', gap:4, background:'none', border:'none', color:'#60A5FA', fontWeight:500, fontSize:12 }}>
              View all {Ico.arrow}
            </button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {filtered.slice(0,7).map((item,i) => (
              <ItemRow key={item.id} item={item} onClick={()=>setSelectedItem(item)} />
            ))}
          </div>
        </div>

        {/* Widgets */}
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {/* Mini Map */}
          <div style={{ borderRadius:12, overflow:'hidden', border:`1px solid ${C.border}`, height:180 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'9px 14px', borderBottom:`1px solid ${C.border}` }}>
              <span style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.08em' }}>Live Map</span>
              <button onClick={()=>setSection('map')} style={{ fontSize:11, color:'#60A5FA', background:'none', border:'none' }}>Expand →</button>
            </div>
            <div onClick={()=>setSection('map')} style={{ height:'calc(100% - 36px)', background:'linear-gradient(135deg,#040a1a,#060d1d)', cursor:'pointer', position:'relative', overflow:'hidden' }}>
              <div style={{ position:'absolute', inset:0, backgroundImage:'linear-gradient(rgba(59,130,246,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.05) 1px,transparent 1px)', backgroundSize:'18px 18px' }} />
              {items.map(it => {
                const c = it.status==='found' ? C.green : C.blue;
                return <div key={it.id} style={{ position:'absolute', left:`${it.mx}%`, top:`${it.my}%`, width:8, height:8, borderRadius:'50%', background:c, boxShadow:`0 0 7px ${c}`, transform:'translate(-50%,-50%)' }} />;
              })}
            </div>
          </div>

          {/* Karma */}
          <div style={{ borderRadius:12, padding:'16px', background:'rgba(245,158,11,0.07)', border:'1px solid rgba(245,158,11,0.16)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
              <div style={{ width:32, height:32, borderRadius:8, background:'rgba(245,158,11,0.18)', display:'flex', alignItems:'center', justifyContent:'center', color:C.amber }}>{Ico.zap}</div>

// ─────────────────────────────────────────────────────────────────────────────
//  ITEMS VIEW
// ─────────────────────────────────────────────────────────────────────────────
function ItemsView({ items, setSelectedItem, sq }) {
  const [filter, setFilter] = useState('all');
  const [cat, setCat]       = useState('All');
  const [view, setView]     = useState('list');

  const filtered = items.filter(i =>
    (filter==='all' || i.status===filter) &&
    (cat==='All' || i.cat===cat) &&
    (!sq || i.title.toLowerCase().includes(sq.toLowerCase()) || i.loc.toLowerCase().includes(sq.toLowerCase()))
  );

  return (
    <div className="scroll-y" style={{ height:'100%', padding:'24px 24px 48px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20, flexWrap:'wrap', gap:12 }}>
        <div>
          <h1 style={{ fontSize:20, fontWeight:800, color:C.text, letterSpacing:'-0.04em' }}>All Items</h1>
          <p style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{filtered.length} of {items.length} items</p>
        </div>
        <div style={{ display:'flex', borderRadius:8, overflow:'hidden', border:`1px solid ${C.border}` }}>
          {[{id:'list',i:Ico.list},{id:'grid',i:Ico.grid}].map(v => (
            <button key={v.id} onClick={()=>setView(v.id)} style={{ padding:'7px 10px', background:view===v.id?'rgba(59,130,246,0.16)':C.surface, border:'none', display:'flex', alignItems:'center', color:view===v.id?'#60A5FA':C.textMuted, transition:'background 0.15s' }}>
              {v.i}
            </button>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:20 }}>
        {['all','lost','found'].map(f => {
          const c=f==='found'?C.green:f==='lost'?C.red:C.blue;
          const active = filter===f;
          return (
            <button key={f} onClick={()=>setFilter(f)} style={{ padding:'6px 14px', borderRadius:8, background:active?c+'14':C.surface, border:`1px solid ${active?c+'40':C.border}`, fontSize:12, fontWeight:500, color:active?C.text:C.textSub, textTransform:'capitalize', transition:'all 0.15s' }}>
              {f==='all'?'All Items':f}
            </button>
          );
        })}
        <div style={{ width:1, background:C.border, margin:'0 4px' }} />
        {CATS.map(c => {
          const active = cat===c;
          return (
            <button key={c} onClick={()=>setCat(c)} style={{ padding:'6px 12px', borderRadius:8, background:active?'rgba(99,102,241,0.15)':C.surface, border:`1px solid ${active?'rgba(99,102,241,0.4)':C.border}`, fontSize:12, fontWeight:500, color:active?'#A5B4FC':C.textSub, whiteSpace:'nowrap', transition:'all 0.15s' }}>
              {c}
            </button>
          );
        })}
      </div>

      {/* Items */}
      {view==='list' ? (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {filtered.map(item => <ItemRow key={item.id} item={item} onClick={()=>setSelectedItem(item)} />)}
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))', gap:12 }}>
          {filtered.map(item => {
            const c = item.status==='found' ? C.green : C.red;
            return (
              <button key={item.id} className="card-hover" onClick={()=>setSelectedItem(item)} style={{ borderRadius:12, padding:'18px', textAlign:'left', background:C.surface, border:`1px solid ${C.border}`, transition:'all 0.18s' }}
                onMouseEnter={e=>e.currentTarget.style.borderColor=c+'35'}
                onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                <div style={{ width:36, height:36, borderRadius:9, background:c+'14', border:`1px solid ${c}22`, display:'flex', alignItems:'center', justifyContent:'center', color:c, marginBottom:14 }}>{Ico.package}</div>
                <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.title}</div>
                <div style={{ fontSize:12, color:C.textMuted, marginBottom:12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.loc}</div>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span style={{ fontSize:11, fontWeight:600, padding:'3px 9px', borderRadius:99, background:c+'14', color:c, textTransform:'capitalize' }}>{item.status}</span>
                  <span style={{ fontSize:11, color:C.textMuted }}>{item.time}</span>
                </div>
              </button>
            );
          })}
        </div>
      )}
      {filtered.length===0 && (
        <div style={{ textAlign:'center', paddingTop:80 }}>
          <div style={{ color:'rgba(255,255,255,0.08)', marginBottom:12, fontSize:40 }}>📦</div>
          <p style={{ fontSize:13, color:C.textMuted }}>No items match your filters</p>
        </div>
      )}
    </div>
  );
}

function ItemModal({ item, onClose }) {
  const c   = item.status==='found' ? C.green : C.red;
  const ph  = item.phone.replace(/\D/g,'');
  const wa  = `https://wa.me/${ph}?text=${encodeURIComponent(`Hi! Saw your UniFind report for "${item.title}" near ${item.loc}. ${item.status==='lost'?'I think I found it!':'Is this yours?'}`)}`;

  return (
    <Modal onClose={onClose}>
      <div style={{ background:'#09101f', border:`1px solid ${C.border}`, borderRadius:16, overflow:'hidden', boxShadow:'0 40px 100px rgba(0,0,0,0.75)', maxWidth:460, width:'100%', margin:'0 auto' }}>
        <div style={{ height:2, background:`linear-gradient(90deg,${c},${c}70)` }} />
        <div style={{ padding:24 }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>

              <div>
                <h2 style={{ fontSize:18, fontWeight:800, color:C.text, letterSpacing:'-0.03em' }}>{item.title}</h2>

              </div>
            </div>

          </div>

          {/* Detail grid */}
          <div className="detail-grid" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 }}>
            {[[Ico.pin,'Location',item.loc],[Ico.clock,'Reported',item.time],[Ico.user,'By',item.reporter],[Ico.zap,'Karma',`+${item.karma} pts`]].map(([icon,l,v]) => (
              <div key={l} style={{ padding:'11px 13px', borderRadius:9, background:C.surface, border:`1px solid ${C.border}` }}>
                <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:4, color:C.textMuted }}>{icon}<span style={{ fontSize:10 }}>{l}</span></div>

              <p style={{ fontSize:13, color:C.textSub, lineHeight:1.65 }}>{item.desc}</p>
            </div>
          )}

          {/* CTAs */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <a href={wa} target="_blank" rel="noreferrer" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'11px', borderRadius:9, background:'rgba(37,211,102,0.1)', border:'1px solid rgba(37,211,102,0.3)', fontSize:13, fontWeight:600, color:'#25D366', transition:'background 0.15s' }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(37,211,102,0.2)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(37,211,102,0.1)'}>
              {Ico.msg} WhatsApp
            </a>
            <button onClick={onClose} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'11px', borderRadius:9, background:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.3)', fontSize:13, fontWeight:600, color:'#60A5FA', transition:'background 0.15s' }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(59,130,246,0.2)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(59,130,246,0.1)'}>
              {Ico.eye} Track
            </button>
          </div>
        </div>
      </div>
    </Modal>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  REPORT MODAL
// ─────────────────────────────────────────────────────────────────────────────
function ReportModal({ initial, onClose, onSubmit }) {
  const [step,     setStep]    = useState(1);
  const [dragging, setDragging]= useState(false);
  const [image,    setImage]   = useState(null);
  const [form,     setForm]    = useState({ type:initial?.type||'lost', title:'', cat:'Electronics', loc:'', desc:'', phone:'' });
  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const handleFile = f => { if(f) setImage(URL.createObjectURL(f)); };

  return (
    <Modal onClose={onClose}>
      <div style={{ background:'#09101f', border:`1px solid ${C.border}`, borderRadius:16, overflow:'hidden', boxShadow:'0 40px 100px rgba(0,0,0,0.75)', maxWidth:500, width:'100%', margin:'0 auto' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 22px', borderBottom:`1px solid ${C.border}` }}>
          <div>
            <h2 style={{ fontSize:15, fontWeight:700, color:C.text, letterSpacing:'-0.03em' }}>{form.type==='lost'?'Report a Lost Item':'Report a Found Item'}</h2>
            <div style={{ display:'flex', gap:5, marginTop:8, alignItems:'center' }}>
              {[1,2,3].map(s => (
                <div key={s} style={{ height:3, borderRadius:99, overflow:'hidden', width: s<=step?22:10, background:'rgba(255,255,255,0.08)', transition:'width 0.2s' }}>
                  <div style={{ height:'100%', width:s<=step?'100%':'0%', background:s<step?C.green:s===step?C.blue:'transparent', transition:'width 0.3s' }} />
                </div>
              ))}
              <span style={{ fontSize:11, color:C.textMuted, marginLeft:4 }}>Step {step}/3</span>
            </div>
          </div>
          <button onClick={onClose} style={{ width:28, height:28, borderRadius:7, background:C.surface, border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center', color:C.textMuted }}>{Ico.x}</button>
        </div>

        {/* Body */}
        <div style={{ padding:'22px 22px 0', minHeight:290 }}>
          {step===1 && (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              <div style={{ display:'flex', gap:10 }}>
                {['lost','found'].map(t => {
                  const c=t==='found'?C.green:C.red;
                  return (
                    <button key={t} onClick={()=>upd('type',t)} style={{ flex:1, padding:'11px', borderRadius:9, background:form.type===t?c+'14':C.surface, border:`1px solid ${form.type===t?c+'45':C.border}`, fontSize:13, fontWeight:600, color:form.type===t?C.text:C.textMuted, textTransform:'capitalize', transition:'all 0.15s' }}>
                      {t==='lost'?'🔴 ':'🟢 '}I {t} this
                    </button>
                  );
                })}
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>Item Name *</label>
                <div className="field-wrap" style={{ display:'flex', alignItems:'center', borderRadius:10, background:C.surface, boxShadow:`0 0 0 1px ${C.border}` }}>
                  <span style={{ paddingLeft:13, color:C.textMuted, display:'flex', flexShrink:0 }}>{Ico.package}</span>
                  <input value={form.title} onChange={e=>upd('title',e.target.value)} placeholder="e.g. MacBook Pro, Student ID…" style={{ flex:1, padding:'11px 13px', fontSize:14, color:C.text, outline:'none', background:'transparent' }} />
                </div>
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>Category</label>
                <select value={form.cat} onChange={e=>upd('cat',e.target.value)} style={{ width:'100%', padding:'11px 14px', borderRadius:10, background:C.surface, border:`1px solid ${C.border}`, fontSize:14, color:C.text, outline:'none' }}>
                  {CATS.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
          )}

          {step===2 && (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>Photo <span style={{ color:'rgba(255,255,255,0.2)' }}>(optional)</span></label>
                <label onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
                  onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
                  style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:130, borderRadius:12, border:`2px dashed ${dragging?C.blue:C.border}`, background:dragging?'rgba(59,130,246,0.06)':C.surface, cursor:'pointer', position:'relative', overflow:'hidden', transition:'border-color 0.15s' }}>
                  {image
                    ? <><img src={image} style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }} alt="preview"/>
                        <button onClick={e=>{e.preventDefault();setImage(null);}} style={{ position:'absolute', top:8, right:8, width:24, height:24, borderRadius:'50%', background:'rgba(0,0,0,0.6)', border:'none', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff' }}>{Ico.x}</button>
                      </>
                    : <><div style={{ color:C.textMuted }}>{Ico.upload}</div>
                        <span style={{ fontSize:13, color:C.textMuted, marginTop:8 }}>Drag & drop or <span style={{ color:'#60A5FA' }}>browse</span></span>
                      </>
                  }
                  <input type="file" accept="image/*" style={{ display:'none' }} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}} />
                </label>
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>Location *</label>
                <select value={form.loc} onChange={e=>upd('loc',e.target.value)} style={{ width:'100%', padding:'11px 14px', borderRadius:10, background:C.surface, border:`1px solid ${C.border}`, fontSize:14, color:C.text, outline:'none' }}>
                  <option value="">Select campus location…</option>
                  {LOCS.map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>Description</label>
                <textarea value={form.desc} onChange={e=>upd('desc',e.target.value)} rows={3} placeholder="Color, brand, identifying markings…" style={{ width:'100%', padding:'11px 14px', borderRadius:10, background:C.surface, border:`1px solid ${C.border}`, fontSize:13, color:C.text, resize:'none', outline:'none' }} />
              </div>
            </div>
          )}

          {step===3 && (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              <div>
                <label style={{ display:'block', fontSize:12, fontWeight:500, color:C.textMuted, marginBottom:6 }}>WhatsApp Number *</label>
                <div className="field-wrap" style={{ display:'flex', alignItems:'center', borderRadius:10, background:C.surface, boxShadow:`0 0 0 1px ${C.border}` }}>
                  <span style={{ paddingLeft:13, color:C.textMuted, display:'flex', flexShrink:0 }}>{Ico.msg}</span>
                  <input value={form.phone} onChange={e=>upd('phone',e.target.value)} placeholder="+234 801 234 5678" style={{ flex:1, padding:'11px 13px', fontSize:14, color:C.text, outline:'none', background:'transparent' }} />
                </div>
              </div>
              <div style={{ padding:'14px 16px', borderRadius:10, background:C.surface, border:`1px solid ${C.border}` }}>
                <div style={{ fontSize:10, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:12 }}>Summary</div>
                {[['Type',form.type],['Item',form.title||'—'],['Category',form.cat],['Location',form.loc||'—']].map(([k,v]) => (
                  <div key={k} style={{ display:'flex', justifyContent:'space-between', marginBottom:8, fontSize:13 }}>
                    <span style={{ color:C.textMuted }}>{k}</span>
                    <span style={{ fontWeight:600, color:C.text, textTransform:'capitalize' }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 14px', borderRadius:10, background:'rgba(59,130,246,0.07)', border:'1px solid rgba(59,130,246,0.18)' }}>
                <span style={{ color:C.blue }}>{Ico.sparkle}</span>
                <span style={{ fontSize:12, color:'rgba(147,197,253,0.8)' }}>Submitting earns <strong style={{ color:'#93C5FD' }}>+{form.type==='found'?25:10} Karma Points</strong></span>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ display:'flex', gap:10, padding:'18px 22px 22px' }}>
          {step>1 && (
            <button onClick={()=>setStep(s=>s-1)} style={{ padding:'10px 18px', borderRadius:9, background:C.surface, border:`1px solid ${C.border}`, fontSize:13, fontWeight:500, color:C.textMuted, transition:'background 0.15s' }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'}
              onMouseLeave={e=>e.currentTarget.style.background=C.surface}>
              Back
            </button>
          )}
          <button className="btn-primary shimmer" onClick={()=>step<3?setStep(s=>s+1):onSubmit(form)} style={{ flex:1, padding:'10px', borderRadius:9, background:'linear-gradient(135deg,#1D4ED8,#4338CA)', border:'none', fontSize:13, fontWeight:600, color:'#fff', position:'relative', overflow:'hidden' }}>
            <span style={{ position:'relative', zIndex:1 }}>{step===3?'Submit Report':'Continue →'}</span>
          </button>
        </div>
      </div>
    </Modal>
  );
}

function AppShell({ fbUser }) {
  const [section,      setSection]      = useState('dashboard');
  const [items,        setItems]        = useState(SEED);
  const [selectedItem, setSelectedItem] = useState(null);
  const [showReport,   setShowReport]   = useState(null);
  const [toast,        setToast]        = useState(null);
  const [collapsed,    setCollapsed]    = useState(false);
  const [searchQuery,  setSearchQuery]  = useState('');
  const [showNotifs,   setShowNotifs]   = useState(false);

  const user = {
    name:     fbUser.displayName || fbUser.email?.split('@')[0] || 'User',
    email:    fbUser.email,
    photo:    fbUser.photoURL,
    karma:    120,
    verified: !!fbUser.emailVerified || !!fbUser.displayName,
    returned: 3,
  };

  const notifs = [
    { id:1, text:'Your MacBook report got 5 views',        time:'3m ago',  unread:true },
    { id:2, text:'Amaka O. may have found your item',      time:'1h ago',  unread:true },
    { id:3, text:'+25 Karma awarded for your report',      time:'3h ago',  unread:false },
  ];

  const addItem = form => {
    setItems(p => [{
      id:Date.now(), title:form.title, cat:form.cat,
      status:form.type, loc:form.loc, reporter:user.name,
      time:'just now', desc:form.desc,
      karma: form.type==='found'?25:10,
      phone: form.phone||'2340000000000', verified:user.verified,
      mx:12+Math.random()*72, my:12+Math.random()*72,
    }, ...p]);
    setToast(form.type==='found' ? 'Found item reported · +25 Karma ✓' : 'Lost item reported ✓');
    setShowReport(null);
  };

  const navLinks = [
    { id:'dashboard', icon:Ico.home,    label:'Dashboard' },
    { id:'map',       icon:Ico.map,     label:'Live Map'  },
    { id:'items',     icon:Ico.package, label:'Items'     },
    { id:'profile',   icon:Ico.user,    label:'Profile'   },

  const SB = collapsed ? 60 : 228;

  return (
    <div style={{ display:'flex', height:'100vh', background:C.bg, overflow:'hidden' }}>

      {/* ── SIDEBAR ── */}
      <div className="sidebar" style={{
        width: SB, minWidth: SB, flexShrink:0, height:'100vh',
        display:'flex', flexDirection:'column',
        borderRight:`1px solid ${C.border}`, background:'rgba(3,5,8,0.98)',
        position:'relative', zIndex:20, transition:'width 0.28s cubic-bezier(0.22,1,0.36,1)',
        overflow:'hidden',
      }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 14px', height:60, borderBottom:`1px solid ${C.border}`, flexShrink:0, overflow:'hidden' }}>
          <div style={{ width:28, height:28, borderRadius:7, background:'linear-gradient(135deg,#1D4ED8,#4338CA)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, boxShadow:'0 0 14px rgba(37,99,235,0.3)', color:'#fff', fontSize:14 }}>
            {Ico.compass}
          </div>
          <span className="sidebar-logo-text" style={{ fontSize:15, fontWeight:800, color:C.text, letterSpacing:'-0.045em', whiteSpace:'nowrap', opacity: collapsed?0:1, transition:'opacity 0.2s' }}>
            UniFind
          </span>
        </div>

        {/* Nav items */}
        <nav style={{ flex:1, padding:'10px 8px', display:'flex', flexDirection:'column', gap:2 }}>
          {navLinks.map(({ id, icon, label }) => {
            const active = section===id;
            return (
              <button key={id} onClick={()=>setSection(id)}
                className={`nav-item${active?' nav-active':''}`}
                style={{ width:'100%', display:'flex', alignItems:'center', gap:10, padding:'9px 10px', borderRadius:8, background:'transparent', border:'none', textAlign:'left', color: active?C.blue:C.textMuted, overflow:'hidden' }}>
                <span style={{ flexShrink:0, display:'flex', opacity: active?1:0.7 }}>{icon}</span>
                <span className="sidebar-label" style={{ fontSize:13, fontWeight: active?600:400, color: active?C.text:C.textSub, whiteSpace:'nowrap', opacity: collapsed?0:1, transition:'opacity 0.2s' }}>
                  {label}
                </span>
              </button>
            );
          })}

          {/* Report CTA */}
          <div style={{ marginTop:8 }}>
            <button onClick={()=>setShowReport({type:'lost'})} style={{
              width:'100%', display:'flex', alignItems:'center', gap:10,
              padding:'9px 10px', borderRadius:8,
              background:'rgba(29,78,216,0.12)', border:'1px solid rgba(59,130,246,0.22)',
              overflow:'hidden', position:'relative', transition:'border-color 0.15s',
            }}
              onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(59,130,246,0.45)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(59,130,246,0.22)'}>
              <span style={{ color:'#60A5FA', flexShrink:0, display:'flex' }}>{Ico.plus}</span>
              <span className="sidebar-label" style={{ fontSize:13, fontWeight:600, color:'#93C5FD', whiteSpace:'nowrap', opacity: collapsed?0:1, transition:'opacity 0.2s' }}>

              {user.photo ? <img src={user.photo} style={{ width:'100%', height:'100%', objectFit:'cover' }} alt="" /> : user.name[0].toUpperCase()}
            </div>
            <div className="user-info" style={{ flex:1, minWidth:0, display:'flex', alignItems:'center', justifyContent:'space-between', opacity: collapsed?0:1, transition:'opacity 0.2s' }}>
              <div style={{ minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:600, color:C.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user.name}</div>
                <div style={{ fontSize:10, color:C.textMuted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user.email}</div>
              </div>
              <button onClick={()=>auth.signOut()} style={{ background:'none', border:'none', color:C.textMuted, display:'flex', marginLeft:6, flexShrink:0, transition:'color 0.15s' }}
                onMouseEnter={e=>e.currentTarget.style.color='#F87171'}
                onMouseLeave={e=>e.currentTarget.style.color=C.textMuted}>
                {Ico.logout}
              </button>
            </div>
          </div>
        </div>

        {/* Collapse toggle */}
        <button onClick={()=>setCollapsed(s=>!s)} style={{
          position:'absolute', top:20, right:-13, width:26, height:26,
          borderRadius:'50%', background:'#0c1220', border:`1px solid ${C.border}`,
          display:'flex', alignItems:'center', justifyContent:'center',
          zIndex:30, color:C.textMuted, transition:'transform 0.15s',
        }}
          onMouseEnter={e=>e.currentTarget.style.transform='scale(1.15)'}
          onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
          <span style={{ display:'block', transform: collapsed?'rotate(0deg)':'rotate(180deg)', transition:'transform 0.3s' }}>
            {Ico.chevron}
          </span>
        </button>

          <div style={{ flex:1, maxWidth:440 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:'6px 12px' }}>

          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ position:'relative' }}>
              <button onClick={()=>setShowNotifs(s=>!s)} style={{ width:34, height:34, borderRadius:8, background:C.surface, border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center', color:C.textMuted, position:'relative' }}>
                {Ico.bell}
                {notifs.some(n=>n.unread) && <span style={{ position:'absolute', top:5, right:5, width:7, height:7, borderRadius:'50%', background:C.blue, border:'1.5px solid #030508' }} />}

                      <span style={{ fontSize:11, fontWeight:600, color:C.textMuted, textTransform:'uppercase', letterSpacing:'0.1em' }}>Notifications</span>

                    {notifs.map(n => (
                      <div key={n.id} style={{ display:'flex', gap:10, padding:'11px 16px', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>

                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        </header>

        {/* Section */}
        <main style={{ flex:1, overflow:'hidden' }}>
          {section==='dashboard' && <Dashboard user={user} items={items} setSection={setSection} setSelectedItem={setSelectedItem} setShowReport={setShowReport} sq={searchQuery} />}
          {section==='map'       && <MapView   items={items} setSelectedItem={setSelectedItem} />}
          {section==='items'     && <ItemsView items={items} setSelectedItem={setSelectedItem} sq={searchQuery} />}
          {section==='profile'   && <ProfileView user={user} />}
        </main>
      </div>

      {/* Modals */}
      {selectedItem && <ItemModal   item={selectedItem} onClose={()=>setSelectedItem(null)} />}
      {showReport   && <ReportModal initial={showReport} onClose={()=>setShowReport(null)} onSubmit={addItem} />}
      {toast        && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  ROOT — Auth listener
// ─────────────────────────────────────────────────────────────────────────────
function Root() {
  const [fbUser, setFbUser] = useState(undefined);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setFbUser(u ?? null));
    return unsub;
  }, []);

  if (fbUser === undefined) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:C.bg }}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
          <div style={{ width:40, height:40, borderRadius:10, background:'linear-gradient(135deg,#1D4ED8,#4338CA)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 0 28px rgba(37,99,235,0.4)', color:'#fff' }}>
            {Ico.compass}
          </div>
          <div className="spin" style={{ width:18, height:18, borderRadius:'50%', border:'2px solid rgba(255,255,255,0.14)', borderTopColor:C.blue }} />
        </div>
      </div>
    );
  }

  return fbUser ? <AppShell fbUser={fbUser} /> : <AuthPage />;
}

// ─── MOUNT ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
