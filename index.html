<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFind - Production-Grade University Lost & Found Platform</title>
    
    <!-- React & Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js"></script>
    
    <!-- Framer Motion CDN -->
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10/dist/framer-motion.js"></script>
    
    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemoKey"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3B82F6;
            --secondary: #8B5CF6;
            --accent: #EC4899;
            --dark: #0F0F0F;
            --surface: #1A1A2E;
            --text: #FFFFFF;
        }

        body {
            font-family: 'Space Grotesk', 'Syne', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Glassmorphism Design */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-dark {
            background: rgba(20, 20, 40, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.6s ease-out; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }

        .gradient-text {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
        }

        .btn-glow {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            transition: all 0.3s;
        }

        .btn-glow:hover {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.8);
            transform: scale(1.05);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .text-7xl { font-size: 2.5rem; }
            .text-5xl { font-size: 2rem; }
            .text-4xl { font-size: 1.875rem; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ════════════════════════════════════════════════════════════════════════════
        // FIREBASE INITIALIZATION
        // ════════════════════════════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyDemoKey_Replace_With_Your_Key",
            authDomain: "uni-find-9041e.firebaseapp.com",
            projectId: "uni-find-9041e",
            storageBucket: "uni-find-9041e.appspot.com",
            messagingSenderId: "2904053304401",
            appId: "1:290405330440:web:b1e709176b1c784737ebbd",
            measurementId: "G-7Y1K5P31XC"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ════════════════════════════════════════════════════════════════════════════
        // APP CONTEXT
        // ════════════════════════════════════════════════════════════════════════════
        const AppContext = createContext();

        function AppProvider({ children }) {
            const [currentUser, setCurrentUser] = useState(null);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setCurrentUser(user);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            useEffect(() => {
                const unsubscribe = db.collection("items").onSnapshot((snapshot) => {
                    const itemsData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setItems(itemsData);
                });
                return unsubscribe;
            }, []);

            return (
                <AppContext.Provider value={{ currentUser, setCurrentUser, items, setItems, loading, auth, db, storage }}>
                    {children}
                </AppContext.Provider>
            );
        }

        function useApp() {
            return useContext(AppContext);
        }

        // ════════════════════════════════════════════════════════════════════════════
        // NAVBAR
        // ════════════════════════════════════════════════════════════════════════════
        function Navbar({ onAuthClick, onProfileClick }) {
            const { currentUser } = useApp();
            const [menuOpen, setMenuOpen] = useState(false);

            const handleLogout = async () => {
                try {
                    await auth.signOut();
                    setMenuOpen(false);
                } catch (error) {
                    console.error("Logout error:", error);
                }
            };

            return (
                <nav className="fixed top-0 left-0 right-0 z-50 glass-dark border-b border-blue-500/20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20">
                            {/* Logo */}
                            <div className="flex items-center gap-2 group cursor-pointer">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center font-black text-lg">
                                    U
                                </div>
                                <span className="font-black text-2xl gradient-text hidden sm:inline">UniFind</span>
                            </div>

                            {/* Desktop Menu */}
                            <div className="hidden md:flex items-center gap-8">
                                <button className="text-gray-300 hover:text-blue-400 transition text-sm font-semibold">Browse Items</button>
                                <button className="text-gray-300 hover:text-blue-400 transition text-sm font-semibold">How it Works</button>
                                <button className="text-gray-300 hover:text-blue-400 transition text-sm font-semibold">FAQ</button>
                            </div>

                            {/* Auth Section */}
                            <div className="flex items-center gap-4">
                                {!currentUser ? (
                                    <>
                                        <button
                                            onClick={() => onAuthClick('login')}
                                            className="text-sm font-semibold text-gray-300 hover:text-blue-400 transition hidden sm:block"
                                        >
                                            Login
                                        </button>
                                        <button
                                            onClick={() => onAuthClick('signup')}
                                            className="btn-glow px-6 py-2 rounded-lg font-semibold text-sm text-white"
                                        >
                                            Sign Up
                                        </button>
                                    </>
                                ) : (
                                    <>
                                        <button
                                            onClick={onProfileClick}
                                            className="flex items-center gap-2 hover:text-blue-400 transition"
                                        >
                                            <img
                                                src={currentUser.photoURL || `https://i.pravatar.cc/150?u=${currentUser.email}`}
                                                alt="User"
                                                className="w-8 h-8 rounded-full border border-blue-500"
                                            />
                                            <span className="text-sm font-semibold hidden sm:inline">{currentUser.displayName || currentUser.email.split('@')[0]}</span>
                                        </button>
                                        <button
                                            onClick={handleLogout}
                                            className="text-sm font-semibold text-gray-300 hover:text-red-400 transition"
                                        >
                                            Logout
                                        </button>
                                    </>
                                )}
                                
                                {/* Mobile Menu */}
                                <button
                                    onClick={() => setMenuOpen(!menuOpen)}
                                    className="md:hidden text-white text-2xl"
                                >
                                    ☰
                                </button>
                            </div>
                        </div>

                        {/* Mobile Menu Dropdown */}
                        {menuOpen && (
                            <div className="md:hidden pb-4 border-t border-blue-500/20 space-y-2">
                                <button className="block w-full text-left py-2 text-gray-300 hover:text-blue-400">Browse Items</button>
                                <button className="block w-full text-left py-2 text-gray-300 hover:text-blue-400">How it Works</button>
                                <button className="block w-full text-left py-2 text-gray-300 hover:text-blue-400">FAQ</button>
                            </div>
                        )}
                    </div>
                </nav>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // HERO SECTION
        // ════════════════════════════════════════════════════════════════════════════
        function HeroSection({ onAuthClick, items }) {
            const [searchTerm, setSearchTerm] = useState("");
            const [activeSlide, setActiveSlide] = useState(0);

            useEffect(() => {
                if (items.length === 0) return;
                const timer = setInterval(() => {
                    setActiveSlide((prev) => (prev + 1) % items.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [items.length]);

            const premiumItems = items.filter(item => item.status === 'lost' && item.category === 'Electronics').slice(0, 6);

            return (
                <div className="min-h-screen pt-20 pb-20 relative overflow-hidden">
                    {/* Animated Background */}
                    <div className="absolute top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl animate-float"></div>
                    <div className="absolute bottom-10 right-10 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-float" style={{animationDelay: '1s'}}></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        {/* Main Headline */}
                        <div className="text-center mb-12 animate-slide-in">
                            <h1 className="text-6xl md:text-7xl font-black mb-6 leading-tight">
                                <span className="block mb-2">Find Your Lost</span>
                                <span className="gradient-text text-7xl md:text-8xl">Treasures</span>
                            </h1>
                            <p className="text-xl text-gray-300 max-w-2xl mx-auto mb-8">
                                Production-Grade Lost & Found Platform for University Students
                                <br />
                                <span className="text-blue-400 font-bold">Firebase Backend • Google Auth • Real-Time Updates</span>
                            </p>
                        </div>

                        {/* Advanced Search Bar */}
                        <div className="max-w-2xl mx-auto mb-16 animate-slide-in" style={{animationDelay: '0.2s'}}>
                            <div className="glass-dark p-2 rounded-2xl flex items-center gap-2">
                                <input
                                    type="text"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search for MacBook, iPhone, wallet... 🔍"
                                    className="flex-1 bg-transparent text-white placeholder-gray-500 outline-none px-6 py-4 text-lg"
                                />
                                <button className="btn-glow px-8 py-4 rounded-xl font-bold text-white">
                                    Search
                                </button>
                            </div>
                            <div className="mt-4 flex justify-center gap-2 flex-wrap">
                                {["📱 Electronics", "💼 Accessories", "⌚ Luxury", "🎒 Bags"].map((tag, i) => (
                                    <button
                                        key={i}
                                        className="glass px-4 py-2 rounded-full text-sm text-gray-300 hover:text-blue-400 hover:border-blue-400 transition"
                                    >
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Premium Items Carousel */}
                        {premiumItems.length > 0 && (
                            <div className="animate-slide-in" style={{animationDelay: '0.4s'}}>
                                <h2 className="text-2xl font-black mb-6">🔥 Recently Lost Items</h2>
                                <div className="glass-dark rounded-2xl overflow-hidden p-8">
                                    <div className="flex flex-col md:flex-row gap-8 items-center">
                                        {/* Carousel Image */}
                                        <div className="flex-1">
                                            <div className="relative">
                                                {premiumItems[activeSlide]?.image ? (
                                                    <img
                                                        src={premiumItems[activeSlide].image}
                                                        alt={premiumItems[activeSlide].title}
                                                        className="w-full h-80 object-cover rounded-xl"
                                                    />
                                                ) : (
                                                    <div className="w-full h-80 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-xl flex items-center justify-center text-6xl">
                                                        {premiumItems[activeSlide]?.emoji || '📦'}
                                                    </div>
                                                )}
                                                <div className="absolute top-4 right-4 glass px-4 py-2 rounded-full">
                                                    <span className="font-bold text-blue-400">{activeSlide + 1}/{premiumItems.length}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Item Details */}
                                        <div className="flex-1">
                                            <h3 className="text-3xl font-black mb-2">{premiumItems[activeSlide]?.title}</h3>
                                            <p className="text-gray-400 mb-4 text-lg">{premiumItems[activeSlide]?.description}</p>
                                            
                                            <div className="space-y-3 mb-6">
                                                <div className="flex items-center gap-2 text-gray-300">
                                                    <span>📍</span> {premiumItems[activeSlide]?.location}
                                                </div>
                                                <div className="flex items-center gap-2 text-gray-300">
                                                    <span>⏰</span> {premiumItems[activeSlide]?.date || 'Recently'}
                                                </div>
                                                <div className="flex items-center gap-2 text-gray-300">
                                                    <span>📁</span> {premiumItems[activeSlide]?.category}
                                                </div>
                                            </div>

                                            <div className="flex gap-3">
                                                <a
                                                    href={`https://wa.me/${premiumItems[activeSlide]?.phone || '2349123456789'}?text=Hi, I found the ${premiumItems[activeSlide]?.title} you posted on UniFind`}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="btn-glow px-6 py-3 rounded-xl font-bold text-white flex-1 text-center"
                                                >
                                                    💬 WhatsApp Finder
                                                </a>
                                                <button className="glass px-6 py-3 rounded-xl font-bold text-blue-400 hover:text-blue-300 transition">
                                                    ❤️ Save
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Carousel Controls */}
                                    <div className="flex justify-center gap-3 mt-8">
                                        {premiumItems.map((_, i) => (
                                            <button
                                                key={i}
                                                onClick={() => setActiveSlide(i)}
                                                className={`transition-all ${i === activeSlide ? 'bg-blue-500 w-8' : 'bg-gray-600 w-4'} h-2 rounded-full`}
                                            ></button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CTA */}
                        <div className="text-center mt-12 animate-slide-in" style={{animationDelay: '0.6s'}}>
                            <button
                                onClick={() => onAuthClick('signup')}
                                className="btn-glow px-10 py-4 rounded-xl font-black text-white text-lg hover:scale-110 transition-transform"
                            >
                                🚀 Post Your Found Item Now
                            </button>
                            <p className="text-gray-400 mt-4">Or scroll to browse all items →</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // ITEM CARD COMPONENT
        // ════════════════════════════════════════════════════════════════════════════
        function ItemCard({ item }) {
            const [liked, setLiked] = useState(false);

            return (
                <div className="glass-dark rounded-2xl overflow-hidden card-hover group animate-slide-in">
                    {/* Image */}
                    <div className="relative h-64 overflow-hidden bg-gradient-to-br from-blue-500/10 to-purple-500/10">
                        {item.image ? (
                            <img
                                src={item.image}
                                alt={item.title}
                                className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
                            />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center text-6xl bg-gradient-to-br from-blue-500/20 to-purple-500/20">
                                {item.emoji || '📦'}
                            </div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div className="absolute top-4 right-4 glass px-3 py-1 rounded-full">
                            <span className="text-sm font-bold text-blue-400">{item.category}</span>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="p-6">
                        <h3 className="text-2xl font-black mb-2 group-hover:text-blue-400 transition">{item.title}</h3>
                        <p className="text-gray-400 text-sm mb-4 line-clamp-2">{item.description}</p>

                        {/* Meta Info */}
                        <div className="space-y-2 mb-4 text-sm text-gray-400">
                            <div className="flex items-center gap-2">
                                <span>📍</span> {item.location}
                            </div>
                            <div className="flex items-center gap-2">
                                <span>⏰</span> {item.date || 'Recently'}
                            </div>
                            {item.karma && (
                                <div className="flex items-center gap-2 text-blue-400">
                                    <span>⭐</span> Karma: {item.karma}
                                </div>
                            )}
                        </div>

                        {/* Reporter Info */}
                        <div className="flex items-center gap-3 mb-6 pb-6 border-b border-blue-500/20">
                            <img src={item.reporterImg || `https://i.pravatar.cc/150?u=${item.reporter}`} alt={item.reporter} className="w-10 h-10 rounded-full border border-blue-500" />
                            <div>
                                <p className="text-xs text-gray-500">Reported by</p>
                                <p className="font-bold text-sm">{item.reporter}</p>
                            </div>
                        </div>

                        {/* Actions */}
                        <div className="flex gap-3">
                            <a
                                href={`https://wa.me/${item.phone || '2349123456789'}?text=Hi, I found the ${item.title} you lost. I have it on UniFind.`}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 btn-glow py-3 rounded-lg font-bold text-white text-center transition-all"
                            >
                                💬 Contact
                            </a>
                            <button
                                onClick={() => setLiked(!liked)}
                                className={`px-4 py-3 rounded-lg transition-all ${liked ? 'bg-red-500/30 text-red-400' : 'glass text-gray-400'}`}
                            >
                                {liked ? '❤️' : '🤍'}
                            </button>
                            <button className="px-4 py-3 rounded-lg glass text-gray-400 hover:text-blue-400 transition">
                                🗺️
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // DASHBOARD PAGE
        // ════════════════════════════════════════════════════════════════════════════
        function DashboardPage({ onAuthClick }) {
            const { items, currentUser } = useApp();
            const [filteredItems, setFilteredItems] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState("All");
            const [searchTerm, setSearchTerm] = useState("");

            const categories = ["All", "Electronics", "Accessories", "Documents", "Luxury", "Books"];

            useEffect(() => {
                let itemsList = items;

                if (selectedCategory !== "All") {
                    itemsList = itemsList.filter(item => item.category === selectedCategory);
                }

                if (searchTerm) {
                    itemsList = itemsList.filter(item =>
                        item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.location.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                setFilteredItems(itemsList);
            }, [items, selectedCategory, searchTerm]);

            return (
                <div className="min-h-screen pb-20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24">
                        {/* Header */}
                        <div className="mb-12 animate-slide-in">
                            <h2 className="text-5xl font-black mb-4 gradient-text">All Lost Items</h2>
                            <p className="text-xl text-gray-400">Browse {filteredItems.length} items and help reunite them</p>
                        </div>

                        {/* Search & Filter */}
                        <div className="mb-12 space-y-6 animate-slide-in" style={{animationDelay: '0.1s'}}>
                            {/* Search Bar */}
                            <div className="glass-dark rounded-2xl p-2 flex items-center gap-2">
                                <input
                                    type="text"
                                    placeholder="Search items, locations... 🔍"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="flex-1 bg-transparent text-white placeholder-gray-500 outline-none px-6 py-3"
                                />
                            </div>

                            {/* Categories */}
                            <div className="flex gap-3 flex-wrap">
                                {categories.map(category => (
                                    <button
                                        key={category}
                                        onClick={() => setSelectedCategory(category)}
                                        className={`px-6 py-3 rounded-full font-bold transition-all ${
                                            selectedCategory === category
                                                ? 'btn-glow text-white'
                                                : 'glass text-gray-300 hover:text-blue-400'
                                        }`}
                                    >
                                        {category}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Items Grid */}
                        {filteredItems.length === 0 ? (
                            <div className="text-center py-20">
                                <div className="text-6xl mb-4">😔</div>
                                <p className="text-xl text-gray-400">No items found. Try different filters.</p>
                                {!currentUser && (
                                    <button
                                        onClick={() => onAuthClick('signup')}
                                        className="mt-8 btn-glow px-8 py-4 rounded-xl font-bold text-white"
                                    >
                                        📸 Post Your First Item
                                    </button>
                                )}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredItems.map((item, idx) => (
                                    <div key={item.id} style={{animationDelay: `${idx * 0.1}s`}}>
                                        <ItemCard item={item} />
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* CTA for Non-Auth Users */}
                        {!currentUser && filteredItems.length > 0 && (
                            <div className="glass-dark rounded-2xl p-12 text-center mt-20 animate-slide-in">
                                <h3 className="text-3xl font-black mb-4">Found Something? Be a Hero!</h3>
                                <p className="text-gray-300 mb-8 text-lg">Post your found items and help students recover their belongings.</p>
                                <button
                                    onClick={() => onAuthClick('signup')}
                                    className="btn-glow px-10 py-4 rounded-xl font-bold text-white text-lg"
                                >
                                    📸 Post Item & Earn Karma
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // AUTH MODAL
        // ════════════════════════════════════════════════════════════════════════════
        function AuthModal({ mode, onClose }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const isSignup = mode === 'signup';

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);

                try {
                    if (isSignup) {
                        const result = await auth.createUserWithEmailAndPassword(email, password);
                        await result.user.updateProfile({
                            displayName: name
                        });
                        await db.collection("users").doc(result.user.uid).set({
                            name,
                            email,
                            phone,
                            createdAt: new Date(),
                            verified: false,
                            karma: 0
                        });
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                    onClose();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleGoogleAuth = async () => {
                try {
                    setLoading(true);
                    const result = await auth.signInWithPopup(googleProvider);
                    const userRef = db.collection("users").doc(result.user.uid);
                    const doc = await userRef.get();
                    if (!doc.exists) {
                        await userRef.set({
                            name: result.user.displayName,
                            email: result.user.email,
                            photoURL: result.user.photoURL,
                            createdAt: new Date(),
                            verified: true,
                            karma: 10
                        });
                    }
                    onClose();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="glass-dark rounded-3xl p-8 max-w-md w-full space-y-6 animate-slide-in">
                        <button
                            onClick={onClose}
                            className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl"
                        >
                            ×
                        </button>

                        <div>
                            <h2 className="text-3xl font-black mb-2 gradient-text">{isSignup ? 'Join UniFind' : 'Welcome Back'}</h2>
                            <p className="text-gray-400">
                                {isSignup
                                    ? 'Sign up to post and track found items'
                                    : 'Sign in to your UniFind account'}
                            </p>
                        </div>

                        {error && (
                            <div className="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg text-sm">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleEmailAuth} className="space-y-4">
                            {isSignup && (
                                <>
                                    <input
                                        type="text"
                                        placeholder="Full Name"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        required
                                        className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border focus:border-blue-500"
                                    />
                                    <input
                                        type="tel"
                                        placeholder="WhatsApp Number (with country code)"
                                        value={phone}
                                        onChange={(e) => setPhone(e.target.value)}
                                        className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border focus:border-blue-500"
                                    />
                                </>
                            )}
                            <input
                                type="email"
                                placeholder="Email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                                className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border focus:border-blue-500"
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                                className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border focus:border-blue-500"
                            />
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full btn-glow py-3 rounded-xl font-bold text-white hover:scale-105 transition-transform disabled:opacity-50"
                            >
                                {loading ? <span className="spinner mx-auto"></span> : (isSignup ? '🚀 Create Account' : '🔓 Sign In')}
                            </button>
                        </form>

                        <div className="relative">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-600"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-2 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-gray-400">Or</span>
                            </div>
                        </div>

                        <button
                            onClick={handleGoogleAuth}
                            disabled={loading}
                            className="w-full glass py-3 rounded-xl font-bold text-white hover:bg-white/10 transition-all disabled:opacity-50"
                        >
                            🔐 Sign in with Google
                        </button>

                        <div className="text-center">
                            <p className="text-gray-400 text-sm">
                                {isSignup ? 'Already have an account?' : "Don't have an account?"}{' '}
                                <button className="text-blue-400 hover:text-blue-300 font-bold">
                                    {isSignup ? 'Login' : 'Sign Up'}
                                </button>
                            </p>
                        </div>

                        <p className="text-xs text-gray-500 text-center border-t border-gray-700 pt-6">
                            By continuing, you agree to our Terms. We never share your data.
                        </p>
                    </div>
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // MAIN APP COMPONENT
        // ════════════════════════════════════════════════════════════════════════════
        function AppContent() {
            const { loading } = useApp();
            const [authMode, setAuthMode] = useState(null);
            const { items } = useApp();

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="spinner mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading UniFind...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
                    <Navbar onAuthClick={setAuthMode} onProfileClick={() => {}} />
                    
                    <HeroSection onAuthClick={setAuthMode} items={items} />
                    <DashboardPage onAuthClick={setAuthMode} />

                    {/* Footer */}
                    <footer className="border-t border-blue-500/10 glass-dark py-12 mt-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                                <div>
                                    <h3 className="font-black text-lg mb-4 gradient-text">UniFind</h3>
                                    <p className="text-gray-400 text-sm">Production-Grade University Lost & Found Platform</p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Product</h4>
                                    <ul className="space-y-2 text-sm text-gray-400">
                                        <li><button className="hover:text-blue-400 transition">Browse Items</button></li>
                                        <li><button className="hover:text-blue-400 transition" onClick={() => setAuthMode('signup')}>Post Item</button></li>
                                        <li><button className="hover:text-blue-400 transition">How it Works</button></li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Company</h4>
                                    <ul className="space-y-2 text-sm text-gray-400">
                                        <li><button className="hover:text-blue-400 transition">About Us</button></li>
                                        <li><button className="hover:text-blue-400 transition">Privacy</button></li>
                                        <li><button className="hover:text-blue-400 transition">Terms</button></li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Support</h4>
                                    <a
                                        href="https://wa.me/2349123456789?text=Hi, I'm interested in UniFind!"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="btn-glow px-6 py-2 rounded-lg font-bold text-white text-sm block text-center"
                                    >
                                        💬 Talk to Developer
                                    </a>
                                </div>
                            </div>
                            <div className="border-t border-blue-500/10 pt-8 text-center text-gray-500 text-sm">
                                <p>© 2024 UniFind. Built with ❤️ by Ft-bit</p>
                            </div>
                        </div>
                    </footer>

                    {/* Modals */}
                    {authMode && <AuthModal mode={authMode} onClose={() => setAuthMode(null)} />}
                </div>
            );
        }

        // ════════════════════════════════════════════════════════════════════════════
        // ROOT RENDER
        // ════════════════════════════════════════════════════════════════════════════
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <AppContent />
            </AppProvider>
        );
    </script>
</body>
</html>
