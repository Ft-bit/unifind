<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>UniFind — Campus Lost & Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.4/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
/* ══════════════════ RESET & BASE ══════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;height:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#020409;color:#ECEFFE;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;cursor:none;
}
#root{min-height:100vh}
input,textarea,select,button{font-family:inherit}
a{color:inherit;text-decoration:none}
button{cursor:none;border:none;background:none}
::selection{background:rgba(111,76,255,.35);color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(111,76,255,.4);border-radius:99px}
select option{background:#08091a}

/* ══════════════════ CSS VARIABLES ══════════════════ */
:root{
  --p:#6F4CFF;
  --p2:#9B72FF;
  --p3:#C4A8FF;
  --cyan:#00D9F5;
  --green:#00E5A0;
  --rose:#FF4D6D;
  --amber:#FFB547;
  --bg:#020409;
  --bg2:#06071A;
  --sf:rgba(255,255,255,.042);
  --sfh:rgba(255,255,255,.072);
  --bd:rgba(111,76,255,.15);
  --bdh:rgba(111,76,255,.32);
  --txt:#ECEFFE;
  --sub:rgba(200,205,255,.52);
  --muted:rgba(160,168,220,.3);
}

/* ══════════════════ CUSTOM CURSOR ══════════════════ */
#cursor{
  position:fixed;top:0;left:0;width:12px;height:12px;
  border-radius:50%;background:var(--p);
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform .08s,background .2s,width .2s,height .2s,opacity .2s;
  mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;top:0;left:0;width:36px;height:36px;
  border-radius:50%;border:1.5px solid rgba(111,76,255,.5);
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform .18s cubic-bezier(.22,1,.36,1),width .25s,height .25s,border-color .2s,opacity .2s;
}
body:has(button:hover) #cursor,body:has(a:hover) #cursor{width:24px;height:24px;background:var(--p2)}
body:has(button:hover) #cursor-ring,body:has(a:hover) #cursor-ring{width:60px;height:60px;border-color:rgba(111,76,255,.3)}

/* ══════════════════ BACKGROUND SCENE ══════════════════ */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.orb-1{width:900px;height:900px;top:-20%;left:-15%;
  background:radial-gradient(circle,rgba(111,76,255,.18) 0%,transparent 65%);
  animation:orbA 24s ease-in-out infinite}
.orb-2{width:700px;height:700px;top:10%;right:-15%;
  background:radial-gradient(circle,rgba(0,217,245,.11) 0%,transparent 65%);
  animation:orbB 30s ease-in-out infinite}
.orb-3{width:600px;height:600px;bottom:-10%;left:25%;
  background:radial-gradient(circle,rgba(155,114,255,.14) 0%,transparent 65%);
  animation:orbC 19s ease-in-out infinite}
@keyframes orbA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(80px,-50px) scale(1.08)}66%{transform:translate(-40px,60px) scale(.95)}}
@keyframes orbB{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-100px,40px) scale(1.12)}66%{transform:translate(50px,-70px) scale(.92)}}
@keyframes orbC{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,80px) scale(1.1)}66%{transform:translate(-60px,-40px) scale(.93)}}

.bg-grid{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(111,76,255,.024) 1px,transparent 1px),
    linear-gradient(90deg,rgba(111,76,255,.024) 1px,transparent 1px);
  background-size:80px 80px;
}
.bg-grain{
  position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}
.bg-vignette{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 35%,rgba(2,4,9,.75) 100%);
}

/* ══════════════════ KEYFRAMES ══════════════════ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes ping{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(3);opacity:0}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes toastIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes borderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float1{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(1deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(-1.5deg)}}
@keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes clipReveal{from{clip-path:inset(0 100% 0 0);opacity:0}to{clip-path:inset(0 0% 0 0);opacity:1}}

/* ══════════════════ TYPOGRAPHY CLASSES ══════════════════ */
.display{font-family:'Clash Display',sans-serif;letter-spacing:-.04em}
.syne{font-family:'Syne',sans-serif}
.grad-text{
  background:linear-gradient(135deg,#6F4CFF 0%,#9B72FF 35%,#00D9F5 70%,#00E5A0 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 6s ease infinite;
}

/* ══════════════════ NAV ══════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:20px 48px;
  display:flex;align-items:center;justify-content:space-between;
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .1s both;
}
.nav-inner{
  display:flex;align-items:center;gap:32px;
  background:rgba(6,7,26,.75);
  border:1px solid rgba(111,76,255,.14);
  backdrop-filter:blur(28px);
  border-radius:99px;padding:8px 8px 8px 24px;
}
.nav-link{font-size:13px;font-weight:500;color:var(--sub);transition:color .2s}
.nav-link:hover{color:var(--txt)}
.nav-cta{
  padding:9px 22px;border-radius:99px;
  background:linear-gradient(135deg,#4C32D4,#6F4CFF);
  border:none;font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 4px 20px rgba(111,76,255,.38);
  transition:transform .15s,box-shadow .18s;
}
.nav-cta:hover{transform:scale(1.04);box-shadow:0 8px 32px rgba(111,76,255,.55)}

/* ══════════════════ HERO ══════════════════ */
.hero{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;align-items:center;
  padding:120px 96px 80px;
  overflow:hidden;
}
.hero-content{max-width:680px;position:relative;z-index:2}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(111,76,255,.1);
  border:1px solid rgba(111,76,255,.28);
  border-radius:99px;padding:6px 16px 6px 8px;
  font-size:12px;font-weight:600;color:var(--p3);
  animation:fadeUp .7s cubic-bezier(.22,1,.36,1) .3s both;
}
.hero-badge-dot{
  width:22px;height:22px;border-radius:50%;
  background:rgba(111,76,255,.2);
  display:flex;align-items:center;justify-content:center;
}
.hero-badge-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--p);display:block}
.hero-h1{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(3.5rem,8vw,8rem);
  font-weight:700;line-height:.94;
  letter-spacing:-.05em;
  color:var(--txt);
  margin-top:28px;
}
.hero-word{
  display:block;overflow:hidden;
  animation:clipReveal 1s cubic-bezier(.22,1,.36,1) both;
}
.hw1{animation-delay:.42s}
.hw2{animation-delay:.6s}
.hw3{animation-delay:.76s}
.hero-sub{
  font-size:clamp(14px,1.5vw,17px);font-weight:300;
  color:var(--sub);line-height:1.8;max-width:420px;
  margin-top:24px;
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 1s both;
}
.hero-actions{
  display:flex;gap:14px;margin-top:36px;flex-wrap:wrap;
  animation:fadeUp .7s cubic-bezier(.22,1,.36,1) 1.1s both;
}
.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 36px;border-radius:14px;
  background:linear-gradient(135deg,#4C32D4,#6F4CFF,#9B72FF);
  background-size:200% 200%;
  border:none;font-size:15px;font-weight:700;color:#fff;
  box-shadow:0 8px 36px rgba(111,76,255,.42),inset 0 1px 0 rgba(255,255,255,.15);
  transition:transform .18s,box-shadow .2s;
  position:relative;overflow:hidden;
  animation:shimmer 4s ease infinite;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.15) 50%,transparent 70%);
  background-size:200% 100%;animation:shimmer 2.5s infinite;
}
.btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 52px rgba(111,76,255,.6),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-outline{
  display:inline-flex;align-items:center;gap:8px;
  padding:15px 28px;border-radius:14px;
  background:transparent;border:1px solid rgba(255,255,255,.1);
  font-size:14px;font-weight:600;color:var(--sub);
  transition:background .15s,border-color .15s,color .15s,transform .15s;
}
.btn-outline:hover{background:rgba(255,255,255,.06);border-color:rgba(111,76,255,.4);color:var(--txt);transform:translateY(-1px)}

/* ══════════════════ 3D TILT CARDS ══════════════════ */
.tilt-card{
  transform-style:preserve-3d;
  transition:transform .1s;
  will-change:transform;
}

/* ══════════════════ FLOATING CARDS ══════════════════ */
.float-zone{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:min(460px,40vw);padding-right:64px;
  display:flex;flex-direction:column;gap:14px;
  pointer-events:none;
}
.fcard{
  border-radius:18px;padding:16px 18px;
  background:rgba(6,7,26,.88);
  border:1px solid rgba(111,76,255,.18);
  backdrop-filter:blur(24px);
  position:relative;overflow:hidden;
}
.fcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(111,76,255,.5),rgba(0,217,245,.3),transparent);
}
.fc1{animation:cardIn 1s cubic-bezier(.22,1,.36,1) 1.0s both,float1 8s ease-in-out 2s infinite;margin-left:auto;width:92%}
.fc2{animation:cardIn 1s cubic-bezier(.22,1,.36,1) 1.15s both,float2 10s ease-in-out 2s infinite;width:80%}
.fc3{animation:cardIn 1s cubic-bezier(.22,1,.36,1) 1.3s both,float3 7s ease-in-out 2s infinite;margin-left:auto;width:88%}
.fc4{animation:cardIn 1s cubic-bezier(.22,1,.36,1) 1.45s both,float1 9s ease-in-out 2s infinite reverse;width:72%;margin-left:auto}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.07em;
  padding:3px 10px;border-radius:99px;text-transform:uppercase;
}

/* ══════════════════ STATS BAND ══════════════════ */
.stats-band{
  position:relative;z-index:10;
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid rgba(111,76,255,.1);
  border-bottom:1px solid rgba(111,76,255,.1);
  background:rgba(2,4,9,.7);
  backdrop-filter:blur(20px);
}
.stat-cell{
  padding:32px 36px;
  border-right:1px solid rgba(111,76,255,.1);
  position:relative;overflow:hidden;
  transition:background .25s;
}
.stat-cell:last-child{border-right:none}
.stat-cell:hover{background:rgba(111,76,255,.05)}
.stat-cell::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--color,var(--p)),transparent);
  transform:scaleX(0);transition:transform .3s;transform-origin:center;
}
.stat-cell:hover::after{transform:scaleX(1)}

/* ══════════════════ TICKER ══════════════════ */
.ticker-wrap{
  position:relative;z-index:10;
  overflow:hidden;
  border-bottom:1px solid rgba(111,76,255,.08);
  mask-image:linear-gradient(90deg,transparent,black 6%,black 94%,transparent);
}
.ticker-inner{display:flex;animation:ticker 28s linear infinite}
.t-item{
  display:flex;align-items:center;gap:36px;
  padding:16px 0;white-space:nowrap;
  font-size:12px;font-weight:600;letter-spacing:.07em;
  color:rgba(160,168,220,.35);text-transform:uppercase;
}
.t-dot{width:5px;height:5px;border-radius:50%;background:rgba(111,76,255,.55);flex-shrink:0}

/* ══════════════════ FEATURES ══════════════════ */
.features{position:relative;z-index:10;padding:100px 96px}
.section-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.16em;
  color:var(--p);text-transform:uppercase;margin-bottom:16px;
}
.section-h2{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(2rem,4vw,3.5rem);
  font-weight:700;letter-spacing:-.04em;
  color:var(--txt);line-height:1.05;max-width:580px;
}
.feat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:rgba(111,76,255,.08);
  border:1px solid rgba(111,76,255,.08);
  border-radius:24px;overflow:hidden;
  margin-top:56px;
}
.feat-cell{
  background:var(--bg);
  padding:36px 32px;
  position:relative;overflow:hidden;
  transition:background .25s;
}
.feat-cell:hover{background:rgba(6,7,26,.95)}
.feat-cell::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(111,76,255,.07) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.feat-cell:hover::after{opacity:1}
.feat-icon-wrap{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:20px;
}
.feat-h{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--txt);margin-bottom:10px}
.feat-p{font-size:13.5px;color:var(--sub);line-height:1.72;font-weight:300}

/* ══════════════════ KARMA SHOWCASE ══════════════════ */
.karma-section{
  position:relative;z-index:10;
  padding:0 96px 100px;
  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;
}
.karma-visual{
  position:relative;height:420px;
}
.karma-ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;transform:translate(-50%,-50%);
  border:1px solid rgba(111,76,255,.12);
}
.karma-center{
  position:absolute;top:50%;left:50%;
  width:160px;height:160px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:linear-gradient(135deg,rgba(111,76,255,.15),rgba(0,217,245,.08));
  border:1px solid rgba(111,76,255,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(111,76,255,.2),inset 0 0 30px rgba(111,76,255,.05);
}

/* ══════════════════ TESTIMONIALS ══════════════════ */
.testi-section{position:relative;z-index:10;padding:0 96px 100px}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.testi-card{
  border-radius:20px;padding:28px;
  background:rgba(6,7,26,.7);
  border:1px solid rgba(111,76,255,.12);
  transition:transform .22s,border-color .22s,box-shadow .22s;
  position:relative;overflow:hidden;
}
.testi-card:hover{transform:translateY(-4px);border-color:rgba(111,76,255,.28);box-shadow:0 20px 60px rgba(0,0,0,.35),0 0 0 1px rgba(111,76,255,.1)}
.testi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(111,76,255,.35),transparent);
}

/* ══════════════════ CTA SECTION ══════════════════ */
.cta-section{
  position:relative;z-index:10;
  padding:0 96px 120px;
  text-align:center;
}
.cta-card{
  max-width:680px;margin:0 auto;
  border-radius:32px;padding:72px 64px;
  background:rgba(6,7,26,.9);
  border:1px solid rgba(111,76,255,.2);
  backdrop-filter:blur(40px);
  position:relative;overflow:hidden;
}
.cta-card::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(111,76,255,.8),rgba(0,217,245,.4),transparent);
}
.cta-glow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:500px;height:250px;
  background:radial-gradient(ellipse,rgba(111,76,255,.2) 0%,transparent 65%);
  pointer-events:none;filter:blur(40px);
}

/* ══════════════════ AUTH SHEET ══════════════════ */
.auth-overlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .25s ease;
}
.auth-scrim{
  position:absolute;inset:0;
  background:rgba(2,4,9,.85);backdrop-filter:blur(20px);
}
.auth-sheet{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  background:linear-gradient(160deg,rgba(8,9,28,.98),rgba(4,5,18,.98));
  border:1px solid rgba(111,76,255,.22);
  border-radius:28px;padding:44px;
  box-shadow:0 0 0 1px rgba(111,76,255,.08),0 60px 120px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.06);
  animation:slideRight .42s cubic-bezier(.22,1,.36,1);
}
.auth-topline{
  position:absolute;top:0;left:18%;right:18%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(111,76,255,.8),rgba(0,217,245,.4),transparent);
}
.auth-field{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(111,76,255,.14);
  border-radius:12px;overflow:hidden;
  display:flex;align-items:center;
  transition:border-color .15s,background .15s,box-shadow .15s;
}
.auth-field:focus-within{
  border-color:rgba(111,76,255,.55);
  background:rgba(111,76,255,.07);
  box-shadow:0 0 0 3px rgba(111,76,255,.12);
}

/* ══════════════════ DASHBOARD ══════════════════ */
.dash-wrap{display:flex;height:100vh;background:var(--bg);overflow:hidden}
.sidebar{
  flex-shrink:0;height:100vh;
  display:flex;flex-direction:column;
  border-right:1px solid rgba(111,76,255,.1);
  background:rgba(3,4,15,.98);
  position:relative;z-index:20;

/* ── Magnetic hook ──────────────────────────────────── */
function useMagnetic(strength=0.35){
  const ref=React.useRef(null);
  const[pos,setPos]=React.useState({x:0,y:0});
  const onMove=React.useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    setPos({x:(e.clientX-cx)*strength,y:(e.clientY-cy)*strength});
  },[strength]);
  const onLeave=()=>setPos({x:0,y:0});
  return{ref,style:{transform:`translate(${pos.x}px,${pos.y}px)`,transition:'transform .3s cubic-bezier(.22,1,.36,1)'},onMouseMove:onMove,onMouseLeave:onLeave};
}

/* ── 3D Tilt hook ───────────────────────────────────── */
function useTilt(max=8){
  const ref=React.useRef(null);
  const[tilt,setTilt]=React.useState({x:0,y:0});
  const onMove=e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*max*2;
    const y=-((e.clientY-r.top)/r.height-.5)*max*2;
    setTilt({x,y});
  };
  const onLeave=()=>setTilt({x:0,y:0});
  return{ref,style:{transform:`perspective(800px) rotateY(${tilt.x}deg) rotateX(${tilt.y}deg)`,transition:'transform .15s'},onMouseMove:onMove,onMouseLeave:onLeave};
}

    }

    setErr('');

      }else{
        await auth.signInWithEmailAndPassword(email,pw);
      }
    }catch(e){setErr(fbErr(e.code));}
    setLoading(false);
  };

        </div>

      {/* ═══ FOOTER ═══ */}
      <footer style={{position:'relative',zIndex:10,padding:'28px 96px',borderTop:'1px solid rgba(111,76,255,.08)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:26,height:26,borderRadius:7,background:'linear-gradient(135deg,#4C32D4,#9B72FF)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{I.logo}</div>
          <span style={{fontFamily:'Clash Display,sans-serif',fontSize:15,fontWeight:700,color:'#ECEFFE',letterSpacing:'-.04em'}}>UniFind</span>

      {showAuth&&<AuthOverlay onClose={()=>setShowAuth(false)}/>}

  );
}

          </div>

              <div key={l} style={{padding:'11px 13px',borderRadius:10,background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)'}}>

              <div style={{fontSize:10,color:'rgba(160,168,220,.32)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>Description</div>
              <p style={{fontSize:13,color:'rgba(200,208,255,.55)',lineHeight:1.65}}>{item.desc}</p>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════════
   REPORT MODAL
════════════════════════════════════════════════════════ */
function ReportModal({initial,onClose,onSubmit}){
  const[step,setStep]=React.useState(1);
  const[drag,setDrag]=React.useState(false);
  const[img,setImg]=React.useState(null);
  const[fErr,setFErr]=React.useState('');
  const[form,setForm]=React.useState({type:initial?.type||'lost',title:'',cat:'Electronics',loc:'',desc:'',phone:''});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const furl=f=>{if(f&&f.size<5*1024*1024)setImg(URL.createObjectURL(f));};
  const go=()=>{
    setFErr('');
    if(step===1&&!form.title.trim()){setFErr('Enter the item name.');return;}
    if(step===2&&!form.loc){setFErr('Select a location.');return;}
    if(step===3){
      if(!form.phone.trim()){setFErr('Enter your WhatsApp number.');return;}
      onSubmit({...form,title:clean(form.title,120),desc:clean(form.desc,500),phone:form.phone.replace(/[^+\d\s\-(]/g,'').trim()});return;
    }
    setStep(s=>s+1);
  };
  const tc=form.type==='found'?'var(--green)':'var(--rose)';
  return(
    <Modal onClose={onClose}>
      <div style={{background:'linear-gradient(160deg,#07091c,#040616)',border:'1px solid rgba(111,76,255,.2)',borderRadius:20,overflow:'hidden',boxShadow:'0 50px 120px rgba(0,0,0,.9)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid rgba(111,76,255,.1)'}}>
          <div>
            <h2 style={{fontFamily:'Syne,sans-serif',fontSize:14,fontWeight:700,color:'#ECEFFE'}}>{form.type==='lost'?'Report Lost Item':'Report Found Item'}</h2>
            <div style={{display:'flex',gap:5,marginTop:8,alignItems:'center'}}>
              {[1,2,3].map(s=><div key={s} style={{height:3,borderRadius:99,overflow:'hidden',width:s<=step?20:8,background:'rgba(255,255,255,.07)',transition:'width .22s'}}><div style={{height:'100%',width:s<=step?'100%':'0%',background:s<step?'var(--green)':s===step?'var(--p)':'transparent',transition:'width .3s'}}/></div>)}
              <span style={{fontSize:11,color:'rgba(160,168,220,.32)',marginLeft:3}}>Step {step}/3</span>
            </div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:8,background:'rgba(255,255,255,.04)',border:'1px solid rgba(111,76,255,.14)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(160,168,220,.4)'}}>{I.x}</button>
        </div>
        <div style={{padding:'22px',minHeight:280}}>
          {step===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'flex',gap:9}}>
                {['lost','found'].map(t=>{const tc2=t==='found'?'var(--green)':'var(--rose)';return <button key={t} onClick={()=>upd('type',t)} style={{flex:1,padding:'11px',borderRadius:10,background:form.type===t?`${t==='found'?'rgba(0,229,160,.12)':'rgba(255,77,109,.1)'}`:' rgba(255,255,255,.028)',border:`1px solid ${form.type===t?(t==='found'?'rgba(0,229,160,.4)':'rgba(255,77,109,.35)'):'rgba(111,76,255,.1)'}`,fontSize:13,fontWeight:600,color:form.type===t?'#ECEFFE':'rgba(160,168,220,.45)',textTransform:'capitalize',transition:'all .14s'}}>{t==='lost'?'🔴 ':'🟢 '}I {t} this</button>;})}
              </div>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>Item Name</label>
                <div className="auth-field"><span style={{paddingLeft:13,color:'rgba(160,168,220,.32)',display:'flex',flexShrink:0}}>{I.pkg}</span><input placeholder="e.g. MacBook Pro, Student ID…" value={form.title} onChange={e=>upd('title',e.target.value)} maxLength={120} style={{flex:1,padding:'12px 13px',fontSize:14,color:'#ECEFFE',outline:'none',background:'transparent'}}/></div>
              </div>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>Category</label>
                <select value={form.cat} onChange={e=>upd('cat',e.target.value)} style={{width:'100%',padding:'12px 14px',borderRadius:11,background:'rgba(255,255,255,.04)',border:'1px solid rgba(111,76,255,.14)',fontSize:14,color:'#ECEFFE',outline:'none'}}>{CATS.filter(x=>x!=='All').map(x=><option key={x} value={x}>{x}</option>)}</select>
              </div>
            </div>
          )}
          {step===2&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>Photo (optional — max 5MB)</label>
                <label onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);furl(e.dataTransfer.files[0])}} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:110,borderRadius:12,border:`2px dashed ${drag?'var(--p)':'rgba(111,76,255,.2)'}`,background:drag?'rgba(111,76,255,.07)':'rgba(255,255,255,.02)',cursor:'pointer',position:'relative',overflow:'hidden',transition:'all .15s'}}>
                  {img?<><img src={img} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} alt="p"/><button onClick={e=>{e.preventDefault();setImg(null)}} style={{position:'absolute',top:8,right:8,width:22,height:22,borderRadius:'50%',background:'rgba(0,0,0,.7)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{I.x}</button></>:<><span style={{color:'rgba(160,168,220,.3)'}}>{I.upload}</span><span style={{fontSize:12,color:'rgba(160,168,220,.35)',marginTop:7}}>Drop image or <span style={{color:'var(--p)'}}>browse</span></span></>}
                  <input type="file" accept="image/jpeg,image/png,image/webp" style={{display:'none'}} onChange={e=>{if(e.target.files[0])furl(e.target.files[0])}}/>
                </label>
              </div>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>Location</label>
                <select value={form.loc} onChange={e=>upd('loc',e.target.value)} style={{width:'100%',padding:'12px 14px',borderRadius:11,background:'rgba(255,255,255,.04)',border:'1px solid rgba(111,76,255,.14)',fontSize:14,color:'#ECEFFE',outline:'none'}}><option value="">Select campus location…</option>{LOCS.map(l=><option key={l} value={l}>{l}</option>)}</select>
              </div>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>Description</label>
                <textarea value={form.desc} onChange={e=>upd('desc',e.target.value)} rows={3} placeholder="Color, brand, markings, serial number…" maxLength={500} style={{width:'100%',padding:'12px 14px',borderRadius:11,background:'rgba(255,255,255,.04)',border:'1px solid rgba(111,76,255,.14)',fontSize:13,color:'#ECEFFE',resize:'none',outline:'none'}}/>
              </div>
            </div>
          )}
          {step===3&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={{display:'block',fontSize:10.5,fontWeight:700,color:'rgba(160,168,220,.35)',marginBottom:7,letterSpacing:'.08em',textTransform:'uppercase'}}>WhatsApp Number</label>
                <div className="auth-field"><span style={{paddingLeft:13,color:'rgba(160,168,220,.32)',display:'flex',flexShrink:0}}>{I.msg}</span><input placeholder="+234 801 234 5678" value={form.phone} onChange={e=>upd('phone',e.target.value)} maxLength={20} style={{flex:1,padding:'12px 13px',fontSize:14,color:'#ECEFFE',outline:'none',background:'transparent'}}/></div>
              </div>
              <div style={{padding:'14px 16px',borderRadius:11,background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)'}}>
                <div style={{fontSize:10.5,color:'rgba(160,168,220,.32)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:11}}>Summary</div>
                {[['Type',form.type],['Item',form.title||'—'],['Category',form.cat],['Location',form.loc||'—']].map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}><span style={{color:'rgba(160,168,220,.38)'}}>{k}</span><span style={{fontWeight:600,color:'#ECEFFE',textTransform:'capitalize'}}>{v}</span></div>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:9,padding:'11px 14px',borderRadius:11,background:'rgba(111,76,255,.08)',border:'1px solid rgba(111,76,255,.18)'}}>
                <span style={{color:'var(--p)'}}>{I.sparkle}</span>
                <span style={{fontSize:12,color:'rgba(196,168,255,.75)'}}>Submitting earns <strong style={{color:'var(--p2)'}}>+{form.type==='found'?25:10} Karma Points</strong></span>
              </div>
            </div>
          )}
          {fErr&&<div style={{marginTop:11,padding:'9px 12px',borderRadius:9,background:'rgba(255,77,109,.09)',border:'1px solid rgba(255,77,109,.22)',display:'flex',alignItems:'center',gap:7}}><span style={{color:'var(--rose)',flexShrink:0}}>{I.alert}</span><span style={{fontSize:12,color:'#FFB3C1'}}>{fErr}</span></div>}
        </div>
        <div style={{display:'flex',gap:9,padding:'0 22px 22px'}}>
          {step>1&&<button onClick={()=>{setStep(s=>s-1);setFErr('');}} style={{padding:'10px 17px',borderRadius:10,background:'rgba(255,255,255,.04)',border:'1px solid rgba(111,76,255,.12)',fontSize:13,fontWeight:500,color:'rgba(160,168,220,.5)',transition:'background .14s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}>Back</button>}
          <button onClick={go} style={{flex:1,padding:'11px',borderRadius:10,background:'linear-gradient(135deg,#4C32D4,#6F4CFF)',border:'none',fontSize:13,fontWeight:700,color:'#fff',transition:'transform .15s,box-shadow .18s',boxShadow:'0 4px 20px rgba(111,76,255,.35)'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 8px 32px rgba(111,76,255,.55)';}} onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 20px rgba(111,76,255,.35)';}}>
            {step===3?'Submit Report':'Continue →'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════════
   MAP VIEW — REAL GOOGLE MAPS
════════════════════════════════════════════════════════ */
function MapView({items,setSel}){
  const mapRef=React.useRef(null);
  const[filter,setFilter]=React.useState('all');
  const[mapLoaded,setMapLoaded]=React.useState(false);
  const gmapRef=React.useRef(null);
  const markersRef=React.useRef([]);

  // Load Google Maps script once
  React.useEffect(()=>{
    if(window.google){setMapLoaded(true);return;}
    const script=document.createElement('script');
    script.src=`https://maps.googleapis.com/maps/api/js?key=${window._MAPS_KEY}&libraries=places`;
    script.async=true;
    script.onload=()=>setMapLoaded(true);
    script.onerror=()=>console.warn('Google Maps failed to load');
    document.head.appendChild(script);
  },[]);

  // Init map when loaded
  React.useEffect(()=>{
    if(!mapLoaded||!mapRef.current||gmapRef.current)return;
    gmapRef.current=new window.google.maps.Map(mapRef.current,{
      center:{lat:4.8156,lng:7.0481},
      zoom:16,
      styles:[
        {elementType:'geometry',stylers:[{color:'#0a0e24'}]},
        {elementType:'labels.text.stroke',stylers:[{color:'#06091a'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#6B7280'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#1a1f3c'}]},
        {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#11152c'}]},
        {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#1f2654'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#050a1f'}]},
        {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#3d5a7a'}]},
        {featureType:'poi',elementType:'geometry',stylers:[{color:'#0e1232'}]},
        {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#0c1a1c'}]},
        {featureType:'transit',elementType:'geometry',stylers:[{color:'#0c1128'}]},
      ],
      disableDefaultUI:false,
      mapTypeControl:false,
    });
  },[mapLoaded]);

  // Place markers when map is ready
  React.useEffect(()=>{
    if(!gmapRef.current||!window.google)return;
    // Clear old markers
    markersRef.current.forEach(m=>m.setMap(null));
    markersRef.current=[];
    const fil=items.filter(i=>filter==='all'||i.status===filter);
    fil.forEach(item=>{
      const color=item.status==='found'?'#00E5A0':'#6F4CFF';
      const label=item.status==='found'?'✓':'!';
      const marker=new window.google.maps.Marker({
        position:{lat:item.lat,lng:item.lng},
        map:gmapRef.current,
        title:item.title,
        icon:{
          path:window.google.maps.SymbolPath.CIRCLE,
          fillColor:color,fillOpacity:1,
          strokeColor:'#fff',strokeWeight:2,scale:10,
        },
        label:{text:label,color:'#fff',fontSize:'10px',fontWeight:'bold'},
        animation:window.google.maps.Animation.DROP,
      });
      const iw=new window.google.maps.InfoWindow({
        content:`<div style="background:#07091c;border:1px solid rgba(111,76,255,.3);border-radius:10px;padding:12px;font-family:DM Sans,sans-serif;min-width:180px"><div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">${item.status==='found'?'✅ Found':'🔴 Lost'}</div><div style="font-size:14px;font-weight:700;color:#ECEFFE;margin-bottom:3px">${san(item.title)}</div><div style="font-size:12px;color:rgba(160,168,220,.55)">${san(item.loc)}</div></div>`,
      });
      marker.addListener('click',()=>{iw.open(gmapRef.current,marker);setSel(item);});
      markersRef.current.push(marker);
    });
  },[mapLoaded,items,filter]);

  const fil=items.filter(i=>filter==='all'||i.status===filter);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* Tip banner */}
      <div style={{padding:'8px 16px',background:'rgba(111,76,255,.08)',borderBottom:'1px solid rgba(111,76,255,.12)',display:'flex',alignItems:'center',gap:7,flexShrink:0}}>
        <span style={{color:'var(--p)',display:'flex'}}>{I.map}</span>
        <span style={{fontSize:12,color:'rgba(196,168,255,.65)'}}>
          <strong style={{color:'var(--p)'}}>Google Maps live:</strong> Real campus locations. Click any pin to view the item.
        </span>
      </div>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {/* Google Map container */}
        <div ref={mapRef} id="gmap" style={{position:'absolute',inset:0}}/>
        {/* Loading state */}
        {!mapLoaded&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#03050f',zIndex:2}}>
            <div style={{textAlign:'center'}}>
              <div className="spin-el" style={{width:28,height:28,borderRadius:'50%',border:'2px solid rgba(111,76,255,.2)',borderTopColor:'var(--p)',margin:'0 auto 12px'}}/>
              <p style={{fontSize:13,color:'var(--muted)'}}>Loading campus map…</p>
            </div>
          </div>
        )}
        {/* HUD overlays */}
        <div style={{position:'absolute',top:12,left:12,zIndex:5,display:'flex',alignItems:'center',gap:8,padding:'7px 15px',borderRadius:10,background:'rgba(2,4,9,.88)',border:'1px solid rgba(111,76,255,.18)',backdropFilter:'blur(16px)'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'glowPulse 2s ease-in-out infinite'}}/>
          <span style={{fontSize:12,fontWeight:500,color:'var(--sub)'}}>Live · {fil.length} pins</span>
        </div>
        {/* Filter pills */}
        <div style={{position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8,zIndex:5}}>
          {[{id:'all',l:'All',n:items.length},{id:'lost',l:'🔴 Lost',n:items.filter(i=>i.status==='lost').length},{id:'found',l:'🟢 Found',n:items.filter(i=>i.status==='found').length}].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:'7px 16px',borderRadius:10,border:`1px solid ${filter===f.id?'rgba(111,76,255,.45)':'rgba(111,76,255,.14)'}`,background:filter===f.id?'rgba(2,4,9,.95)':'rgba(2,4,9,.78)',backdropFilter:'blur(16px)',fontSize:12,fontWeight:600,color:filter===f.id?'#ECEFFE':'var(--muted)',display:'flex',alignItems:'center',gap:5,transition:'all .15s'}}>
              {f.l} <span style={{opacity:.65}}>{f.n}</span>
            </button>
          ))}
        </div>
      </div>
      {/* Side list */}
      <div style={{flexShrink:0,height:180,borderTop:'1px solid rgba(111,76,255,.1)',overflowX:'auto',overflowY:'hidden',display:'flex',gap:8,padding:'10px 12px',background:'rgba(3,4,15,.98)'}}>
        {items.map(item=>{
          const c=item.status==='found'?'var(--green)':'var(--rose)';
          return(
            <button key={item.id} onClick={()=>setSel(item)} style={{flexShrink:0,width:160,padding:'11px',borderRadius:10,textAlign:'left',background:'rgba(255,255,255,.028)',border:`1px solid rgba(111,76,255,.1)`,transition:'all .14s',height:'fit-content'}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(111,76,255,.09)';e.currentTarget.style.borderColor='rgba(111,76,255,.28)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.028)';e.currentTarget.style.borderColor='rgba(111,76,255,.1)';}}>
              <span style={{fontSize:9,fontWeight:700,color:c,textTransform:'uppercase',letterSpacing:'.07em',display:'block',marginBottom:4}}>{item.status}</span>
              <span style={{fontSize:12,fontWeight:600,color:'#ECEFFE',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</span>
              <span style={{fontSize:10,color:'var(--muted)',display:'block',marginTop:2}}>{item.loc}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

                <div style={{fontSize:11,color:'var(--muted)',marginBottom:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.loc}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,fontWeight:600,padding:'3px 9px',borderRadius:99,background:`${item.status==='found'?'rgba(0,229,160,.12)':'rgba(255,77,109,.1)'}`,color:c,textTransform:'capitalize'}}>{item.status}</span>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{item.time}</span>
                </div>
              </button>
            );
          })}
        </div>
      )}
      {fil.length===0&&<div style={{textAlign:'center',paddingTop:80}}><div style={{fontSize:40,marginBottom:12}}>📦</div><p style={{fontSize:13,color:'var(--muted)'}}>No items match</p></div>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PROFILE VIEW
════════════════════════════════════════════════════════ */
function ProfileView({user}){
  const kc=user.karma>=100?'var(--amber)':'#94A3B8';
  const kl=user.karma>=100?'Gold':'Silver';
  return(
    <div style={{height:'100%',overflowY:'auto',padding:'20px 22px 52px'}}><div style={{maxWidth:640}}>
      {/* Hero */}
      <div style={{borderRadius:18,padding:'24px',background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.12)',marginBottom:16,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,right:0,width:220,height:220,borderRadius:'50%',background:'radial-gradient(circle,rgba(111,76,255,.1),transparent)',pointerEvents:'none',transform:'translate(30%,-30%)'}}/>
        <div style={{display:'flex',alignItems:'center',gap:18,position:'relative',zIndex:1,flexWrap:'wrap'}}>
          <div style={{width:54,height:54,borderRadius:15,overflow:'hidden',background:user.photo?'none':'linear-gradient(135deg,#4C32D4,#9B72FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:'#fff',flexShrink:0,boxShadow:'0 0 24px rgba(111,76,255,.3)'}}>
            {user.photo?<img src={user.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:user.name[0].toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <h2 style={{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:800,color:'#ECEFFE',letterSpacing:'-.04em'}}>{user.name}</h2>
            <p style={{fontSize:13,color:'var(--muted)'}}>{user.email}</p>
          </div>
          <button onClick={()=>auth.signOut()} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:9,background:'rgba(255,77,109,.09)',border:'1px solid rgba(255,77,109,.2)',fontSize:12,fontWeight:500,color:'var(--rose)',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,77,109,.18)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,77,109,.09)'}>{I.logout} Sign out</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',marginTop:20,paddingTop:20,borderTop:'1px solid rgba(111,76,255,.1)'}}>
          {[['Reported',5],['Returned',user.returned],['Helped',12]].map(([l,v])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontFamily:'Clash Display,sans-serif',fontSize:22,fontWeight:700,color:'#ECEFFE',letterSpacing:'-.04em'}}>{v}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {/* Karma */}
        <div style={{borderRadius:14,padding:'18px',background:`${user.karma>=100?'rgba(255,181,71,.07)':'rgba(148,163,184,.06)'}`,border:`1px solid ${user.karma>=100?'rgba(255,181,71,.18)':'rgba(148,163,184,.14)'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{width:34,height:34,borderRadius:9,background:`${user.karma>=100?'rgba(255,181,71,.18)':'rgba(148,163,184,.12)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⚡</div>
            <div>
              <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Karma</div>
              <div style={{fontFamily:'Clash Display,sans-serif',fontSize:24,fontWeight:700,color:'#ECEFFE',letterSpacing:'-.04em'}}>{user.karma}</div>
            </div>
            <div style={{marginLeft:'auto',padding:'4px 12px',borderRadius:99,background:`${user.karma>=100?'rgba(255,181,71,.2)':'rgba(148,163,184,.15)'}`,fontSize:12,fontWeight:700,color:kc}}>{kl}</div>
          </div>
          <div className="karma-bar"><div className="karma-fill" style={{width:`${(user.karma/150)*100}%`}}/></div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>{150-user.karma} pts to Platinum</div>
        </div>

        {/* Verification */}
        <div style={{borderRadius:14,padding:'18px',background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)'}}>
          <div style={{fontSize:10.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14}}>Verification</div>
          {[['Email address',true],['Google account',!!user.photo],['Student ID',user.verified],['Phone number',false]].map(([l,done])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:done?'rgba(0,229,160,.18)':'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:done?'var(--green)':'var(--muted)'}}>
                {done?I.check:I.clock}
              </div>
              <span style={{fontSize:12,flex:1,color:done?'var(--sub)':'var(--muted)'}}>{l}</span>
              {!done&&<button style={{fontSize:11,color:'var(--p)',background:'none',border:'none'}}>Setup →</button>}
            </div>
          ))}
        </div>

        {/* Achievements */}
        <div style={{gridColumn:'1/-1',borderRadius:14,padding:'18px',background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)'}}>
          <div style={{fontSize:10.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:16}}>Achievements</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(88px,1fr))',gap:10}}>
            {[['🏆','First Return',true],['⭐','5 Found',true],['🛡️','Verified',user.verified],['🔥','10 Found',false],['💎','Diamond',false],['🌟','Hero',false]].map(([icon,l,e])=>(
              <div key={l} style={{padding:'14px 8px',borderRadius:11,textAlign:'center',background:e?'rgba(111,76,255,.08)':'rgba(255,255,255,.02)',border:`1px solid ${e?'rgba(111,76,255,.2)':'rgba(255,255,255,.04)'}`,opacity:e?1:.32,transition:'transform .18s'}} onMouseEnter={ev=>{if(e)ev.currentTarget.style.transform='translateY(-2px)';}} onMouseLeave={ev=>ev.currentTarget.style.transform='translateY(0)'}>
                <div style={{fontSize:24,marginBottom:5}}>{icon}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div></div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════════════ */
function AppShell({fbUser}){
  const[section,setSection]=React.useState('dashboard');
  const[items,setItems]=React.useState(SEED);
  const[sel,setSel]=React.useState(null);
  const[rep,setRep]=React.useState(null);
  const[toast,setToast]=React.useState(null);
  const[col,setCol]=React.useState(false);
  const[sq,setSq]=React.useState('');
  const[showN,setShowN]=React.useState(false);

  const user={
    name:fbUser.displayName||fbUser.email?.split('@')[0]||'User',
    email:fbUser.email,photo:fbUser.photoURL,
    karma:120,verified:!!fbUser.emailVerified||!!fbUser.displayName,returned:3,
  };

  const notifs=[
    {id:1,text:'Your MacBook report got 5 views',time:'3m ago',u:true},
    {id:2,text:'Amaka O. may have found your item',time:'1h ago',u:true},
    {id:3,text:'+25 Karma awarded for your report',time:'3h ago',u:false},
  ];

  const addItem=form=>{
    const c={
      title:clean(form.title,120)||'Untitled',
      cat:CATS.includes(form.cat)?form.cat:'Other',
      type:form.type==='found'?'found':'lost',
      loc:LOCS.includes(form.loc)?form.loc:'Unknown',
      desc:clean(form.desc,500),
      phone:form.phone.replace(/[^+\d\s\-(]/g,'').trim(),
    };
    setItems(p=>[{
      id:Date.now(),title:c.title,cat:c.cat,status:c.type,loc:c.loc,
      rep:san(user.name),time:'just now',desc:c.desc,
      karma:c.type==='found'?25:10,phone:c.phone||'2340000000000',
      verified:user.verified,
      lat:4.8148+Math.random()*.004,lng:7.0465+Math.random()*.006,
    },...p]);
    setToast(c.type==='found'?'Found item reported · +25 Karma ✓':'Lost item reported successfully ✓');
    setRep(null);
  };

  const nav=[
    {id:'dashboard',icon:I.home,label:'Dashboard'},
    {id:'map',icon:I.map,label:'Live Map'},
    {id:'items',icon:I.pkg,label:'Items'},
    {id:'profile',icon:I.user,label:'Profile'},
  ];
  const SB=col?56:220;

  return(
    <div className="dash-wrap">
      {/* SIDEBAR */}
      <div className="sidebar" style={{width:SB,minWidth:SB}}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 12px',height:58,borderBottom:'1px solid rgba(111,76,255,.1)',flexShrink:0,overflow:'hidden'}}>
          <div style={{width:28,height:28,borderRadius:8,background:'linear-gradient(135deg,#4C32D4,#9B72FF)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff',boxShadow:'0 0 16px rgba(111,76,255,.35)'}}>{I.logo}</div>
          <span className="sb-txt" style={{fontFamily:'Clash Display,sans-serif',fontSize:15,fontWeight:700,color:'#ECEFFE',letterSpacing:'-.04em',whiteSpace:'nowrap',opacity:col?0:1,transition:'opacity .2s'}}>UniFind</span>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:'10px 8px',display:'flex',flexDirection:'column',gap:2}}>
          {nav.map(({id,icon,label})=>{
            const active=section===id;
            return(
              <button key={id} onClick={()=>setSection(id)} className={`nav-item${active?' active':''}`} style={{color:active?'var(--p2)':'var(--muted)'}}>
                <span style={{flexShrink:0,display:'flex',opacity:active?1:.65}}>{icon}</span>
                <span className="sb-txt" style={{fontSize:13,fontWeight:active?600:400,color:active?'#ECEFFE':'var(--sub)',whiteSpace:'nowrap',opacity:col?0:1,transition:'opacity .2s'}}>{label}</span>
              </button>
            );
          })}
          <div style={{marginTop:8}}>
            <button onClick={()=>setRep({type:'lost'})} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 11px',borderRadius:9,background:'rgba(111,76,255,.1)',border:'1px solid rgba(111,76,255,.22)',overflow:'hidden',transition:'border-color .14s'}} onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(111,76,255,.45)'} onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(111,76,255,.22)'}>
              <span style={{color:'var(--p)',flexShrink:0,display:'flex'}}>{I.plus}</span>
              <span className="sb-txt" style={{fontSize:13,fontWeight:600,color:'var(--p2)',whiteSpace:'nowrap',opacity:col?0:1,transition:'opacity .2s'}}>Report Item</span>
            </button>
          </div>
        </nav>

        {/* User */}
        <div style={{padding:'10px 8px',borderTop:'1px solid rgba(111,76,255,.1)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,background:'rgba(255,255,255,.028)',overflow:'hidden'}}>
            <div style={{width:26,height:26,borderRadius:7,flexShrink:0,overflow:'hidden',background:user.photo?'none':'linear-gradient(135deg,#4C32D4,#9B72FF)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>
              {user.photo?<img src={user.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:user.name[0].toUpperCase()}
            </div>
            <div className="sb-txt" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',justifyContent:'space-between',opacity:col?0:1,transition:'opacity .2s'}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:'#ECEFFE',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.name}</div>
                <div style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.email}</div>
              </div>
              <button onClick={()=>auth.signOut()} style={{background:'none',border:'none',color:'var(--muted)',display:'flex',marginLeft:6,flexShrink:0,transition:'color .14s'}} onMouseEnter={e=>e.currentTarget.style.color='var(--rose)'} onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
                {I.logout}
              </button>
            </div>
          </div>
        </div>

        {/* Collapse toggle */}
        <button onClick={()=>setCol(s=>!s)} style={{position:'absolute',top:18,right:-12,width:24,height:24,borderRadius:'50%',background:'#0a0d20',border:'1px solid rgba(111,76,255,.16)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:30,color:'var(--muted)'}}>
          <span style={{display:'block',transform:col?'rotate(0)':'rotate(180deg)',transition:'transform .3s'}}>{I.chevR}</span>
        </button>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* Topbar */}
        <header style={{display:'flex',alignItems:'center',gap:12,padding:'0 22px',height:58,borderBottom:'1px solid rgba(111,76,255,.1)',background:'rgba(2,4,9,.92)',backdropFilter:'blur(18px)',flexShrink:0,zIndex:10}}>
          <div style={{flex:1,maxWidth:380}}>
            <div style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)',borderRadius:9,padding:'7px 12px'}}>
              <span style={{color:'var(--muted)'}}>{I.search}</span>
              <input value={sq} onChange={e=>setSq(e.target.value)} placeholder="Search items, locations…" maxLength={100} style={{flex:1,fontSize:13,color:'#ECEFFE',outline:'none',background:'transparent'}}/>
            </div>
          </div>
          <div style={{marginLeft:'auto',position:'relative'}}>
            <button onClick={()=>setShowN(s=>!s)} style={{width:34,height:34,borderRadius:9,background:'rgba(255,255,255,.028)',border:'1px solid rgba(111,76,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)',position:'relative'}}>
              {I.bell}
              {notifs.some(n=>n.u)&&<span style={{position:'absolute',top:5,right:5,width:6,height:6,borderRadius:'50%',background:'var(--p)',border:'1.5px solid var(--bg)'}}/>}
            </button>
            {showN&&(
              <>
                <div onClick={()=>setShowN(false)} style={{position:'fixed',inset:0,zIndex:40}}/>
                <div style={{position:'absolute',top:42,right:0,width:264,background:'#070a1e',border:'1px solid rgba(111,76,255,.16)',borderRadius:14,boxShadow:'0 24px 64px rgba(0,0,0,.65)',zIndex:50,overflow:'hidden',animation:'fadeUp .28s cubic-bezier(.22,1,.36,1)'}}>
                  <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(111,76,255,.1)'}}><span style={{fontSize:10.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Notifications</span></div>
                  {notifs.map(n=>(
                    <div key={n.id} style={{display:'flex',gap:9,padding:'10px 15px',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                      <div style={{width:5,height:5,borderRadius:'50%',marginTop:5,flexShrink:0,background:n.u?'var(--p)':'transparent'}}/>
                      <div>
                        <div style={{fontSize:12,color:'var(--sub)',lineHeight:1.5}}>{n.text}</div>
                        <div style={{fontSize:10.5,color:'var(--muted)',marginTop:2}}>{n.time}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </header>

        <main style={{flex:1,overflow:'hidden'}}>
          {section==='dashboard'&&<Dashboard user={user} items={items} setSection={setSection} setSel={setSel} setRep={setRep} sq={sq}/>}
          {section==='map'&&<MapView items={items} setSel={setSel}/>}
          {section==='items'&&<ItemsView items={items} setSel={setSel} sq={sq}/>}
          {section==='profile'&&<ProfileView user={user}/>}
        </main>
      </div>

      {sel&&<ItemModal item={sel} onClose={()=>setSel(null)}/>}
      {rep&&<ReportModal initial={rep} onClose={()=>setRep(null)} onSubmit={addItem}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT
════════════════════════════════════════════════════════ */
function Root(){
  const[fbUser,setFbUser]=React.useState(undefined);
  React.useEffect(()=>{
    auth.getRedirectResult().catch(()=>{});
    const unsub=auth.onAuthStateChanged(u=>setFbUser(u??null));
    return()=>unsub();
  },[]);

  if(fbUser===undefined) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#020409'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
        <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#4C32D4,#6F4CFF)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 0 32px rgba(111,76,255,.45)'}}>{I.logo}</div>
        <div className="spin-el" style={{width:20,height:20,borderRadius:'50%',border:'2px solid rgba(111,76,255,.15)',borderTopColor:'var(--p)'}}/>
      </div>
    </div>
  );

  return fbUser?<AppShell fbUser={fbUser}/>:<Landing onAuth={()=>{}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
