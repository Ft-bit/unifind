<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>UniFind — Campus Lost & Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.4/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<style>
/* ── Reset ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html,body,#root{min-height:100%;height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:#04060F;color:#F0F4FF;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
input,textarea,select,button{font-family:inherit;font-size:inherit}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none}
::selection{background:rgba(99,102,241,.3)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:99px}
select option{background:#0a0d1c}

/* ── CSS Variables ──────────────────────────────────── */
:root{
  --bg: #04060F;
  --bg2: #080B18;
  --indigo: #6366F1;
  --cyan: #22D3EE;
  --violet: #A78BFA;
  --green: #34D399;
  --rose: #FB7185;
  --amber: #FBBF24;
  --txt: #F0F4FF;
  --sub: rgba(220,228,255,.55);
  --muted: rgba(180,195,240,.32);
  --bd: rgba(99,102,241,.12);
  --sf: rgba(255,255,255,.04);
}

/* ── Keyframes ──────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideBottom{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes revealClip{from{clip-path:inset(0 100% 0 0);opacity:0}to{clip-path:inset(0 0% 0 0);opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(1.5deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(-1deg)}}
@keyframes floatC{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-22px) rotate(2deg)}}
@keyframes blobA{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.12)}66%{transform:translate(-30px,50px) scale(.92)}}
@keyframes blobB{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-80px,30px) scale(1.08)}66%{transform:translate(40px,-60px) scale(.96)}}
@keyframes blobC{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,60px) scale(1.15)}66%{transform:translate(-50px,-30px) scale(.88)}}
@keyframes shimmerText{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.0)}50%{box-shadow:0 0 40px 8px rgba(99,102,241,.18)}}
@keyframes toastIn{from{transform:translateX(110px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes ping{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(2.8);opacity:0}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes borderShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes waveIn{from{transform:translateX(-12px) rotate(-2deg);opacity:0}to{transform:translateX(0) rotate(0deg);opacity:1}}
@keyframes cardPop{from{opacity:0;transform:translateY(20px) rotateX(8deg) scale(.95)}to{opacity:1;transform:translateY(0) rotateX(0deg) scale(1)}}

/* ── Animated blobs background ──────────────────────── */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
.blob-1{width:680px;height:680px;top:-10%;left:-8%;background:radial-gradient(circle,rgba(99,102,241,.22) 0%,transparent 70%);animation:blobA 22s ease-in-out infinite}
.blob-2{width:550px;height:550px;top:20%;right:-10%;background:radial-gradient(circle,rgba(34,211,238,.14) 0%,transparent 70%);animation:blobB 28s ease-in-out infinite}
.blob-3{width:460px;height:460px;bottom:-8%;left:30%;background:radial-gradient(circle,rgba(167,139,250,.18) 0%,transparent 70%);animation:blobC 19s ease-in-out infinite}
.bg-noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px}
.bg-grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.028) 1px,transparent 1px);background-size:72px 72px}
.bg-vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(4,6,15,.7) 100%)}

/* ── Utility ────────────────────────────────────────── */
.spin-el{animation:spin .75s linear infinite}
.toast-el{animation:toastIn .35s cubic-bezier(.22,1,.36,1)}

/* ── Glass surfaces ─────────────────────────────────── */
.glass{
  background:rgba(8,11,24,.82);
  border:1px solid rgba(99,102,241,.14);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
}
.glass-xs{
  background:rgba(255,255,255,.042);
  border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* ── Nav ────────────────────────────────────────────── */
.nav-wrap{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) .1s both;
}
.nav-pill{
  background:rgba(8,11,24,.78);
  border:1px solid rgba(99,102,241,.16);
  backdrop-filter:blur(24px);
  border-radius:99px;padding:6px 8px 6px 18px;
  display:flex;align-items:center;gap:12px;
}
@media(max-width:640px){.nav-wrap{padding:14px 18px}}

/* ── Hero ───────────────────────────────────────────── */
.hero-section{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:100px 64px 60px;
  overflow:hidden;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.24);
  border-radius:99px;padding:5px 14px 5px 8px;
  font-size:12px;font-weight:600;letter-spacing:.06em;
  color:rgba(167,139,250,.9);
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) .3s both;
}
.hero-eyebrow-dot{width:20px;height:20px;border-radius:50%;background:rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center}
.hero-eyebrow-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--indigo);display:block}

.hero-headline{
  font-family:'Syne',sans-serif;
  font-size:clamp(3.2rem,8vw,7.5rem);
  font-weight:800;line-height:.96;
  letter-spacing:-.06em;
  color:var(--txt);
  margin-top:24px;
}
.word-reveal{
  display:inline-block;
  animation:revealClip .9s cubic-bezier(.22,1,.36,1) both;
  will-change:clip-path;
}
.w1{animation-delay:.42s}
.w2{animation-delay:.56s}
.w3{animation-delay:.7s}
.w4{animation-delay:.84s}
.w5{animation-delay:.98s}

.gradient-word{
  background:linear-gradient(135deg,var(--indigo) 0%,var(--violet) 35%,var(--cyan) 70%,var(--green) 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmerText 5s ease infinite;
}

.hero-sub{
  font-size:clamp(14px,1.6vw,17px);
  color:var(--sub);line-height:1.8;
  max-width:440px;margin-top:22px;font-weight:400;
  animation:slideUp .8s cubic-bezier(.22,1,.36,1) 1.1s both;
}

/* ── CTA button ─────────────────────────────────────── */
.btn-cta{
  position:relative;display:inline-flex;align-items:center;gap:10px;
  padding:15px 32px;border-radius:14px;
  font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#4338CA 0%,#6366F1 45%,#818CF8 100%);
  border:none;cursor:pointer;overflow:hidden;
  box-shadow:0 8px 32px rgba(99,102,241,.38),inset 0 1px 0 rgba(255,255,255,.12);
  transition:transform .18s,box-shadow .2s;
  animation:scaleIn .7s cubic-bezier(.22,1,.36,1) 1.2s both;
}
.btn-cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.14) 50%,transparent 70%);
  background-size:200% 100%;animation:shimmerText 2.8s infinite;
}
.btn-cta:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 48px rgba(99,102,241,.55),inset 0 1px 0 rgba(255,255,255,.12)}
.btn-cta:active{transform:translateY(0) scale(.98)}

.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 24px;border-radius:14px;
  font-size:14px;font-weight:600;color:var(--sub);
  background:transparent;border:1px solid rgba(255,255,255,.08);
  transition:background .15s,border-color .15s,color .15s,transform .15s;
  animation:scaleIn .7s cubic-bezier(.22,1,.36,1) 1.3s both;
}
.btn-ghost:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--txt);transform:translateY(-1px)}

/* ── Feature pills ──────────────────────────────────── */
.pill-track{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:28px;
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) 1.35s both;
}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:6px 13px;font-size:12.5px;
  color:rgba(210,220,255,.6);font-weight:500;
  transition:background .15s,border-color .15s,color .15s,transform .15s;
}
.pill:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:rgba(180,190,255,.9);transform:translateY(-1px)}
.pill-icon{font-size:13px}

/* ── Floating preview cards (right side) ────────────── */
.preview-area{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:min(430px, 38vw);padding-right:48px;
  display:flex;flex-direction:column;gap:12px;
  pointer-events:none;
}
.pcard{
  border-radius:16px;padding:14px 16px;
  position:relative;overflow:hidden;
}
.pcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
}
.pcard-1{animation:cardPop .9s cubic-bezier(.22,1,.36,1) 1.0s both,floatA 7s ease-in-out 2s infinite}
.pcard-2{animation:cardPop .9s cubic-bezier(.22,1,.36,1) 1.15s both,floatB 9s ease-in-out 2s infinite}
.pcard-3{animation:cardPop .9s cubic-bezier(.22,1,.36,1) 1.3s both,floatC 6s ease-in-out 2s infinite}
.pcard-4{animation:cardPop .9s cubic-bezier(.22,1,.36,1) 1.45s both,floatA 8s ease-in-out 2s infinite reverse}

.status-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.07em;
  padding:3px 9px;border-radius:99px;text-transform:uppercase;
}

/* ── Stats row ──────────────────────────────────────── */
.stats-row{
  position:relative;z-index:10;
  display:flex;gap:1px;
  border-top:1px solid rgba(99,102,241,.1);
  border-bottom:1px solid rgba(99,102,241,.1);
  overflow:hidden;
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) 1.5s both;
}
.stat-cell{
  flex:1;padding:28px 32px;
  border-right:1px solid rgba(99,102,241,.1);
  position:relative;overflow:hidden;
  transition:background .2s;
}
.stat-cell:last-child{border-right:none}
.stat-cell::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(99,102,241,.0),rgba(99,102,241,.0));
  transition:background .2s;
}
.stat-cell:hover::before{background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(167,139,250,.04))}
.stat-num{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.6rem,3vw,2.4rem);
  font-weight:800;letter-spacing:-.04em;color:var(--txt);
  line-height:1;
}
.stat-label{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500}

/* ── Features section ───────────────────────────────── */
.features-section{
  position:relative;z-index:10;
  padding:80px 64px;
}
.section-label{
  font-size:11px;font-weight:700;letter-spacing:.14em;
  color:var(--indigo);text-transform:uppercase;margin-bottom:14px;
}
.section-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.8rem,3.5vw,3rem);
  font-weight:800;letter-spacing:-.045em;color:var(--txt);
  line-height:1.08;max-width:560px;
}

.feat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px;
}
.feat-card{
  border-radius:20px;padding:28px;
  background:rgba(8,11,24,.6);
  border:1px solid rgba(99,102,241,.1);
  position:relative;overflow:hidden;
  transition:transform .22s,border-color .22s,box-shadow .22s;
  cursor:default;
}
.feat-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(99,102,241,.0),rgba(167,139,250,.0));
  transition:background .25s;
}
.feat-card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.28);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1px rgba(99,102,241,.12)}
.feat-card:hover::before{background:linear-gradient(135deg,rgba(99,102,241,.07),rgba(167,139,250,.04))}
.feat-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:18px;
  position:relative;z-index:1;
}
.feat-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--txt);margin-bottom:10px;position:relative;z-index:1}
.feat-desc{font-size:13.5px;color:var(--sub);line-height:1.7;position:relative;z-index:1;font-weight:400}

/* ── Ticker ─────────────────────────────────────────── */
.ticker-section{
  position:relative;z-index:10;padding:0;
  overflow:hidden;
  mask-image:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);
}
.ticker-inner{display:flex;gap:0;animation:ticker 30s linear infinite}
.ticker-item{
  display:flex;align-items:center;gap:32px;
  padding:18px 0;white-space:nowrap;
  font-size:12.5px;font-weight:600;letter-spacing:.06em;
  color:rgba(180,190,240,.4);text-transform:uppercase;
}
.ticker-sep{width:5px;height:5px;border-radius:50%;background:rgba(99,102,241,.5);flex-shrink:0}

/* ── Testimonials ───────────────────────────────────── */
.testimonials-section{
  position:relative;z-index:10;
  padding:80px 64px;
}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:40px}
.testi-card{
  border-radius:18px;padding:24px;
  background:rgba(8,11,24,.7);
  border:1px solid rgba(99,102,241,.1);
  transition:transform .2s,border-color .2s;
}
.testi-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,.22)}

/* ── CTA section ────────────────────────────────────── */
.cta-section{
  position:relative;z-index:10;
  padding:80px 64px 100px;
  text-align:center;
}
.cta-glow{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse,rgba(99,102,241,.18) 0%,transparent 65%);
  pointer-events:none;
}
.cta-card{
  max-width:640px;margin:0 auto;
  border-radius:28px;padding:56px;
  background:rgba(8,11,24,.88);
  border:1px solid rgba(99,102,241,.18);
  backdrop-filter:blur(32px);
  position:relative;overflow:hidden;
}
.cta-card::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.6),transparent);
}

/* ── Auth overlay ───────────────────────────────────── */
.auth-overlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .25s ease;
}
.auth-scrim{position:absolute;inset:0;background:rgba(2,3,12,.82);backdrop-filter:blur(16px)}
.auth-sheet{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:linear-gradient(160deg,rgba(10,13,28,.98) 0%,rgba(6,8,20,.98) 100%);
  border:1px solid rgba(99,102,241,.2);
  border-radius:24px;
  padding:40px;
  box-shadow:0 0 0 1px rgba(99,102,241,.08),0 48px 100px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.05);
  animation:slideRight .4s cubic-bezier(.22,1,.36,1);
}
.auth-topline{
  position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.7),transparent);
}
.auth-field-wrap{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(99,102,241,.14);
  border-radius:11px;
  transition:border-color .15s,background .15s,box-shadow .15s;
  display:flex;align-items:center;overflow:hidden;
}
.auth-field-wrap:focus-within{
  border-color:rgba(99,102,241,.55);
  background:rgba(99,102,241,.07);
  box-shadow:0 0 0 3px rgba(99,102,241,.12);
}

/* ── Dashboard (unchanged from previous, clean) ─────── */
.nav-btn-dash{transition:background .14s;border-left:2px solid transparent!important}
.nav-btn-dash:hover{background:rgba(99,102,241,.07)!important}
.nav-active-dash{background:rgba(99,102,241,.1)!important;border-left-color:var(--indigo)!important}
.row-hover{transition:background .14s,transform .14s}
.row-hover:hover{background:rgba(99,102,241,.06)!important;transform:translateX(2px)}
.card-hover{transition:transform .18s,border-color .18s,box-shadow .18s}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:900px){
  .hero-section{padding:100px 24px 60px}
  .preview-area{display:none}
  .feat-grid{grid-template-columns:1fr 1fr}
  .testi-grid{grid-template-columns:1fr}
  .features-section,.testimonials-section,.cta-section{padding:60px 24px}
  .stats-row{flex-wrap:wrap}
  .stat-cell{flex:1 1 45%;border-right:none;border-bottom:1px solid rgba(99,102,241,.1)}
  .cta-card{padding:36px 24px}
  .auth-sheet{max-width:100%;border-radius:20px 20px 0 0;padding:32px 22px 44px}
  .auth-overlay{align-items:flex-end}
  .auth-sheet{animation:slideBottom .4s cubic-bezier(.22,1,.36,1)}
}
@media(max-width:640px){
  .feat-grid{grid-template-columns:1fr}
  .hero-headline{letter-spacing:-.05em}
  .stats-row{flex-direction:column}
  .stat-cell{border-right:none;padding:20px 24px}
  .nav-pill{padding:5px 6px 5px 14px}
  .sidebar-dash{width:56px!important;min-width:56px!important}
  .sb-label,.sb-name,.sb-email{display:none!important}
  .dash-stats{grid-template-columns:1fr 1fr!important}
  .dash-main{grid-template-columns:1fr!important}
}
@media(min-width:901px){
  .mobile-only{display:none!important}
}
</style>
</head>
<body>

<div id="root"></div>

<script>

  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,zIndex:80,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.7)',backdropFilter:'blur(12px)',animation:'fadeIn .2s ease'}}><div style={{width:'100%',maxWidth:480,animation:'slideUp .32s cubic-bezier(.22,1,.36,1)'}}>{children}</div></div>;
}

    </div>

/* ══════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════ */
function Root(){
  const[fbUser,setFbUser]=React.useState(undefined);
  React.useEffect(()=>{
    auth.getRedirectResult().catch(()=>{});
    const u=auth.onAuthStateChanged(u=>setFbUser(u??null));
    return()=>u();
  },[]);

  // Dot canvas (subtle background effect)
  React.useEffect(()=>{
    if(fbUser) return; // only on landing
    const cv=document.getElementById('dot-canvas');
    if(!cv) return;
    const ctx=cv.getContext('2d');
    let W,H,dots=[],raf;
    const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
    resize();
    const N=Math.min(Math.floor((W*H)/14000),180);
    for(let i=0;i<N;i++)dots.push({x:Math.random()*W,y:Math.random()*H,r:.6+Math.random()*.9,o:Math.random()*.5+.1,s:Math.random()*.18+.04,t:Math.random()*Math.PI*2});
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      dots.forEach(d=>{
        d.t+=d.s*.016;
        d.o=(.15+Math.sin(d.t)*.12);
        ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(130,140,210,${d.o})`;ctx.fill();
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    window.addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[fbUser]);

  if(fbUser===undefined) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#04060F'}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}><div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#4338CA,#818CF8)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 0 28px rgba(99,102,241,.4)'}}>{Ico.logo}</div><div className="spin-el" style={{width:17,height:17,borderRadius:'50%',border:'2px solid rgba(255,255,255,.1)',borderTopColor:'#6366F1'}}/></div></div>;

  return fbUser?<AppShell fbUser={fbUser}/>:<Landing/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
