<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFind - Premium Lost & Found Marketplace for University Students</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 30px) scale(1.03); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-float1 { animation: float1 8s ease-in-out infinite; }
        .animate-float2 { animation: float2 10s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.3s ease forwards; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 4px; }
        select option { background: #0f0f1a; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="babel">
        const { useState, useEffect, useRef } = React;

        // ─── MOCK DATA ────────────────────────────────────────────────────────────────
        const MOCK_ITEMS = [
            {
                id: 1,
                title: "Apple AirPods Pro",
                category: "Electronics",
                location: "Faculty of Engineering, Block C",
                date: "2 hours ago",
                finder: "Chidi O.",
                avatar: "CO",
                avatarColor: "#6366f1",
                image: null,
                emoji: "🎧",
                claimed: false,
                description: "Found near the lab entrance. White case with small scratch.",
            },
            {
                id: 2,
                title: "Student ID Card",
                category: "Documents",
                location: "Main Library, 2nd Floor",
                date: "5 hours ago",
                finder: "Amaka I.",
                avatar: "AI",
                avatarColor: "#ec4899",
                image: null,
                emoji: "🪪",
                claimed: false,
                description: "ID card found on a reading table. Name partially visible.",
            },
            {
                id: 3,
                title: "Samsung Galaxy S24",
                category: "Electronics",
                location: "University Cafeteria",
                date: "Yesterday",
                finder: "Emeka B.",
                avatar: "EB",
                avatarColor: "#10b981",
                image: null,

                claimed: true,

            },
            {
                id: 4,
                title: "Navy Blue Backpack",
                category: "Bags",
                location: "Sports Complex, Changing Room",
                date: "Yesterday",
                finder: "Fatima A.",
                avatar: "FA",
                avatarColor: "#f59e0b",
                image: null,
                emoji: "🎒",
                claimed: false,
                description: "Large navy backpack with a keychain. Books still inside.",
            },
            {
                id: 5,
                title: "Calculator (Casio FX)",
                category: "Stationery",
                location: "Exam Hall B",
                date: "2 days ago",
                finder: "Tobenna C.",
                avatar: "TC",
                avatarColor: "#8b5cf6",
                image: null,
                emoji: "🔢",
                claimed: false,
                description: "Scientific calculator. Name written inside the battery cover.",
            },
            {
                id: 6,
                title: "Gold Wristwatch",
                category: "Accessories",
                location: "Admin Block Lobby",
                date: "3 days ago",
                finder: "Ngozi P.",
                avatar: "NP",
                avatarColor: "#ef4444",
                image: null,
                emoji: "⌚",
                claimed: false,
                description: "Gold-toned analogue watch. Inscription on the back.",
            },
        ];

        const MOCK_MESSAGES = [
            { id: 1, sender: "them", text: "Hi! I think that's my backpack. Can we meet?", time: "10:23 AM" },
            { id: 2, sender: "me", text: "Sure! I'm at the library right now. Come to the 2nd floor.", time: "10:25 AM" },
            { id: 3, sender: "them", text: "On my way. Thanks so much 🙏", time: "10:26 AM" },
            { id: 4, sender: "me", text: "No problem. I'll be at the blue chairs.", time: "10:27 AM" },
        ];

        const CATEGORIES = ["All", "Electronics", "Documents", "Bags", "Accessories", "Stationery", "Other"];

        // ─── TOAST SYSTEM ─────────────────────────────────────────────────────────────
        function Toast({ toasts, removeToast }) {
            return (
                <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
                    {toasts.map((t) => (
                        <div
                            key={t.id}
                            className="flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium animate-slide-in"
                            style={{
                                background: t.type === "success" ? "#10b981" : t.type === "error" ? "#ef4444" : "#6366f1",
                                color: "#fff",
                                minWidth: 260,
                            }}
                        >
                            <span className="text-lg">{t.type === "success" ? "✅" : t.type === "error" ? "❌" : "ℹ️"}</span>
                            <span>{t.message}</span>
                            <button onClick={() => removeToast(t.id)} className="ml-auto opacity-70 hover:opacity-100 text-lg leading-none">×</button>
                        </div>
                    ))}
                </div>
            );
        }

        // ─── NAVBAR ───────────────────────────────────────────────────────────────────
        function Navbar({ dark, setDark, setModal, currentUser, setCurrentUser, setPage, addToast }) {
            const [menuOpen, setMenuOpen] = useState(false);
            return (
                <nav
                    className="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-4 md:px-8 h-16"
                    style={{
                        background: dark ? "rgba(10,10,20,0.85)" : "rgba(255,255,255,0.85)",
                        backdropFilter: "blur(16px)",
                        borderBottom: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(0,0,0,0.07)",
                    }}
                >
                    {/* Logo */}
                    <button onClick={() => setPage("home")} className="flex items-center gap-2 font-black text-xl tracking-tight" style={{background: 'none', border: 'none', cursor: 'pointer'}}>
                        <span className="text-2xl">🔍</span>
                        <span style={{ color: "#6366f1" }}>Uni</span>
                        <span style={{ color: dark ? "#fff" : "#111" }}>Find</span>
                    </button>

                    {/* Desktop Nav */}
                    <div className="hidden md:flex items-center gap-6 text-sm font-medium" style={{ color: dark ? "#ccc" : "#444" }}>
                        <button onClick={() => setPage("home")} className="hover:text-indigo-500 transition-colors" style={{background: 'none', border: 'none', cursor: 'pointer', color: 'inherit'}}>Home</button>
                        <button onClick={() => setPage("feed")} className="hover:text-indigo-500 transition-colors" style={{background: 'none', border: 'none', cursor: 'pointer', color: 'inherit'}}>Browse Items</button>
                        {currentUser && (
                            <button onClick={() => setPage("profile")} className="hover:text-indigo-500 transition-colors" style={{background: 'none', border: 'none', cursor: 'pointer', color: 'inherit'}}>My Profile</button>
                        )}
                    </div>

                    {/* Right Controls */}
                    <div className="flex items-center gap-2 md:gap-3">
                        {/* Dark Mode Toggle */}
                        <button
                            onClick={() => setDark(!dark)}
                            className="w-9 h-9 rounded-full flex items-center justify-center text-lg transition-all hover:scale-110"
                            style={{ background: dark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.06)", border: 'none', cursor: 'pointer' }}
                        >
                            {dark ? "☀️" : "🌙"}
                        </button>

                        {currentUser ? (
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setPage("profile")}
                                    className="w-8 h-8 rounded-full text-white text-xs font-bold flex items-center justify-center"
                                    style={{ background: "#6366f1", border: 'none', cursor: 'pointer' }}
                                >
                                    {currentUser.name.slice(0, 2).toUpperCase()}
                                </button>
                                <button
                                    onClick={() => { setCurrentUser(null); addToast("Signed out successfully", "success"); }}
                                    className="hidden md:block text-xs px-3 py-1.5 rounded-lg font-medium"
                                    style={{ background: dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)", color: dark ? "#fff" : "#111", border: 'none', cursor: 'pointer' }}
                                >
                                    Sign Out
                                </button>
                            </div>
                        ) : (
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setModal("login")}
                                    className="text-sm font-semibold px-4 py-2 rounded-xl transition-all hover:opacity-80"
                                    style={{ color: dark ? "#fff" : "#111", background: 'none', border: 'none', cursor: 'pointer' }}
                                >
                                    Login
                                </button>
                                <button
                                    onClick={() => setModal("signup")}
                                    className="text-sm font-semibold px-4 py-2 rounded-xl text-white transition-all hover:opacity-90"
                                    style={{ background: "linear-gradient(135deg,#6366f1,#8b5cf6)", border: 'none', cursor: 'pointer' }}
                                >
                                    Sign Up
                                </button>
                            </div>
                        )}

                        {/* Mobile Menu */}
                        <button onClick={() => setMenuOpen(!menuOpen)} className="md:hidden w-9 h-9 flex flex-col items-center justify-center gap-1.5" style={{background: 'none', border: 'none', cursor: 'pointer'}}>
                            <span className="block w-5 h-0.5" style={{ background: dark ? "#fff" : "#111" }}></span>
                            <span className="block w-5 h-0.5" style={{ background: dark ? "#fff" : "#111" }}></span>
                            <span className="block w-5 h-0.5" style={{ background: dark ? "#fff" : "#111" }}></span>
                        </button>
                    </div>

                    {/* Mobile Dropdown */}
                    {menuOpen && (
                        <div
                            className="absolute top-16 left-0 right-0 flex flex-col py-3 text-sm font-medium"
                            style={{ background: dark ? "#0f0f1a" : "#fff", borderBottom: "1px solid rgba(99,102,241,0.2)" }}
                        >
                            {["Home", "Browse Items"].map((item, i) => (
                                <button
                                    key={i}
                                    onClick={() => { setPage(item === "Home" ? "home" : "feed"); setMenuOpen(false); }}
                                    className="px-6 py-3 text-left hover:bg-indigo-500/10 transition-colors"
                                    style={{ color: dark ? "#ccc" : "#444", background: 'none', border: 'none', cursor: 'pointer' }}
                                >

                                </button>
                            ))}

                    )}

        }

        // ─── HERO (LANDING PAGE) ──────────────────────────────────────────────────────
        function HeroPage({ dark, setModal, setPage, currentUser, addToast }) {
            const [activeSlide, setActiveSlide] = useState(0);
            const slides = MOCK_ITEMS.slice(0, 4);

            useEffect(() => {
                const t = setInterval(() => setActiveSlide((s) => (s + 1) % slides.length), 3500);
                return () => clearInterval(t);
            }, []);

            const stats = [
                { num: "1,240+", label: "Items Recovered" },
                { num: "89%", label: "Return Rate" },
                { num: "3,500+", label: "Active Students" },
                { num: "12", label: "Campuses" },
            ];

            return (
                <div className="min-h-screen" style={{ background: dark ? "#070710" : "#f8f7ff" }}>
                    {/* ── HERO SECTION ── */}
                    <section
                        className="relative flex flex-col items-center justify-center min-h-screen px-4 text-center overflow-hidden"
                        style={{ paddingTop: 80 }}
                    >
                        {/* Animated background blobs */}
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <div
                                className="absolute w-96 h-96 rounded-full opacity-20 blur-3xl animate-float1"
                                style={{
                                    background: "radial-gradient(circle, #6366f1, transparent)",
                                    top: "10%", left: "5%",
                                }}
                            />
                            <div
                                className="absolute w-80 h-80 rounded-full opacity-15 blur-3xl animate-float2"
                                style={{
                                    background: "radial-gradient(circle, #8b5cf6, transparent)",
                                    bottom: "10%", right: "5%",
                                }}
                            />
                            <div
                                className="absolute w-64 h-64 rounded-full opacity-10 blur-3xl animate-float1"
                                style={{
                                    background: "radial-gradient(circle, #ec4899, transparent)",
                                    top: "40%", right: "20%",
                                }}
                            />
                            {/* Grid pattern */}
                            <div
                                className="absolute inset-0 opacity-5"
                                style={{
                                    backgroundImage: dark
                                        ? "linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.1) 1px, transparent 1px)"
                                        : "linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px), linear-gradient(90deg,rgba(0,0,0,0.07) 1px, transparent 1px)",
                                    backgroundSize: "40px 40px",
                                }}
                            />
                        </div>

                        {/* Badge */}
                        <div
                            className="relative inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-semibold mb-6"
                            style={{
                                background: dark ? "rgba(99,102,241,0.15)" : "rgba(99,102,241,0.1)",
                                border: "1px solid rgba(99,102,241,0.3)",
                                color: "#6366f1",
                            }}
                        >
                            <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                            Live on Campus · 12 Universities
                        </div>

                        {/* Headline */}
                        <h1
                            className="relative text-5xl md:text-7xl font-black leading-tight mb-6 max-w-4xl"
                            style={{ color: dark ? "#fff" : "#0a0a14" }}
                        >
                            Lost Something?{" "}
                            <span
                                className="relative inline-block"
                                style={{
                                    background: "linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899)",
                                    WebkitBackgroundClip: "text",
                                    WebkitTextFillColor: "transparent",
                                }}
                            >
                                Find It Here.
                            </span>
                        </h1>

                        <p
                            className="relative text-lg md:text-xl max-w-xl mb-10 leading-relaxed"
                            style={{ color: dark ? "#9ca3af" : "#555" }}
                        >
                            UniFind connects students to report, search, and recover lost items
                            across your university campus — fast, trusted, and free.
                        </p>

                        {/* CTA Buttons */}
                        <div className="relative flex flex-col sm:flex-row gap-4 mb-16">
                            <button
                                onClick={() => currentUser ? setPage("report") : setModal("signup")}
                                className="group flex items-center justify-center gap-2 px-8 py-4 rounded-2xl text-white font-bold text-base transition-all hover:scale-105 hover:shadow-2xl"
                                style={{
                                    background: "linear-gradient(135deg,#6366f1,#8b5cf6)",
                                    boxShadow: "0 8px 30px rgba(99,102,241,0.4)",
                                    border: 'none',
                                    cursor: 'pointer'
                                }}
                            >
                                📍 Report a Found Item
                                <span className="group-hover:translate-x-1 transition-transform">→</span>
                            </button>
                            <button
                                onClick={() => setPage("feed")}
                                className="flex items-center justify-center gap-2 px-8 py-4 rounded-2xl font-bold text-base transition-all hover:scale-105"
                                style={{
                                    background: dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.05)",
                                    border: dark ? "1px solid rgba(255,255,255,0.12)" : "1px solid rgba(0,0,0,0.1)",
                                    color: dark ? "#fff" : "#111",
                                    cursor: 'pointer'
                                }}
                            >
                                🔍 Browse Lost Items
                            </button>
                        </div>

                        {/* Stats Bar */}
                        <div
                            className="relative grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 px-8 py-6 rounded-3xl max-w-3xl w-full"
                            style={{
                                background: dark ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.8)",
                                border: dark ? "1px solid rgba(255,255,255,0.07)" : "1px solid rgba(0,0,0,0.07)",
                                backdropFilter: "blur(20px)",
                            }}
                        >
                            {stats.map((s, i) => (
                                <div key={i} className="text-center">
                                    <div
                                        className="text-2xl md:text-3xl font-black"
                                        style={{
                                            background: "linear-gradient(135deg,#6366f1,#8b5cf6)",
                                            WebkitBackgroundClip: "text",
                                            WebkitTextFillColor: "transparent",
                                        }}
                                    >
                                        {s.num}
                                    </div>
                                    <div className="text-xs mt-1" style={{ color: dark ? "#6b7280" : "#888" }}>{s.label}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* ── CAROUSEL: RECENTLY FOUND ── */}
                    <section className="px-4 py-20 max-w-6xl mx-auto">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-3xl font-black" style={{ color: dark ? "#fff" : "#0a0a14" }}>
                                    Recently Found 🏷️
                                </h2>
                                <p className="text-sm mt-1" style={{ color: dark ? "#6b7280" : "#888" }}>
                                    Items waiting to be claimed by their owners
                                </p>
                            </div>
                            <button
                                onClick={() => setPage("feed")}
                                className="text-sm font-semibold px-4 py-2 rounded-xl"
                                style={{ color: "#6366f1", background: "rgba(99,102,241,0.1)", border: 'none', cursor: 'pointer' }}
                            >
                                View All →
                            </button>
                        </div>

                        {/* Swiper-style carousel (CSS-driven) */}
                        <div className="relative overflow-hidden rounded-3xl" style={{ height: 280 }}>
                            {slides.map((item, i) => (
                                <div
                                    key={item.id}
                                    className="absolute inset-0 flex items-center gap-6 px-8 transition-all duration-700"
                                    style={{
                                        opacity: i === activeSlide ? 1 : 0,
                                        transform: `translateX(${(i - activeSlide) * 100}%)`,
                                        background: dark
                                            ? "linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.08))"
                                            : "linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.04))",
                                        border: dark ? "1px solid rgba(255,255,255,0.06)" : "1px solid rgba(99,102,241,0.15)",
                                    }}
                                >
                                    <div
                                        className="text-8xl flex-shrink-0 w-32 h-32 rounded-2xl flex items-center justify-center"
                                        style={{ background: dark ? "rgba(255,255,255,0.06)" : "rgba(99,102,241,0.08)" }}
                                    >
                                        {item.emoji}
                                    </div>
                                    <div className="flex-1">
                                        <span
                                            className="text-xs font-semibold px-2 py-1 rounded-full mb-3 inline-block"
                                            style={{ background: "rgba(99,102,241,0.15)", color: "#6366f1" }}
                                        >
                                            {item.category}
                                        </span>
                                        <h3 className="text-2xl font-black mb-2" style={{ color: dark ? "#fff" : "#0a0a14" }}>
                                            {item.title}
                                        </h3>
                                        <p className="text-sm mb-3" style={{ color: dark ? "#9ca3af" : "#666" }}>
                                            📍 {item.location}
                                        </p>
                                        <p className="text-sm" style={{ color: dark ? "#6b7280" : "#999" }}>
                                            Found by <strong style={{ color: dark ? "#c4b5fd" : "#6366f1" }}>{item.finder}</strong> · {item.date}
                                        </p>
                                        <button
                                            onClick={() => setPage("feed")}
                                            className="mt-4 px-4 py-2 rounded-xl text-sm font-semibold text-white"
                                            style={{ background: "linear-gradient(135deg,#6366f1,#8b5cf6)", border: 'none', cursor: 'pointer' }}
                                        >
                                            View & Claim →
                                        </button>
                                    </div>
                                </div>
                            ))}

                            {/* Dots */}
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                                {slides.map((_, i) => (
                                    <button
                                        key={i}
                                        onClick={() => setActiveSlide(i)}
                                        className="rounded-full transition-all"
                                        style={{
                                            width: i === activeSlide ? 24 : 8,
                                            height: 8,
                                            background: i === activeSlide ? "#6366f1" : "rgba(99,102,241,0.3)",
                                            border: 'none',
                                            cursor: 'pointer'
                                        }}
                                    />
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ── HOW IT WORKS ── */}
                    <section className="px-4 py-16 max-w-6xl mx-auto">
                        <h2 className="text-3xl font-black text-center mb-12" style={{ color: dark ? "#fff" : "#0a0a14" }}>
                            How UniFind Works ⚡
                        </h2>
                        <div className="grid md:grid-cols-3 gap-6">
                            {[
                                { icon: "📍", step: "01", title: "Pin the Location", desc: "Finder drops a pin on the interactive campus map exactly where the item was discovered." },
                                { icon: "📢", step: "02", title: "Post to Feed", desc: "Item appears instantly on the discovery feed. Students across campus get notified." },
                                { icon: "💬", step: "03", title: "Chat & Recover", desc: "Owner messages the finder through secure in-app chat. Meet up and reunite!" },
                            ].map((step, i) => (
                                <div
                                    key={i}
                                    className="relative p-8 rounded-3xl group hover:-translate-y-1 transition-all duration-300"
                                    style={{
                                        background: dark ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.9)",
                                        border: dark ? "1px solid rgba(255,255,255,0.07)" : "1px solid rgba(0,0,0,0.07)",
                                    }}
                                >
                                    <div
                                        className="text-xs font-black mb-4 opacity-30"
                                        style={{ color: "#6366f1", fontSize: 40, lineHeight: 1 }}
                                    >
                                        {step.step}
                                    </div>
                                    <div className="text-4xl mb-4">{step.icon}</div>
                                    <h3 className="text-lg font-bold mb-2" style={{ color: dark ? "#fff" : "#0a0a14" }}>
                                        {step.title}
                                    </h3>
                                    <p className="text-sm leading-relaxed" style={{ color: dark ? "#9ca3af" : "#666" }}>
                                        {step.desc}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* ── CTA BANNER ── */}
                    <section className="px-4 py-8 pb-20 max-w-4xl mx-auto">
                        <div
                            className="relative p-12 rounded-3xl text-center overflow-hidden"
                            style={{
                                background: "linear-gradient(135deg,#4f46e5,#7c3aed,#db2777)",
                            }}
                        >
                            <h2 className="relative text-3xl md:text-4xl font-black text-white mb-4">
                                Found something on campus? 🙌
                            </h2>
                            <p className="relative text-white/80 mb-8 text-lg">
                                Be a hero. Post it in 30 seconds and reunite someone with their belongings.
                            </p>
                            <button
                                onClick={() => currentUser ? setPage("report") : setModal("signup")}
                                className="px-10 py-4 rounded-2xl font-bold text-lg bg-white transition-all hover:scale-105"
                                style={{ color: "#4f46e5", border: 'none', cursor: 'pointer' }}
                            >

                    item.location.toLowerCase().includes(search.toLowerCase());
                const matchCat = category === "All" || item.category === category;
                return matchSearch && matchCat;

            const [messages, setMessages] = useState(MOCK_MESSAGES);
            const [input, setInput] = useState("");
            const bottomRef = useRef(null);

            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: "smooth" });

            const send = () => {
                if (!input.trim()) return;
                setMessages((prev) => [
