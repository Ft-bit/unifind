<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFind - Premium Lost & Found Marketplace</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemoKey"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', 'Syne', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .glass-dark {
            background: rgba(20, 20, 40, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.6s ease-out; }

        .gradient-text {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .neon-blue {
            color: #3B82F6;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 4px;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
        }

        .btn-glow {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            transition: all 0.3s;
        }

        .btn-glow:hover {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .text-7xl { font-size: 2.5rem; }
            .text-5xl { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="babel">

        // ═══════════════════════════════════════════════════════════════════════════

        // ═══════════════════════════════════════════════════════════════════════════
        // NAVBAR COMPONENT
        // ═══════════════════════════════════════════════════════════════════════════
        function Navbar({ onAuthClick, currentUser, onLogout }) {
            const [menuOpen, setMenuOpen] = useState(false);

                        <div className="flex justify-between items-center h-20">
                            {/* Logo */}

                                <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center font-black text-lg">

                                </div>
                                <span className="font-black text-2xl gradient-text hidden sm:inline">UniFind</span>

        // ═══════════════════════════════════════════════════════════════════════════
        // HERO SECTION - THE EYE CATCHER
        // ═══════════════════════════════════════════════════════════════════════════
        function HeroSection({ onAuthClick }) {
            const [searchTerm, setSearchTerm] = useState("");
            const [activeSlide, setActiveSlide] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setActiveSlide((prev) => (prev + 1) % PREMIUM_ITEMS.length);
                }, 4000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="min-h-screen pt-20 pb-20 relative overflow-hidden">
                    {/* Animated Background Elements */}
                    <div className="absolute top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl animate-float"></div>
                    <div className="absolute bottom-10 right-10 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-float" style={{animationDelay: '1s'}}></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        {/* Main Headline */}
                        <div className="text-center mb-12 animate-slide-in">
                            <h1 className="text-6xl md:text-7xl font-black mb-6 leading-tight">
                                <span className="block mb-2">Find Your Lost</span>
                                <span className="gradient-text text-7xl md:text-8xl">Treasures</span>
                            </h1>
                            <p className="text-xl text-gray-300 max-w-2xl mx-auto mb-8">
                                The Premium Lost & Found Marketplace for University Students. 
                                <span className="text-blue-400"> Drop a pin. Get it back.</span>
                            </p>
                        </div>

                        {/* 3D-Style Search Bar */}
                        <div className="max-w-2xl mx-auto mb-16 animate-slide-in" style={{animationDelay: '0.2s'}}>
                            <div className="glass-dark p-2 rounded-2xl flex items-center gap-2">
                                <input
                                    type="text"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search for iPhone, wallet, laptop... 🔍"
                                    className="flex-1 bg-transparent text-white placeholder-gray-500 outline-none px-6 py-4 text-lg"
                                />
                                <button className="btn-glow px-8 py-4 rounded-xl font-bold text-white">
                                    Search
                                </button>
                            </div>
                            <div className="mt-4 flex justify-center gap-2">
                                {["📱 Electronics", "💼 Accessories", "⌚ Luxury"].map((tag, i) => (
                                    <button
                                        key={i}
                                        className="glass px-4 py-2 rounded-full text-sm text-gray-300 hover:text-blue-400 hover:border-blue-400 transition"
                                    >
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Carousel - High Priority Items */}
                        <div className="mb-12 animate-slide-in" style={{animationDelay: '0.4s'}}>
                            <h2 className="text-2xl font-black mb-6">🔥 High Priority Items</h2>
                            <div className="glass-dark rounded-2xl overflow-hidden p-8">
                                <div className="flex flex-col md:flex-row gap-8 items-center">
                                    {/* Carousel Item */}
                                    <div className="flex-1">
                                        <div className="relative">
                                            <img
                                                src={PREMIUM_ITEMS[activeSlide].images[0]}
                                                alt={PREMIUM_ITEMS[activeSlide].title}
                                                className="w-full h-80 object-cover rounded-xl"
                                            />
                                            <div className="absolute top-4 right-4 glass px-4 py-2 rounded-full">
                                                <span className="neon-blue font-bold">{activeSlide + 1}/{PREMIUM_ITEMS.length}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Item Details */}
                                    <div className="flex-1">
                                        <div className="text-4xl mb-4">{PREMIUM_ITEMS[activeSlide].emoji}</div>
                                        <h3 className="text-3xl font-black mb-2">{PREMIUM_ITEMS[activeSlide].title}</h3>
                                        <p className="text-gray-400 mb-4 text-lg">{PREMIUM_ITEMS[activeSlide].description}</p>
                                        
                                        <div className="space-y-3 mb-6">
                                            <div className="flex items-center gap-2 text-gray-300">
                                                <span>📍</span> {PREMIUM_ITEMS[activeSlide].location}
                                            </div>
                                            <div className="flex items-center gap-2 text-gray-300">
                                                <span>⏰</span> {PREMIUM_ITEMS[activeSlide].date}
                                            </div>
                                            <div className="flex items-center gap-3 pt-4">
                                                <img src={PREMIUM_ITEMS[activeSlide].finderImg} alt="Finder" className="w-10 h-10 rounded-full border border-blue-500" />
                                                <div>
                                                    <p className="text-sm text-gray-400">Found by</p>
                                                    <p className="font-bold">{PREMIUM_ITEMS[activeSlide].finder}</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex gap-4">
                                            <a
                                                href={`https://wa.me/${PREMIUM_ITEMS[activeSlide].whatsapp}?text=Hi, I saw the ${PREMIUM_ITEMS[activeSlide].title} you posted on UniFind. Is it still available?`}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="btn-glow px-6 py-3 rounded-xl font-bold text-white flex items-center gap-2 flex-1 justify-center"
                                            >
                                                💬 WhatsApp Finder
                                            </a>
                                            <button className="glass px-6 py-3 rounded-xl font-bold text-blue-400 hover:text-blue-300 transition">
                                                ❤️
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Carousel Dots */}
                                <div className="flex justify-center gap-3 mt-8">
                                    {PREMIUM_ITEMS.map((_, i) => (
                                        <button
                                            key={i}
                                            onClick={() => setActiveSlide(i)}
                                            className={`transition-all ${i === activeSlide ? 'bg-blue-500 w-8' : 'bg-gray-600 w-4'} h-2 rounded-full`}
                                        ></button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* CTA Button */}
                        <div className="text-center animate-slide-in" style={{animationDelay: '0.6s'}}>
                            <button
                                onClick={() => onAuthClick('signup')}
                                className="btn-glow px-10 py-4 rounded-xl font-black text-white text-lg hover:scale-110 transition-transform"
                            >
                                🚀 Post Your Found Item Now
                            </button>
                            <p className="text-gray-400 mt-4">Or scroll to browse all lost items →</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // ITEM CARD COMPONENT - INTERACTIVE & PROFESSIONAL
        // ═══════════════════════════════════════════════════════════════════════════
        function ItemCard({ item, onViewMap }) {
            const [liked, setLiked] = useState(false);

            return (
                <div className="glass-dark rounded-2xl overflow-hidden card-hover group animate-slide-in">
                    {/* Image Container */}

                            src={item.images[0]}
                            alt={item.title}
                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div className="absolute top-4 right-4 glass px-3 py-1 rounded-full">
                            <span className="text-sm font-bold text-blue-400">{item.category}</span>
                        </div>
                        <div className="absolute bottom-4 left-4 text-5xl">{item.emoji}</div>
                    </div>

                    {/* Content */}
                    <div className="p-6">
                        <h3 className="text-2xl font-black mb-2 group-hover:text-blue-400 transition">{item.title}</h3>
                        <p className="text-gray-400 text-sm mb-4 line-clamp-2">{item.description}</p>

                        {/* Location & Time */}
                        <div className="space-y-2 mb-4 text-sm text-gray-400">
                            <div className="flex items-center gap-2">
                                <span className="text-lg">📍</span>
                                {item.location}
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-lg">⏰</span>
                                {item.date}
                            </div>
                        </div>

                        {/* Finder Info */}
                        <div className="flex items-center gap-3 mb-6 pb-6 border-b border-blue-500/20">
                            <img src={item.finderImg} alt="Finder" className="w-10 h-10 rounded-full border border-blue-500" />
                            <div>
                                <p className="text-xs text-gray-500">Found by</p>
                                <p className="font-bold text-sm">{item.finder}</p>
                            </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="flex gap-3">
                            <a
                                href={`https://wa.me/${item.whatsapp}?text=Hi, I saw the ${item.title} you posted on UniFind. Is it still available?`}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 btn-glow py-3 rounded-lg font-bold text-white text-center transition-all"
                            >
                                💬 Contact Finder
                            </a>
                            <button
                                onClick={() => setLiked(!liked)}
                                className={`px-4 py-3 rounded-lg transition-all ${liked ? 'bg-red-500/30 text-red-400' : 'glass text-gray-400'}`}
                            >
                                {liked ? '❤️' : '🤍'}
                            </button>
                            <button
                                onClick={() => onViewMap(item)}
                                className="px-4 py-3 rounded-lg glass text-gray-400 hover:text-blue-400 transition"
                                title="View on map"
                            >
                                🗺️
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // MAIN DASHBOARD/GALLERY
        // ═══════════════════════════════════════════════════════════════════════════
        function DashboardPage({ onViewMap, onAuthClick, currentUser }) {
            const [filteredItems, setFilteredItems] = useState(PREMIUM_ITEMS);
            const [selectedCategory, setSelectedCategory] = useState("All");
            const [searchTerm, setSearchTerm] = useState("");

            const categories = ["All", "Electronics", "Luxury", "Accessories"];

            useEffect(() => {
                let items = PREMIUM_ITEMS;

                if (selectedCategory !== "All") {
                    items = items.filter(item => item.category === selectedCategory);
                }

                if (searchTerm) {
                    items = items.filter(item =>
                        item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                setFilteredItems(items);
            }, [selectedCategory, searchTerm]);

            return (
                <div className="min-h-screen pb-20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24">
                        {/* Header */}
                        <div className="mb-12 animate-slide-in">
                            <h2 className="text-5xl font-black mb-4 gradient-text">All Lost Items</h2>
                            <p className="text-xl text-gray-400">Browse and find your lost belongings</p>
                        </div>

                        {/* Search & Filter */}
                        <div className="mb-12 space-y-6 animate-slide-in" style={{animationDelay: '0.1s'}}>
                            {/* Search Bar */}
                            <div className="glass-dark rounded-2xl p-2 flex items-center gap-2">
                                <input
                                    type="text"
                                    placeholder="Search items... 🔍"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="flex-1 bg-transparent text-white placeholder-gray-500 outline-none px-6 py-3"
                                />
                            </div>

                            {/* Category Filter */}
                            <div className="flex gap-3 flex-wrap">
                                {categories.map(category => (
                                    <button
                                        key={category}
                                        onClick={() => setSelectedCategory(category)}
                                        className={`px-6 py-3 rounded-full font-bold transition-all ${
                                            selectedCategory === category
                                                ? 'btn-glow text-white'
                                                : 'glass text-gray-300 hover:text-blue-400'
                                        }`}
                                    >
                                        {category}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Items Grid */}
                        {filteredItems.length === 0 ? (
                            <div className="text-center py-20">
                                <div className="text-6xl mb-4">😔</div>
                                <p className="text-xl text-gray-400">No items found. Try different filters.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                                {filteredItems.map((item, idx) => (
                                    <div key={item.id} style={{animationDelay: `${idx * 0.1}s`}}>
                                        <ItemCard item={item} onViewMap={onViewMap} />
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* CTA Section */}
                        {!currentUser && (
                            <div className="glass-dark rounded-2xl p-12 text-center mb-8">
                                <h3 className="text-3xl font-black mb-4">Found Something? Become a Hero!</h3>
                                <p className="text-gray-300 mb-8 text-lg">Post your found items and help students recover their belongings.</p>
                                <button
                                    onClick={() => onAuthClick('signup')}
                                    className="btn-glow px-10 py-4 rounded-xl font-bold text-white text-lg"
                                >
                                    📸 Post Item Now
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // AUTH MODAL - WhatsApp Centric
        // ═══════════════════════════════════════════════════════════════════════════
        function AuthModal({ mode, onClose, onLogin, onSignup }) {
            const [whatsapp, setWhatsapp] = useState("");
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");

            const isSignup = mode === 'signup';

            const handleSubmit = () => {
                if (isSignup) {
                    if (!whatsapp || !name || !email) {
                        alert("Please fill all fields");
                        return;
                    }
                    onSignup({ name, email, whatsapp, avatar: `https://i.pravatar.cc/150?u=${email}` });
                } else {
                    if (!whatsapp) {
                        alert("Please enter WhatsApp number");
                        return;
                    }
                    onLogin({ whatsapp });
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="glass-dark rounded-3xl p-8 max-w-md w-full space-y-6 animate-slide-in">
                        <button
                            onClick={onClose}
                            className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl"
                        >
                            ×
                        </button>

                        <div>
                            <h2 className="text-3xl font-black mb-2 gradient-text">{isSignup ? 'Join UniFind' : 'Welcome Back'}</h2>
                            <p className="text-gray-400">
                                {isSignup
                                    ? 'WhatsApp-powered authentication for easy login'
                                    : 'Sign in with your WhatsApp number'}
                            </p>
                        </div>

                        <div className="space-y-4">
                            {isSignup && (
                                <>
                                    <input
                                        type="text"
                                        placeholder="Your Full Name"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:border"
                                    />
                                    <input
                                        type="email"
                                        placeholder="University Email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:border"
                                    />
                                </>
                            )}
                            <div>
                                <label className="text-sm text-gray-400 mb-2 block">WhatsApp Number</label>
                                <input
                                    type="tel"
                                    placeholder="Enter WhatsApp number with country code (e.g., 234XXXXXXXXXX)"
                                    value={whatsapp}
                                    onChange={(e) => setWhatsapp(e.target.value.replace(/\D/g, ''))}
                                    className="w-full glass px-4 py-3 rounded-xl text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:border"
                                />
                                <p className="text-xs text-gray-500 mt-2">We'll use this for one-click WhatsApp messaging</p>
                            </div>
                        </div>

                        <button
                            onClick={handleSubmit}
                            className="w-full btn-glow py-3 rounded-xl font-black text-white text-lg hover:scale-105 transition-transform"
                        >
                            💬 {isSignup ? 'Sign Up' : 'Login'} with WhatsApp
                        </button>

                        <div className="text-center">
                            <p className="text-gray-400 text-sm">
                                {isSignup ? 'Already have an account?' : "Don't have an account?"}{' '}
                                <button
                                    onClick={() => {
                                        setWhatsapp("");
                                        setName("");
                                        setEmail("");
                                    }}
                                    className="text-blue-400 hover:text-blue-300 font-bold"
                                >
                                    {isSignup ? 'Login' : 'Sign Up'}
                                </button>
                            </p>
                        </div>

                        <div className="border-t border-blue-500/20 pt-6">
                            <p className="text-xs text-gray-500 text-center">
                                By continuing, you agree to our Terms of Service and Privacy Policy.
                                We'll never share your WhatsApp number.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // MAP VIEW
        // ═══════════════════════════════════════════════════════════════════════════
        function MapView({ item, onClose }) {
            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 flex items-center justify-center p-4 animate-fade-in">
                    <div className="glass-dark rounded-3xl p-6 max-w-2xl w-full max-h-[80vh] overflow-auto animate-slide-in">
                        <button
                            onClick={onClose}
                            className="float-right text-gray-400 hover:text-white text-2xl mb-4"
                        >
                            ×
                        </button>

                        <h2 className="text-2xl font-black mb-4">{item.title} Location</h2>

                        <div className="glass rounded-xl p-4 mb-4">
                            <div className="w-full h-80 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-lg flex items-center justify-center border border-blue-500/30">
                                <div className="text-center">
                                    <div className="text-6xl mb-4">📍</div>
                                    <p className="text-gray-300">
                                        <strong>Latitude:</strong> {item.lat.toFixed(4)}<br />
                                        <strong>Longitude:</strong> {item.lng.toFixed(4)}
                                    </p>
                                    <p className="text-sm text-gray-400 mt-4">
                                        📍 {item.location}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-3">
                            <a
                                href={`https://wa.me/${item.whatsapp}?text=Hi, I saw the ${item.title} at ${item.location}. I think I found it!`}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 btn-glow py-3 rounded-xl font-bold text-white text-center"
                            >
                                💬 Contact About Item
                            </a>
                            <a
                                href={`https://maps.google.com/?q=${item.lat},${item.lng}`}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="flex-1 glass py-3 rounded-xl font-bold text-blue-400 hover:text-blue-300 text-center"
                            >
                                🗺️ Open in Google Maps
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════════════════════════
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [authMode, setAuthMode] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);

            const handleAuthClick = (mode) => {
                setAuthMode(mode);
            };

            const handleLogin = (data) => {
                setCurrentUser({ whatsapp: data.whatsapp, name: "UniFind User", avatar: "https://i.pravatar.cc/150?u=unifind" });
                setAuthMode(null);
            };

            const handleSignup = (data) => {
                setCurrentUser(data);
                setAuthMode(null);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('home');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
                    <Navbar onAuthClick={handleAuthClick} currentUser={currentUser} onLogout={handleLogout} />

                    {currentPage === 'home' && (
                        <>
                            <HeroSection onAuthClick={handleAuthClick} />
                            <DashboardPage
                                onViewMap={setSelectedItem}
                                onAuthClick={handleAuthClick}
                                currentUser={currentUser}
                            />
                        </>
                    )}

                    {/* Footer */}
                    <footer className="border-t border-blue-500/10 glass-dark py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                                <div>
                                    <h3 className="font-black text-lg mb-4 gradient-text">UniFind</h3>
                                    <p className="text-gray-400 text-sm">Premium Lost & Found Marketplace for University Students</p>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Product</h4>
                                    <ul className="space-y-2 text-sm text-gray-400">
                                        <li><button className="hover:text-blue-400 transition">Browse Items</button></li>
                                        <li><button className="hover:text-blue-400 transition">Post Item</button></li>
                                        <li><button className="hover:text-blue-400 transition">How it Works</button></li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Company</h4>
                                    <ul className="space-y-2 text-sm text-gray-400">
                                        <li><button className="hover:text-blue-400 transition">About Us</button></li>
                                        <li><button className="hover:text-blue-400 transition">Privacy</button></li>
                                        <li><button className="hover:text-blue-400 transition">Terms</button></li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm mb-4 text-blue-400">Support</h4>
                                    <a
                                        href="https://wa.me/2349123456789?text=Hi, I'm interested in UniFind. Tell me more!"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="btn-glow px-6 py-2 rounded-lg font-bold text-white text-sm block text-center"
                                    >
                                        💬 Talk to Developer
                                    </a>
                                </div>
                            </div>

                            <div className="border-t border-blue-500/10 pt-8 text-center text-gray-500 text-sm">
                                <p>© 2024 UniFind. All rights reserved. Built with ❤️ for students.</p>
                            </div>
                        </div>
                    </footer>

                    {/* Modals */}
                    {authMode && <AuthModal mode={authMode} onClose={() => setAuthMode(null)} onLogin={handleLogin} onSignup={handleSignup} />}
                    {selectedItem && <MapView item={selectedItem} onClose={() => setSelectedItem(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
