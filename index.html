// Sanitize any user-provided string before rendering as text.
// Since we use React (which auto-escapes JSX), raw HTML injection
// is already blocked. This helper gives extra safety for edge cases.
function sanitize(str) {
  if (typeof str !== 'string') return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;')
    .replace(/\//g, '&#x2F;')
    .trim();
}

// Validate phone number — only digits, +, spaces, dashes allowed
function validatePhone(phone) {
  return /^[+\d\s\-()]{7,20}$/.test(phone.trim());
}

// Validate email format
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

// Strip dangerous characters from form fields
function cleanInput(str, maxLen = 200) {
  if (typeof str !== 'string') return '';
  // Remove null bytes and control characters — key NoSQL injection prevention
  return str.replace(/[\x00-\x1F\x7F$]/g, '').substring(0, maxLen).trim();
}

}

// ══════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════
function Modal({children,onClose}){
  React.useEffect(()=>{
    const fn=e=>{if(e.key==='Escape')onClose();};
    document.addEventListener('keydown',fn);
    return()=>document.removeEventListener('keydown',fn);
  },[onClose]);
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{
      position:'fixed',inset:0,zIndex:80,
      display:'flex',alignItems:'center',justifyContent:'center',padding:16,
      background:'rgba(0,0,0,.62)',backdropFilter:'blur(10px)',animation:'fadeIn .2s ease',
    }}>
      <div className="slide-up" style={{width:'100%',maxWidth:480,position:'relative'}}>
        {children}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function Toast({msg,onDone}){
  React.useEffect(()=>{const t=setTimeout(onDone,3600);return()=>clearTimeout(t);},[]);
  return(
    <div className="toast-el" style={{
      position:'fixed',bottom:24,right:24,zIndex:200,
      display:'flex',alignItems:'center',gap:10,
      padding:'12px 18px',borderRadius:12,
      background:'rgba(16,185,129,.11)',border:'1px solid rgba(16,185,129,.32)',
      backdropFilter:'blur(20px)',boxShadow:'0 12px 40px rgba(0,0,0,.5)',
      fontSize:13,fontWeight:600,color:C.txt,
    }}>
      <span style={{color:C.green}}>{I.check}</span>{msg}
    </div>
  );
}

function Field({label,type='text',placeholder,value,onChange,icon,suffix,onKeyDown,autoComplete,maxLength=200}){
  return(
    <div>
      {label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:C.muted,marginBottom:6,letterSpacing:'.04em'}}>{label}</label>}
      <div className="field-box" style={{display:'flex',alignItems:'center',borderRadius:10,background:C.sf,boxShadow:`0 0 0 1px ${C.bd}`,overflow:'hidden'}}>
        {icon&&<span style={{paddingLeft:13,color:C.muted,display:'flex',flexShrink:0}}>{icon}</span>}
        <input
          type={type}
          placeholder={placeholder}
          value={value}
          onChange={e=>onChange(e.target.value)}
          onKeyDown={onKeyDown}
          autoComplete={autoComplete}
          maxLength={maxLength}
          style={{flex:1,padding:'11px 13px',fontSize:14,color:C.txt,outline:'none',background:'transparent'}}
        />
        {suffix&&<span style={{paddingRight:12}}>{suffix}</span>}
      </div>
    </div>
  );
}

function AuthPage(){
  const [mode,setMode]=React.useState('signin');
  const [form,setForm]=React.useState({name:'',email:'',password:''});
  const [showPass,setShowPass]=React.useState(false);
  const [loading,setLoading]=React.useState(false);
  const [gLoad,setGLoad]=React.useState(false);
  const [err,setErr]=React.useState('');
  const [tIdx,setTIdx]=React.useState(0);

  const n1=useCount(1247),n2=useCount(98),n3=useCount(4800);

  const quotes=[
    {q:'Got my MacBook back in 3 hours. Completely unreal.',name:'Chidi Amara',role:'Computer Science \'25'},
    {q:'Found my student ID the same day. WhatsApp link is genius.',name:'Amaka Obi',role:'Medicine \'26'},
    {q:'Returned 4 items this semester. Karma system is addictive.',name:'Tunde Bello',role:'Engineering \'25'},
  ];

  useInterval(()=>setTIdx(i=>(i+1)%quotes.length),4800);

  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  // ── GOOGLE SIGN-IN (FIXED) ─────────────────────────────
  // Uses popup first, falls back to redirect if popup blocked
  const handleGoogle=async()=>{
    setGLoad(true);setErr('');
    try{
      await auth.signInWithPopup(gProvider);
      // On success Firebase auth state listener will fire automatically
    }catch(e){
      if(e.code==='auth/popup-blocked'){
        // Popup was blocked — fall back to redirect flow
        try{
          await auth.signInWithRedirect(gProvider);
        }catch(re){
          const m=fbErr(re.code);
          if(m)setErr(m);
          setGLoad(false);
        }
      } else {
        const m=fbErr(e.code);
        if(m)setErr(m);
        setGLoad(false);
      }
    }
  };

  // ── EMAIL SIGN-IN / SIGN-UP (FIXED) ───────────────────
  const handleSubmit=async()=>{
    setErr('');

    // Client-side validation — prevents empty/invalid data hitting Firebase
    if(!form.email||!form.password){setErr('Please fill in all fields.');return;}
    if(!validateEmail(form.email)){setErr('Please enter a valid email address.');return;}
    if(form.password.length<6){setErr('Password must be at least 6 characters.');return;}
    if(mode==='signup'&&!form.name.trim()){setErr('Please enter your full name.');return;}
    if(mode==='signup'&&form.name.trim().length<2){setErr('Name must be at least 2 characters.');return;}

    // Sanitize inputs before sending to Firebase
    const cleanEmail = form.email.trim().toLowerCase();
    const cleanName  = cleanInput(form.name, 80);

    setLoading(true);
    try{
      if(mode==='signup'){
        const r=await auth.createUserWithEmailAndPassword(cleanEmail, form.password);
        await r.user.updateProfile({displayName: cleanName});
        // Email verified badge will update once user verifies
      }else{
        await auth.signInWithEmailAndPassword(cleanEmail, form.password);
      }
    }catch(e){
      setErr(fbErr(e.code));
    }
    setLoading(false);
  };

  const onKey=e=>{if(e.key==='Enter')handleSubmit();};
  const sw=()=>{setMode(m=>m==='signin'?'signup':'signin');setErr('');setForm({name:'',email:'',password:''});};

  const cards=[

    {label:'🔴 Lost',title:'AirPods Pro',sub:'Cafeteria · 1d ago',delay:'3.2s',top:'72%'},
  ];

  return(
    <div style={{minHeight:'100vh',display:'flex',background:C.bg}}>

          <defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3B82F6" stopOpacity="0"/><stop offset="50%" stopColor="#3B82F6" stopOpacity="1"/><stop offset="100%" stopColor="#3B82F6" stopOpacity="0"/></linearGradient></defs>

        </svg>
        {cards.map((c,i)=>(
          <div key={i} className="preview-card" style={{

        <div className="fade-up" style={{display:'flex',alignItems:'center',gap:10,position:'relative',zIndex:3}}>

            {I.compass}
          </div>
          <span style={{fontSize:18,fontWeight:800,color:C.txt,letterSpacing:'-.045em'}}>UniFind</span>

//  DASHBOARD
// ══════════════════════════════════════════════════════
function Dashboard({user,items,setSection,setSelectedItem,setShowReport,sq}){
  const lost=items.filter(i=>i.status==='lost').length;
  const found=items.filter(i=>i.status==='found').length;
  const h=new Date().getHours();
  const greet=h<12?'morning':h<17?'afternoon':'evening';

  const stats=[
    {label:'Lost Items',val:lost,icon:I.alert,color:C.red,bg:'rgba(239,68,68,.07)',bd:'rgba(239,68,68,.16)'},
    {label:'Found Items',val:found,icon:I.check,color:C.green,bg:'rgba(16,185,129,.07)',bd:'rgba(16,185,129,.16)'},
    {label:'Total Recovered',val:47,icon:I.award,color:C.blue,bg:'rgba(59,130,246,.07)',bd:'rgba(59,130,246,.16)'},
    {label:'Your Karma',val:user.karma,icon:I.zap,color:C.amber,bg:'rgba(245,158,11,.07)',bd:'rgba(245,158,11,.16)'},
  ];

  const filtered=items.filter(i=>!sq||i.title.toLowerCase().includes(sq.toLowerCase())||i.loc.toLowerCase().includes(sq.toLowerCase()));

  return(
    <div style={{height:'100%',overflowY:'auto',padding:'28px 28px 48px'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:26,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}}>Dashboard</div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>Good {greet}, {user.name.split(' ')[0]}</h1>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[{label:'Report Lost',type:'lost',color:C.red},{label:'Report Found',type:'found',color:C.green}].map(a=>(
            <button key={a.type} onClick={()=>setShowReport({type:a.type})} style={{
              display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:8,
              background:a.color+'14',border:`1px solid ${a.color}28`,
              fontSize:13,fontWeight:500,color:C.sub,transition:'all .15s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.background=a.color+'25';e.currentTarget.style.borderColor=a.color+'55';}}
              onMouseLeave={e=>{e.currentTarget.style.background=a.color+'14';e.currentTarget.style.borderColor=a.color+'28';}}>
              <span style={{color:a.color}}>{I.plus}</span>{a.label}
            </button>
          ))}
        </div>
      </div>
      <div className="stat-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:26}}>
        {stats.map(s=>(
          <div key={s.label} className="card-hover" style={{borderRadius:12,padding:'18px',background:s.bg,border:`1px solid ${s.bd}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{width:30,height:30,borderRadius:8,background:s.color+'1c',display:'flex',alignItems:'center',justifyContent:'center',color:s.color}}>{s.icon}</div>
              <span style={{color:s.color+'80'}}>{I.trend}</span>
            </div>
            <div style={{fontSize:26,fontWeight:800,color:C.txt,letterSpacing:'-.04em',lineHeight:1}}>{s.val}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div className="dash-main-grid" style={{display:'grid',gridTemplateColumns:'1fr 292px',gap:20}}>
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <span style={{fontSize:14,fontWeight:600,color:C.txt}}>Recent Activity</span>
            <button onClick={()=>setSection('items')} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'#60A5FA',fontWeight:500,fontSize:12}}>
              View all {I.arrow}
            </button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {filtered.slice(0,7).map(item=><ItemRow key={item.id} item={item} onClick={()=>setSelectedItem(item)}/>)}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{borderRadius:12,overflow:'hidden',border:`1px solid ${C.bd}`,height:180}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 14px',borderBottom:`1px solid ${C.bd}`}}>
              <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em'}}>Live Map</span>
              <button onClick={()=>setSection('map')} style={{fontSize:11,color:'#60A5FA',background:'none',border:'none'}}>Expand →</button>
            </div>
            <div onClick={()=>setSection('map')} style={{height:'calc(100% - 36px)',background:'linear-gradient(135deg,#040a1a,#060d1d)',cursor:'pointer',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(59,130,246,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.05) 1px,transparent 1px)',backgroundSize:'18px 18px'}}/>
              {items.map(it=>{
                const c=it.status==='found'?C.green:C.blue;
                return <div key={it.id} style={{position:'absolute',left:`${it.mx}%`,top:`${it.my}%`,width:8,height:8,borderRadius:'50%',background:c,boxShadow:`0 0 7px ${c}`,transform:'translate(-50%,-50%)'}}/>;
              })}
            </div>
          </div>
          <div style={{borderRadius:12,padding:'16px',background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.16)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <div style={{width:32,height:32,borderRadius:8,background:'rgba(245,158,11,.18)',display:'flex',alignItems:'center',justifyContent:'center',color:C.amber}}>{I.zap}</div>
              <div>
                <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Karma Score</div>
                <div style={{fontSize:20,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>{user.karma}</div>
              </div>
              <div style={{marginLeft:'auto',padding:'3px 10px',borderRadius:99,background:'rgba(245,158,11,.2)',fontSize:11,fontWeight:600,color:C.amber}}>Gold</div>
            </div>
            <div style={{height:4,borderRadius:99,background:'rgba(255,255,255,.07)'}}>
              <div style={{height:'100%',borderRadius:99,background:'linear-gradient(90deg,#F59E0B,#FBBF24)',width:`${(user.karma/150)*100}%`,transition:'width 1.2s ease'}}/>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:8}}>{150-user.karma} pts to Platinum</div>
          </div>
          <div style={{borderRadius:12,padding:'16px',background:C.sf,border:`1px solid ${C.bd}`}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14}}>By Category</div>
            {[['Electronics',3,C.blue],['Documents',2,C.green],['Bags & Keys',2,C.amber],['Jewelry',1,C.red]].map(([n,count,color])=>(
              <div key={n} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:color,flexShrink:0}}/>
                <span style={{fontSize:12,color:C.sub,flex:1}}>{n}</span>
                <span style={{fontSize:12,fontWeight:700,color:C.txt}}>{count}</span>
                <div style={{width:48,height:3,borderRadius:99,background:'rgba(255,255,255,.07)',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${(count/3)*100}%`,background:color,borderRadius:99}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  MAP VIEW
// ══════════════════════════════════════════════════════
function MapView({items,setSelectedItem}){
  const [filter,setFilter]=React.useState('all');
  const [hovered,setHovered]=React.useState(null);
  const filtered=items.filter(i=>filter==='all'||i.status===filter);
  return(
    <div style={{height:'100%',display:'flex',overflow:'hidden'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'linear-gradient(145deg,#040a1a,#060d1e)'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(59,130,246,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.032) 1px,transparent 1px)',backgroundSize:'56px 56px'}}/>
        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.28}}>
          <line x1="0" y1="37%" x2="100%" y2="37%" stroke="rgba(59,130,246,.22)" strokeWidth="10"/>
          <line x1="0" y1="63%" x2="100%" y2="63%" stroke="rgba(59,130,246,.16)" strokeWidth="7"/>
          <line x1="27%" y1="0" x2="27%" y2="100%" stroke="rgba(59,130,246,.18)" strokeWidth="8"/>
          <line x1="63%" y1="0" x2="63%" y2="100%" stroke="rgba(59,130,246,.22)" strokeWidth="10"/>
          {[[7,7,20,26],[33,7,24,26],[67,7,24,26],[7,44,18,15],[33,44,26,15],[65,44,22,15],[7,67,20,24],[33,67,24,22],[65,67,22,22]].map(([x,y,w,h],i)=>(
            <rect key={i} x={`${x}%`} y={`${y}%`} width={`${w/2.5}%`} height={`${h/2.5}%`} fill="rgba(59,130,246,.05)" stroke="rgba(59,130,246,.18)" strokeWidth=".8" rx="3"/>
          ))}
        </svg>
        {[['Library','8%','8%'],['Science','34%','8%'],['Engineering','68%','8%'],['Admin','8%','45%'],['Cafeteria','34%','45%'],['Sports','66%','45%']].map(([n,l,t])=>(
          <div key={n} style={{position:'absolute',left:l,top:t,fontSize:9,color:'rgba(147,197,253,.24)',fontWeight:500,pointerEvents:'none'}}>{n}</div>
        ))}
        {filtered.map(item=>{
          const c=item.status==='found'?C.green:C.blue;
          const isH=hovered===item.id;
          return(
            <div key={item.id} style={{position:'absolute',left:`${item.mx}%`,top:`${item.my}%`}}>
              <div style={{position:'absolute',width:28,height:28,borderRadius:'50%',border:`1px solid ${c}50`,left:'50%',top:'50%',animation:'pinRing 2.2s ease-out infinite'}}/>
              <div style={{position:'absolute',width:28,height:28,borderRadius:'50%',border:`1px solid ${c}35`,left:'50%',top:'50%',animation:'pinRing 2.2s ease-out infinite',animationDelay:'.9s'}}/>
              <button
                onMouseEnter={()=>setHovered(item.id)} onMouseLeave={()=>setHovered(null)}
                onClick={()=>setSelectedItem(item)}
                style={{position:'absolute',left:'50%',top:'50%',transform:`translate(-50%,-50%) scale(${isH?1.22:1})`,width:32,height:32,borderRadius:9,background:c+'18',border:`1.5px solid ${c}`,display:'flex',alignItems:'center',justifyContent:'center',color:c,boxShadow:`0 0 ${isH?24:10}px ${c}60`,transition:'all .2s'}}>
                {I.pin}
              </button>
              {isH&&(
                <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',whiteSpace:'nowrap',zIndex:10,padding:'6px 12px',borderRadius:8,background:'rgba(4,7,20,.96)',border:`1px solid ${c}45`,boxShadow:'0 8px 24px rgba(0,0,0,.5)',fontSize:12,fontWeight:600,color:C.txt}}>
                  {item.title} <span style={{opacity:.42}}>· {item.status}</span>
                </div>
              )}
            </div>
          );
        })}
        <div style={{position:'absolute',top:16,left:16,display:'flex',alignItems:'center',gap:8,padding:'7px 14px',borderRadius:9,background:'rgba(3,5,8,.88)',border:`1px solid ${C.bd}`,backdropFilter:'blur(12px)'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:C.green,animation:'pulseDot 2s ease-in-out infinite'}}/>
          <span style={{fontSize:12,fontWeight:500,color:C.sub}}>Live · {filtered.length} pins active</span>
        </div>
        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8}}>
          {[{id:'all',l:'All',n:items.length},{id:'lost',l:'Lost',n:items.filter(i=>i.status==='lost').length,c:C.red},{id:'found',l:'Found',n:items.filter(i=>i.status==='found').length,c:C.green}].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} style={{
              padding:'7px 16px',borderRadius:9,
              border:`1px solid ${filter===f.id?(f.c||C.blue)+'55':C.bd}`,
              background:filter===f.id?'rgba(3,5,12,.94)':'rgba(3,5,8,.72)',
              backdropFilter:'blur(12px)',fontSize:12,fontWeight:600,
              color:filter===f.id?C.txt:C.muted,
              display:'flex',alignItems:'center',gap:6,transition:'all .15s',
            }}>
              {f.l} <span style={{color:f.c||'#60A5FA',opacity:.7}}>{f.n}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{width:234,flexShrink:0,borderLeft:`1px solid ${C.bd}`,background:'rgba(3,5,8,.98)',overflowY:'auto'}}>
        <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.bd}`}}>
          <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em'}}>Items</span>
        </div>
        <div style={{padding:8,display:'flex',flexDirection:'column',gap:5}}>
          {items.map(item=>{
            const c=item.status==='found'?C.green:C.red;
            return(
              <button key={item.id} onClick={()=>setSelectedItem(item)} style={{width:'100%',textAlign:'left',padding:'10px 12px',borderRadius:8,background:C.sf,border:`1px solid ${C.bd}`,transition:'background .14s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.075)'}
                onMouseLeave={e=>e.currentTarget.style.background=C.sf}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:c,flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:600,color:C.txt,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</span>
                </div>
                <div style={{fontSize:10,color:C.muted,paddingLeft:12}}>{item.loc}</div>
                <div style={{fontSize:10,color:C.muted,paddingLeft:12}}>{item.time}</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  ITEMS VIEW
// ══════════════════════════════════════════════════════
function ItemsView({items,setSelectedItem,sq}){
  const [filter,setFilter]=React.useState('all');
  const [cat,setCat]=React.useState('All');
  const [view,setView]=React.useState('list');
  const filtered=items.filter(i=>
    (filter==='all'||i.status===filter)&&
    (cat==='All'||i.cat===cat)&&
    (!sq||i.title.toLowerCase().includes(sq.toLowerCase())||i.loc.toLowerCase().includes(sq.toLowerCase()))
  );
  return(
    <div style={{height:'100%',overflowY:'auto',padding:'24px 24px 48px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>All Items</h1>
          <p style={{fontSize:12,color:C.muted,marginTop:2}}>{filtered.length} of {items.length} items</p>
        </div>
        <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:`1px solid ${C.bd}`}}>
          {[{id:'list',icon:I.list},{id:'grid',icon:I.grid}].map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{padding:'7px 10px',background:view===v.id?'rgba(59,130,246,.16)':C.sf,border:'none',display:'flex',alignItems:'center',color:view===v.id?'#60A5FA':C.muted,transition:'background .14s'}}>
              {v.icon}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
        {['all','lost','found'].map(f=>{
          const c=f==='found'?C.green:f==='lost'?C.red:C.blue;
          return(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'6px 14px',borderRadius:8,background:filter===f?c+'14':C.sf,border:`1px solid ${filter===f?c+'40':C.bd}`,fontSize:12,fontWeight:500,color:filter===f?C.txt:C.sub,textTransform:'capitalize',transition:'all .14s'}}>
              {f==='all'?'All Items':f}
            </button>
          );
        })}
        <div style={{width:1,background:C.bd,margin:'0 4px'}}/>
        {CATS.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{padding:'6px 12px',borderRadius:8,background:cat===c?'rgba(99,102,241,.15)':C.sf,border:`1px solid ${cat===c?'rgba(99,102,241,.4)':C.bd}`,fontSize:12,fontWeight:500,color:cat===c?'#A5B4FC':C.sub,whiteSpace:'nowrap',transition:'all .14s'}}>
            {c}
          </button>
        ))}
      </div>
      {view==='list'?(
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {filtered.map(item=><ItemRow key={item.id} item={item} onClick={()=>setSelectedItem(item)}/>)}
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:12}}>
          {filtered.map(item=>{
            const c=item.status==='found'?C.green:C.red;
            return(
              <button key={item.id} className="card-hover" onClick={()=>setSelectedItem(item)} style={{borderRadius:12,padding:'18px',textAlign:'left',background:C.sf,border:`1px solid ${C.bd}`,transition:'all .18s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=c+'35';e.currentTarget.style.transform='translateY(-2px)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.bd;e.currentTarget.style.transform='translateY(0)';}}>
                <div style={{width:36,height:36,borderRadius:9,background:c+'14',border:`1px solid ${c}22`,display:'flex',alignItems:'center',justifyContent:'center',color:c,marginBottom:14}}>{I.pkg}</div>
                <div style={{fontSize:14,fontWeight:700,color:C.txt,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.loc}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,fontWeight:600,padding:'3px 9px',borderRadius:99,background:c+'14',color:c,textTransform:'capitalize'}}>{item.status}</span>
                  <span style={{fontSize:11,color:C.muted}}>{item.time}</span>
                </div>
              </button>
            );
          })}
        </div>
      )}
      {filtered.length===0&&(
        <div style={{textAlign:'center',paddingTop:80}}>
          <div style={{fontSize:40,marginBottom:12}}>📦</div>
          <p style={{fontSize:13,color:C.muted}}>No items match your filters</p>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  PROFILE VIEW
// ══════════════════════════════════════════════════════
function ProfileView({user}){
  const kC=user.karma>=100?C.amber:'#94A3B8';
  const kL=user.karma>=100?'Gold':'Silver';
  return(
    <div style={{height:'100%',overflowY:'auto',padding:'24px 24px 48px'}}>
      <div style={{maxWidth:680}}>
        <div style={{borderRadius:14,padding:'24px',background:C.sf,border:`1px solid ${C.bd}`,marginBottom:16,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,right:0,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(29,78,216,.09),transparent)',pointerEvents:'none',transform:'translate(30%,-30%)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:18,position:'relative',zIndex:1}}>
            <div style={{width:54,height:54,borderRadius:14,overflow:'hidden',background:user.photo?'none':'linear-gradient(135deg,#1D4ED8,#4338CA)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:'#fff',flexShrink:0}}>
              {user.photo?<img src={user.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:user.name[0].toUpperCase()}
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <h2 style={{fontSize:20,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>{user.name}</h2>
                {user.verified&&<span style={{color:C.blue}}>{I.check}</span>}
              </div>
              <p style={{fontSize:13,color:C.muted}}>{user.email}</p>
            </div>
            <button onClick={()=>auth.signOut()} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:8,background:'rgba(239,68,68,.09)',border:'1px solid rgba(239,68,68,.2)',fontSize:12,fontWeight:500,color:'#F87171',transition:'background .15s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(239,68,68,.18)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(239,68,68,.09)'}>
              {I.logout} Sign out
            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:0,marginTop:20,paddingTop:20,borderTop:`1px solid ${C.bd}`}}>
            {[['Reported',5],['Returned',user.returned],['Helped',12]].map(([l,v])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>{v}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{borderRadius:12,padding:'18px',background:kC+'09',border:`1px solid ${kC}20`}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={{width:32,height:32,borderRadius:8,background:kC+'1c',display:'flex',alignItems:'center',justifyContent:'center',color:kC}}>{I.zap}</div>
              <div>
                <div style={{fontSize:10,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Karma</div>
                <div style={{fontSize:22,fontWeight:800,color:C.txt,letterSpacing:'-.04em'}}>{user.karma}</div>
              </div>
              <div style={{marginLeft:'auto',padding:'4px 12px',borderRadius:99,background:kC+'22',fontSize:12,fontWeight:600,color:kC}}>{kL}</div>
            </div>

// ══════════════════════════════════════════════════════
//  REPORT MODAL — with input sanitization
// ══════════════════════════════════════════════════════
function ReportModal({initial,onClose,onSubmit}){
  const [step,setStep]=React.useState(1);
  const [drag,setDrag]=React.useState(false);
  const [img,setImg]=React.useState(null);
  const [formErr,setFormErr]=React.useState('');
  const [form,setForm]=React.useState({type:initial?.type||'lost',title:'',cat:'Electronics',loc:'',desc:'',phone:''});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const fileUrl=f=>{if(f)setImg(URL.createObjectURL(f));};

  const goNext=()=>{
    setFormErr('');
    if(step===1){
      if(!form.title.trim()){setFormErr('Please enter the item name.');return;}
      if(form.title.trim().length<2){setFormErr('Item name is too short.');return;}
    }
    if(step===2){
      if(!form.loc){setFormErr('Please select a location.');return;}
    }
    if(step===3){
      if(!form.phone.trim()){setFormErr('Please enter your WhatsApp number.');return;}
      if(!validatePhone(form.phone)){setFormErr('Enter a valid phone number (e.g. +234 801 234 5678).');return;}
      // Sanitize all fields before submit
      onSubmit({
        ...form,
        title: cleanInput(form.title, 120),
        desc:  cleanInput(form.desc, 500),
        phone: form.phone.replace(/[^+\d\s\-()]/g,'').trim(),
      });
      return;
    }
    setStep(s=>s+1);
  };

  return(
    <Modal onClose={onClose}>
      <div style={{background:'#09101f',border:`1px solid ${C.bd}`,borderRadius:16,overflow:'hidden',boxShadow:'0 40px 100px rgba(0,0,0,.75)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:`1px solid ${C.bd}`}}>
          <div>
            <h2 style={{fontSize:15,fontWeight:700,color:C.txt}}>{form.type==='lost'?'Report Lost Item':'Report Found Item'}</h2>
            <div style={{display:'flex',gap:5,marginTop:8,alignItems:'center'}}>
              {[1,2,3].map(s=>(
                <div key={s} style={{height:3,borderRadius:99,overflow:'hidden',width:s<=step?22:10,background:'rgba(255,255,255,.08)',transition:'width .2s'}}>
                  <div style={{height:'100%',width:s<=step?'100%':'0%',background:s<step?C.green:s===step?C.blue:'transparent',transition:'width .3s'}}/>
                </div>
              ))}
              <span style={{fontSize:11,color:C.muted,marginLeft:4}}>Step {step}/3</span>
            </div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:7,background:C.sf,border:`1px solid ${C.bd}`,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted}}>{I.x}</button>
        </div>
        <div style={{padding:'22px',minHeight:290}}>
          {step===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',gap:10}}>
                {['lost','found'].map(t=>{const c=t==='found'?C.green:C.red;return(
                  <button key={t} onClick={()=>upd('type',t)} style={{flex:1,padding:'11px',borderRadius:9,background:form.type===t?c+'14':C.sf,border:`1px solid ${form.type===t?c+'45':C.bd}`,fontSize:13,fontWeight:600,color:form.type===t?C.txt:C.muted,textTransform:'capitalize',transition:'all .14s'}}>
                    {t==='lost'?'🔴 ':'🟢 '}I {t} this
                  </button>
                );})}
              </div>
              <Field label="Item Name" placeholder="e.g. MacBook Pro, Student ID…" value={form.title} onChange={v=>upd('title',v)} icon={I.pkg} maxLength={120}/>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:500,color:C.muted,marginBottom:6}}>Category</label>
                <select value={form.cat} onChange={e=>upd('cat',e.target.value)} style={{width:'100%',padding:'11px 14px',borderRadius:10,background:C.sf,border:`1px solid ${C.bd}`,fontSize:14,color:C.txt,outline:'none'}}>
                  {CATS.filter(c=>c!=='All').map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
          )}
          {step===2&&(
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:500,color:C.muted,marginBottom:6}}>Photo <span style={{color:'rgba(255,255,255,.2)'}}>(optional)</span></label>
                <label onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
                  onDrop={e=>{e.preventDefault();setDrag(false);fileUrl(e.dataTransfer.files[0]);}}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:128,borderRadius:12,border:`2px dashed ${drag?C.blue:C.bd}`,background:drag?'rgba(59,130,246,.06)':C.sf,cursor:'pointer',position:'relative',overflow:'hidden',transition:'border-color .15s'}}>
                  {img?(
                    <><img src={img} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} alt="preview"/>
                      <button onClick={e=>{e.preventDefault();setImg(null);}} style={{position:'absolute',top:8,right:8,width:24,height:24,borderRadius:'50%',background:'rgba(0,0,0,.6)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{I.x}</button>
                    </>
                  ):(
                    <><div style={{color:C.muted}}>{I.upload}</div>
                      <span style={{fontSize:13,color:C.muted,marginTop:8}}>Drag & drop or <span style={{color:'#60A5FA'}}>browse</span></span>
                    </>
                  )}
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" style={{display:'none'}} onChange={e=>{if(e.target.files[0])fileUrl(e.target.files[0]);}}/>
                </label>
              </div>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:500,color:C.muted,marginBottom:6}}>Location</label>
                <select value={form.loc} onChange={e=>upd('loc',e.target.value)} style={{width:'100%',padding:'11px 14px',borderRadius:10,background:C.sf,border:`1px solid ${C.bd}`,fontSize:14,color:C.txt,outline:'none'}}>
                  <option value="">Select campus location…</option>
                  {LOCS.map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:'block',fontSize:12,fontWeight:500,color:C.muted,marginBottom:6}}>Description</label>
                <textarea value={form.desc} onChange={e=>upd('desc',e.target.value)} rows={3} placeholder="Color, brand, markings…" maxLength={500} style={{width:'100%',padding:'11px 14px',borderRadius:10,background:C.sf,border:`1px solid ${C.bd}`,fontSize:13,color:C.txt,resize:'none',outline:'none'}}/>
              </div>
            </div>
          )}
          {step===3&&(
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <Field label="WhatsApp Number" placeholder="+234 801 234 5678" value={form.phone} onChange={v=>upd('phone',v)} icon={I.msg} maxLength={20}/>
              <div style={{padding:'14px 16px',borderRadius:10,background:C.sf,border:`1px solid ${C.bd}`}}>
                <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Summary</div>
                {[['Type',form.type],['Item',form.title||'—'],['Category',form.cat],['Location',form.loc||'—']].map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:13}}>
                    <span style={{color:C.muted}}>{k}</span>
                    <span style={{fontWeight:600,color:C.txt,textTransform:'capitalize'}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderRadius:10,background:'rgba(59,130,246,.07)',border:'1px solid rgba(59,130,246,.18)'}}>
                <span style={{color:C.blue}}>{I.sparkle}</span>
                <span style={{fontSize:12,color:'rgba(147,197,253,.8)'}}>Submitting earns <strong style={{color:'#93C5FD'}}>+{form.type==='found'?25:10} Karma Points</strong></span>
              </div>
            </div>
          )}
          {formErr&&(
            <div style={{marginTop:12,padding:'9px 13px',borderRadius:8,background:'rgba(239,68,68,.09)',border:'1px solid rgba(239,68,68,.22)',display:'flex',alignItems:'center',gap:8}}>
              <span style={{color:C.red,flexShrink:0}}>{I.alert}</span>
              <span style={{fontSize:12,color:'#FCA5A5'}}>{formErr}</span>
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:10,padding:'0 22px 22px'}}>
          {step>1&&(
            <button onClick={()=>{setStep(s=>s-1);setFormErr('');}} style={{padding:'10px 18px',borderRadius:9,background:C.sf,border:`1px solid ${C.bd}`,fontSize:13,fontWeight:500,color:C.muted}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.075)'}
              onMouseLeave={e=>e.currentTarget.style.background=C.sf}>Back</button>
          )}
          <button className="btn-shimmer" onClick={goNext} style={{flex:1,padding:'10px',borderRadius:9,background:'linear-gradient(135deg,#1D4ED8,#4338CA)',border:'none',fontSize:13,fontWeight:600,color:'#fff',position:'relative',overflow:'hidden',transition:'transform .15s'}}
            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.015)'}
            onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
            <span style={{position:'relative',zIndex:1}}>{step===3?'Submit Report':'Continue →'}</span>
          </button>
        </div>
      </div>
    </Modal>
  );
}

          onMouseEnter={e=>e.currentTarget.style.transform='scale(1.14)'}
          onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
          <span style={{display:'block',transform:collapsed?'rotate(0)':'rotate(180deg)',transition:'transform .3s'}}>{I.chevron}</span>
        </button>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <header style={{display:'flex',alignItems:'center',gap:12,padding:'0 24px',height:60,borderBottom:`1px solid ${C.bd}`,background:'rgba(3,5,8,.92)',backdropFilter:'blur(16px)',flexShrink:0,zIndex:10}}>
          <div style={{flex:1,maxWidth:440}}>
            <div style={{display:'flex',alignItems:'center',gap:8,background:C.sf,border:`1px solid ${C.bd}`,borderRadius:8,padding:'6px 12px'}}>
              <span style={{color:C.muted}}>{I.search}</span>
              <input value={sq} onChange={e=>setSq(e.target.value)} placeholder="Search items, locations…" maxLength={100} style={{flex:1,fontSize:13,color:C.txt,outline:'none',background:'transparent'}}/>
            </div>
          </div>
          <div style={{marginLeft:'auto',position:'relative'}}>
            <button onClick={()=>setShowN(s=>!s)} style={{width:34,height:34,borderRadius:8,background:C.sf,border:`1px solid ${C.bd}`,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,position:'relative'}}>
              {I.bell}
              {notifs.some(n=>n.u)&&<span style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:'50%',background:C.blue,border:'1.5px solid #030508'}}/>}
            </button>
            {showN&&(
              <>
                <div onClick={()=>setShowN(false)} style={{position:'fixed',inset:0,zIndex:40}}/>
                <div className="slide-up" style={{position:'absolute',top:42,right:0,width:276,background:'#0c1220',border:`1px solid ${C.bd}`,borderRadius:12,boxShadow:'0 20px 60px rgba(0,0,0,.6)',zIndex:50,overflow:'hidden'}}>
                  <div style={{padding:'10px 16px',borderBottom:`1px solid ${C.bd}`}}>
                    <span style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'.1em'}}>Notifications</span>
                  </div>
                  {notifs.map(n=>(
                    <div key={n.id} style={{display:'flex',gap:10,padding:'11px 16px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                      <div style={{width:6,height:6,borderRadius:'50%',marginTop:5,flexShrink:0,background:n.u?C.blue:'transparent'}}/>
                      <div>
                        <div style={{fontSize:12,color:C.sub,lineHeight:1.5}}>{n.text}</div>
                        <div style={{fontSize:11,color:C.muted,marginTop:2}}>{n.time}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </header>
        <main style={{flex:1,overflow:'hidden'}}>
          {section==='dashboard'&&<Dashboard user={user} items={items} setSection={setSection} setSelectedItem={setSelItem} setShowReport={setShowRep} sq={sq}/>}
          {section==='map'&&<MapView items={items} setSelectedItem={setSelItem}/>}
          {section==='items'&&<ItemsView items={items} setSelectedItem={setSelItem} sq={sq}/>}
          {section==='profile'&&<ProfileView user={user}/>}
        </main>
      </div>

      {selItem&&<ItemModal item={selItem} onClose={()=>setSelItem(null)}/>}
      {showRep&&<ReportModal initial={showRep} onClose={()=>setShowRep(null)} onSubmit={addItem}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  ROOT
// ══════════════════════════════════════════════════════
function Root(){
  const [fbUser,setFbUser]=React.useState(undefined);

  React.useEffect(()=>{
    // Handle redirect result (for popup-blocked fallback)
    auth.getRedirectResult().catch(()=>{});
    const unsub=auth.onAuthStateChanged(u=>setFbUser(u??null));
    return()=>unsub();
  },[]);

  if(fbUser===undefined) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#1D4ED8,#4338CA)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 0 28px rgba(37,99,235,.4)'}}>{I.compass}</div>
        <div className="spin-el" style={{width:18,height:18,borderRadius:'50%',border:'2px solid rgba(255,255,255,.14)',borderTopColor:C.blue}}/>
      </div>
    </div>
  );

  return fbUser?<AppShell fbUser={fbUser}/>:<AuthPage/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
</body>
</html>
